<!doctype html>
<html lang="fr">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/vite.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Duo Black & White – Site Officiel</title>
    <meta name="description" content="Site officiel du Duo Black & White : musique, vidéos, concerts, galerie, et contact. France & Belgique." />
    <meta name="robots" content="index,follow" />
    <meta name="theme-color" content="#000000" />

    <link rel="canonical" href="https://duoblackandwhite.com/" />
    <!-- Open Graph / Facebook -->
    <meta property="og:type" content="website" />
    <meta property="og:title" content="Duo Black & White – Site Officiel" />
    <meta property="og:description" content="Découvrez notre musique, vidéos et prochains concerts." />
    <meta property="og:url" content="https://duoblackandwhite.com/" />
    <meta property="og:image" content="/vite.svg" />

    <!-- Twitter -->
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:title" content="Duo Black & White – Site Officiel" />
    <meta name="twitter:description" content="Découvrez notre musique, vidéos et prochains concerts." />
    <meta name="twitter:image" content="/vite.svg" />

    <!-- Performance: preconnect to CDN for icons -->
    <link rel="preconnect" href="https://cdnjs.cloudflare.com" crossorigin />
    <!-- Font Awesome pour les icônes (coeurs, étoiles, etc.) -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" />

    <!-- JSON-LD: Organization & Website (SEO) -->
    <script type="application/ld+json">
    {
      "@context": "https://schema.org",
      "@type": "Organization",
      "name": "Duo Black & White",
      "url": "https://duoblackandwhite.com/",
      "logo": "/vite.svg",
      "sameAs": [
        "https://www.facebook.com/DuoBlackandWhiteMP/"
      ],
      "foundingLocation": {
        "@type": "Place",
        "name": "Abbeville, France"
      }
    }
    </script>
    <script type="application/ld+json">
    {
      "@context": "https://schema.org",
      "@type": "BreadcrumbList",
      "itemListElement": [
        {"@type": "ListItem", "position": 1, "name": "Accueil", "item": "https://duoblackandwhite.com/#hero"},
        {"@type": "ListItem", "position": 2, "name": "Vidéos", "item": "https://duoblackandwhite.com/#videos"},
        {"@type": "ListItem", "position": 3, "name": "Musique", "item": "https://duoblackandwhite.com/#music"},
        {"@type": "ListItem", "position": 4, "name": "Le Duo", "item": "https://duoblackandwhite.com/#biography"},
        {"@type": "ListItem", "position": 5, "name": "Galerie", "item": "https://duoblackandwhite.com/#gallery"},
        {"@type": "ListItem", "position": 6, "name": "Concerts", "item": "https://duoblackandwhite.com/#concerts"}
      ]
    }
    </script>
    <script type="application/ld+json">
    {
      "@context": "https://schema.org",
      "@type": "WebSite",
      "name": "Duo Black & White – Site Officiel",
      "url": "https://duoblackandwhite.com/",
      "potentialAction": {
        "@type": "SearchAction",
        "target": "https://duoblackandwhite.com/?q={search_term_string}",
        "query-input": "required name=search_term_string"
      }
    }
    </script>
  </head>
  <body>
    <noscript>Veuillez activer JavaScript pour profiter pleinement du site Duo Black & White.</noscript>
    <div id="app"></div>
    <script type="module" src="/src/main.js"></script>
  </body>
</html>
