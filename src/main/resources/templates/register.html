<!DOCTYPE html>
<html lang="fr" xmlns:th="http://www.thymeleaf.org">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Inscription</title>
<link rel="stylesheet" th:href="@{/css/style.css}">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link
	href="https://fonts.googleapis.com/css2?family=Inter:wght@400;700&display=swap"
	rel="stylesheet">
</head>
<body
	class="bg-gray-900 text-white flex items-center justify-center min-h-screen">

	<div
		class="w-full max-w-md p-8 space-y-8 bg-gray-800 rounded-lg shadow-lg">
		<h2 class="text-3xl font-bold text-center">Créer un compte</h2>

        <div id="client-error-message" class="hidden bg-red-500 text-white p-3 rounded-md text-center"></div>

		<div th:if="${errorMessage}"
			class="bg-red-500 text-white p-3 rounded-md text-center">
			<p class="whitespace-pre-wrap" th:text="${errorMessage}"></p>
		</div>

		<form id="registerForm" th:action="@{/register}" th:object="${user}" method="post" class="space-y-6">

			<div>
				<label for="username"
					class="block text-sm font-medium text-gray-300">Nom
					d'utilisateur</label>
				<div class="mt-1">
					<input id="username" th:field="*{username}" type="text" required
						th:classappend="${#fields.hasErrors('username')} ? 'border-red-500' : ''"
						class="w-full px-3 py-2 border border-gray-600 bg-gray-700 rounded-md shadow-sm focus:outline-none focus:ring-indigo-500 focus:border-indigo-500">
				</div>
				<p th:if="${#fields.hasErrors('username')}" th:errors="*{username}" class="mt-1 text-sm text-red-500"></p>
			</div>

			<div>
				<label for="email" class="block text-sm font-medium text-gray-300">Email</label>
				<div class="mt-1">
					<input id="email" th:field="*{email}" type="email" required
						th:classappend="${#fields.hasErrors('email')} ? 'border-red-500' : ''"
						class="w-full px-3 py-2 border border-gray-600 bg-gray-700 rounded-md shadow-sm focus:outline-none focus:ring-indigo-500 focus:border-indigo-500">
				</div>
				<p th:if="${#fields.hasErrors('email')}" th:errors="*{email}" class="mt-1 text-sm text-red-500"></p>
			</div>

			<div>
				<label for="password"
					class="block text-sm font-medium text-gray-300">Mot de
					passe</label>
				<div class="mt-1">
					<input id="password" th:field="*{password}" type="password"
						required
						th:classappend="${#fields.hasErrors('password')} ? 'border-red-500' : ''"
						class="w-full px-3 py-2 border border-gray-600 bg-gray-700 rounded-md shadow-sm focus:outline-none focus:ring-indigo-500 focus:border-indigo-500">
				</div>
				<p th:if="${#fields.hasErrors('password')}" th:errors="*{password}" class="mt-1 text-sm text-red-500"></p>
                <div class="mt-2 text-xs text-gray-400">
                    Doit contenir au moins 8 caractères, une majuscule, une minuscule, un chiffre et un caractère spécial (@$!%*?&).
                </div>
			</div>
            
            <div class="flex items-center">
                <input id="showPassword" type="checkbox" class="h-4 w-4 text-indigo-600 border-gray-300 rounded">
                <label for="showPassword" class="ml-2 block text-sm text-gray-400">Afficher le mot de passe</label>
            </div>

			<div>
				<button type="submit"
					class="w-full flex justify-center py-3 px-4 border border-transparent rounded-md shadow-sm text-sm font-medium text-white bg-indigo-600 hover:bg-indigo-700 focus:outline-none focus:ring-2 focus:ring-offset-2 focus:ring-indigo-500">
					S'inscrire</button>
			</div>
		</form>

		<div class="text-center text-sm text-gray-400">
			Déjà un compte ? <a th:href="@{/login}"
				class="font-medium text-indigo-400 hover:text-indigo-300">Se
				connecter</a>
		</div>
	</div>

    <script>
        document.getElementById('showPassword').addEventListener('change', function(event) {
            const passwordInput = document.getElementById('password');
            if (event.target.checked) {
                passwordInput.type = 'text';
            } else {
                passwordInput.type = 'password';
            }
        });

        const registerForm = document.getElementById('registerForm');
        const passwordInput = document.getElementById('password');
        const clientErrorDiv = document.getElementById('client-error-message');

        registerForm.addEventListener('submit', function(event) {
            const password = passwordInput.value;
            // La même regex que dans votre `UserService`
            const passwordPattern = /^(?=.*[a-z])(?=.*[A-Z])(?=.*\d)(?=.*[@$!%*?&])[A-Za-z\d@$!%*?&]{8,}$/;

            if (!passwordPattern.test(password)) {
                // Empêche l'envoi du formulaire
                event.preventDefault();
                
                // Affiche le message d'erreur
                clientErrorDiv.textContent = 'Le mot de passe ne respecte pas les critères de sécurité.';
                clientErrorDiv.classList.remove('hidden');
            } else {
                // Cache le message d'erreur s'il était affiché
                clientErrorDiv.classList.add('hidden');
            }
        });
    </script>

</body>
</html>
