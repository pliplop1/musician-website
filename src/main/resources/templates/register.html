<!DOCTYPE html>
<html lang="fr" xmlns:th="http://www.thymeleaf.org">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Inscription</title>
<link rel="stylesheet" th:href="@{/css/style.css}">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link
	href="https://fonts.googleapis.com/css2?family=Inter:wght@400;700&display=swap"
	rel="stylesheet">
</head>
<body
	class="bg-gray-900 text-white flex items-center justify-center min-h-screen">

	<div
		class="w-full max-w-md p-8 space-y-8 bg-gray-800 rounded-lg shadow-lg">
		<h2 class="text-3xl font-bold text-center">Créer un compte</h2>

		<!-- Formulaire d'inscription -->
		<form th:action="@{/register}" th:object="${user}" method="post"
			class="space-y-6">

			<!-- Message d'erreur -->
			<div th:if="${param.error}"
				class="bg-red-500 text-white p-3 rounded-md text-center">Un
				utilisateur avec ce nom ou cet email existe déjà.</div>

			<div>
				<label for="username"
					class="block text-sm font-medium text-gray-300">Nom
					d'utilisateur</label>
				<div class="mt-1">
					<input id="username" th:field="*{username}" type="text" required
						class="w-full px-3 py-2 border border-gray-600 bg-gray-700 rounded-md shadow-sm focus:outline-none focus:ring-indigo-500 focus:border-indigo-500">
				</div>
			</div>

			<div>
				<label for="email" class="block text-sm font-medium text-gray-300">Email</label>
				<div class="mt-1">
					<input id="email" th:field="*{email}" type="email" required
						class="w-full px-3 py-2 border border-gray-600 bg-gray-700 rounded-md shadow-sm focus:outline-none focus:ring-indigo-500 focus:border-indigo-500">
				</div>
			</div>

			<div>
				<label for="password"
					class="block text-sm font-medium text-gray-300">Mot de
					passe</label>
				<div class="mt-1">
					<input id="password" th:field="*{password}" type="password"
						required
						class="w-full px-3 py-2 border border-gray-600 bg-gray-700 rounded-md shadow-sm focus:outline-none focus:ring-indigo-500 focus:border-indigo-500">
				</div>
			</div>

			<div>
				<button type="submit"
					class="w-full flex justify-center py-3 px-4 border border-transparent rounded-md shadow-sm text-sm font-medium text-white bg-indigo-600 hover:bg-indigo-700 focus:outline-none focus:ring-2 focus:ring-offset-2 focus:ring-indigo-500">
					S'inscrire</button>
			</div>
		</form>

		<div class="text-center text-sm text-gray-400">
			Déjà un compte ? <a th:href="@{/login}"
				class="font-medium text-indigo-400 hover:text-indigo-300">Se
				connecter</a>
		</div>
	</div>

</body>
</html>
