<!DOCTYPE html>
<html lang="fr" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Inscription - Duo Black & White</title>
    <meta name="description" content="Créez votre compte Duo Black & White et rejoignez notre communauté">
    <link rel="preload" as="style" th:href="@{/css/style.css(v=${#dates.createNow().time})}" onload="this.onload=null;this.rel='stylesheet'">
    <noscript><link rel="stylesheet" th:href="@{/css/style.css(v=${#dates.createNow().time})}"></noscript>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #000000 0%, #1a1a1a 100%);
            min-height: 100vh;
            color: #fff;
            position: relative;
            overflow-x: hidden;
        }

        /* Animated background */
        body::before {
            content: '';
            position: absolute;
            width: 200%;
            height: 200%;
            background: radial-gradient(circle, rgba(74, 144, 226, 0.1) 0%, transparent 70%);
            animation: rotate 20s linear infinite;
            z-index: 0;
        }

        @keyframes rotate {
            from { transform: rotate(0deg); }
            to { transform: rotate(360deg); }
        }

        .register-wrapper {
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: calc(100vh - 140px);
            padding: 2rem 1rem;
            position: relative;
            z-index: 1;
        }

        .register-container {
            width: 100%;
            max-width: 500px;
            padding: 3rem 2.5rem;
            background: rgba(20, 20, 20, 0.95);
            backdrop-filter: blur(10px);
            border-radius: 20px;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.5),
                        0 0 100px rgba(74, 144, 226, 0.1);
            border: 1px solid rgba(255, 255, 255, 0.1);
            margin: 1rem;
        }

        .logo {
            text-align: center;
            margin-bottom: 2rem;
        }

        .logo h1 {
            font-size: 1.8rem;
            font-weight: bold;
            letter-spacing: 3px;
            color: #fff;
            text-transform: uppercase;
            margin-bottom: 0.5rem;
        }

        .logo p {
            color: #888;
            font-size: 0.9rem;
            letter-spacing: 1px;
        }

        h2 {
            text-align: center;
            font-size: 2rem;
            margin-bottom: 2rem;
            color: #fff;
        }

        .alert-error {
            background: rgba(239, 68, 68, 0.1);
            border-left: 4px solid #ef4444;
            padding: 1rem;
            border-radius: 8px;
            margin-bottom: 1.5rem;
        }

        .alert-error p {
            color: #ef4444;
            margin: 0;
            white-space: pre-wrap;
        }

        .form-group {
            margin-bottom: 1.5rem;
        }

        label {
            display: block;
            margin-bottom: 0.5rem;
            color: #ddd;
            font-size: 0.95rem;
            font-weight: 500;
        }

        input[type="text"],
        input[type="email"],
        input[type="password"] {
            width: 100%;
            padding: 0.9rem 1rem;
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 8px;
            color: #fff;
            font-size: 1rem;
            transition: all 0.3s ease;
        }

        input[type="text"]:focus,
        input[type="email"]:focus,
        input[type="password"]:focus {
            outline: none;
            border-color: #4a90e2;
            background: rgba(255, 255, 255, 0.08);
            box-shadow: 0 0 0 3px rgba(74, 144, 226, 0.1);
        }

        input[type="text"]::placeholder,
        input[type="email"]::placeholder,
        input[type="password"]::placeholder {
            color: #666;
        }

        input.error {
            border-color: #ef4444 !important;
        }

        .field-error {
            color: #ef4444;
            font-size: 0.85rem;
            margin-top: 0.5rem;
        }

        .password-hint {
            color: #888;
            font-size: 0.85rem;
            margin-top: 0.5rem;
            line-height: 1.4;
        }

        .checkbox-group {
            display: flex;
            align-items: flex-start;
            margin-bottom: 1.5rem;
        }

        input[type="checkbox"] {
            width: 18px;
            height: 18px;
            margin-right: 0.5rem;
            margin-top: 0.2rem;
            cursor: pointer;
            flex-shrink: 0;
        }

        .checkbox-group label {
            margin: 0;
            cursor: pointer;
            color: #bbb;
            line-height: 1.5;
        }

        .btn-submit {
            width: 100%;
            padding: 1rem;
            background: linear-gradient(135deg, #4a90e2 0%, #357abd 100%);
            color: #fff;
            border: none;
            border-radius: 8px;
            font-size: 1rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        .btn-submit:hover {
            background: linear-gradient(135deg, #357abd 0%, #2868a8 100%);
            transform: translateY(-2px);
            box-shadow: 0 8px 20px rgba(74, 144, 226, 0.3);
        }

        .links {
            margin-top: 2rem;
            text-align: center;
        }

        .links p {
            color: #888;
            font-size: 0.9rem;
        }

        .links a {
            color: #4a90e2;
            text-decoration: none;
            font-weight: 500;
            transition: color 0.3s ease;
        }

        .links a:hover {
            color: #357abd;
            text-decoration: underline;
        }

        /* Responsive */
        @media (max-width: 480px) {
            .register-container {
                padding: 2rem 1.5rem;
            }

            .logo h1 {
                font-size: 1.4rem;
            }

            h2 {
                font-size: 1.5rem;
            }
        }
    </style>
</head>
<body>

<header th:replace="~{fragments/layout :: header}"></header>

<main class="register-wrapper">
    <div class="register-container">
        <div class="logo">
            <h1>DUO BLACK & WHITE</h1>
            <p>Créer votre compte</p>
        </div>

        <h2>Inscription</h2>

        <div id="client-error-message" class="alert-error" style="display: none;">
            <p id="client-error-text"></p>
        </div>

        <div th:if="${errorMessage}" class="alert-error">
            <p th:text="${errorMessage}"></p>
        </div>

        <form id="registerForm" th:action="@{/register}" th:object="${user}" method="post">

            <div class="form-group">
                <label for="username">Nom d'utilisateur</label>
                <input id="username"
                       th:field="*{username}"
                       type="text"
                       required
                       th:classappend="${#fields.hasErrors('username')} ? 'error' : ''"
                       placeholder="Choisissez un nom d'utilisateur"
                       aria-label="Nom d'utilisateur"
                       aria-describedby="username-error">
                <p id="username-error" th:if="${#fields.hasErrors('username')}"
                   th:errors="*{username}"
                   class="field-error" role="alert"></p>
            </div>

            <div class="form-group">
                <label for="email">Email</label>
                <input id="email"
                       th:field="*{email}"
                       type="email"
                       required
                       th:classappend="${#fields.hasErrors('email')} ? 'error' : ''"
                       placeholder="votre@email.com"
                       aria-label="Adresse email"
                       aria-describedby="email-error">
                <p id="email-error" th:if="${#fields.hasErrors('email')}"
                   th:errors="*{email}"
                   class="field-error" role="alert"></p>
            </div>

            <div class="form-group">
                <label for="password">Mot de passe</label>
                <input id="password"
                       th:field="*{password}"
                       type="password"
                       required
                       th:classappend="${#fields.hasErrors('password')} ? 'error' : ''"
                       placeholder="Choisissez un mot de passe sécurisé"
                       aria-label="Mot de passe"
                       aria-describedby="password-error password-hint">
                <p id="password-error" th:if="${#fields.hasErrors('password')}"
                   th:errors="*{password}"
                   class="field-error" role="alert"></p>
                <div id="password-hint" class="password-hint">
                    Doit contenir au moins 8 caractères, une majuscule, une minuscule, un chiffre et un caractère spécial (@$!%*?&).
                </div>
            </div>

            <div class="checkbox-group">
                <input id="showPassword" type="checkbox" aria-label="Afficher le mot de passe">
                <label for="showPassword">Afficher le mot de passe</label>
            </div>

            <div class="checkbox-group">
                <input id="privacyConsent" name="privacyConsent" type="checkbox" required aria-label="Accepter la politique de confidentialité">
                <label for="privacyConsent">
                    J'accepte la <a th:href="@{/privacy-policy}" target="_blank" rel="noopener noreferrer" style="color: #4a90e2;">Politique de Confidentialité</a> et le traitement de mes données personnelles *
                </label>
            </div>

            <button type="submit" class="btn-submit">S'inscrire</button>
        </form>

        <div class="links">
            <p>
                Déjà un compte ? <a th:href="@{/login}">Se connecter</a>
            </p>
        </div>
    </div>
</main>

<footer th:replace="~{fragments/layout :: footer}"></footer>

<script>
(function() {
    'use strict';

    document.addEventListener('DOMContentLoaded', function() {
        const showPasswordCheckbox = document.getElementById('showPassword');
        const passwordInput = document.getElementById('password');
        const registerForm = document.getElementById('registerForm');
        const clientErrorDiv = document.getElementById('client-error-message');
        const clientErrorText = document.getElementById('client-error-text');

        // Toggle password visibility
        if (showPasswordCheckbox && passwordInput) {
            showPasswordCheckbox.addEventListener('change', function() {
                passwordInput.type = this.checked ? 'text' : 'password';
            });
        }

        // Client-side password validation
        if (registerForm && passwordInput) {
            registerForm.addEventListener('submit', function(event) {
                const password = passwordInput.value;
                const passwordPattern = /^(?=.*[a-z])(?=.*[A-Z])(?=.*\d)(?=.*[@$!%*?&])[A-Za-z\d@$!%*?&]{8,}$/;

                if (!passwordPattern.test(password)) {
                    event.preventDefault();
                    clientErrorText.textContent = 'Le mot de passe ne respecte pas les critères de sécurité.';
                    clientErrorDiv.style.display = 'block';
                    clientErrorDiv.setAttribute('role', 'alert');
                    window.scrollTo({ top: 0, behavior: 'smooth' });
                } else {
                    clientErrorDiv.style.display = 'none';
                }
            });
        }
    });
})();
</script>

</body>
</html>
