<!DOCTYPE html>
<html lang="fr" xmlns:th="http://www.thymeleaf.org" xmlns:sec="http://www.thymeleaf.org/extras/spring-security">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="_csrf" th:content="${_csrf.token}"/>
<meta name="_csrf_header" th:content="${_csrf.headerName}"/>
<th:block th:replace="~{fragments/head :: head('Actualités - Duo Black & White','Toutes les actualités, annonces et publications du duo.', null, null)}"></th:block>
<link rel="preload" as="style" th:href="@{/css/style.css(v=${#dates.createNow().time})}" onload="this.onload=null;this.rel='stylesheet'">
<noscript><link rel="stylesheet" th:href="@{/css/style.css(v=${#dates.createNow().time})}"></noscript>
<script th:src="@{/js/comments.js}" defer></script>
</head>
<body class="bg-gray-900 text-white">

<header th:replace="~{fragments/layout :: header}"></header>

<main class="container mx-auto px-4 sm:px-6 py-8 sm:py-10 md:py-12">
    <section id="articles">
        <h2 class="text-2xl sm:text-3xl md:text-4xl font-bold text-center mb-6 sm:mb-8 md:mb-10 px-2">Toutes les Actualités</h2>
        <div class="max-w-4xl mx-auto space-y-6 sm:space-y-8">
            <div th:if="${#lists.isEmpty(articles)}" class="bg-gray-800 rounded-lg p-6 sm:p-8 text-center shadow-lg">
                <p class="text-base sm:text-lg text-gray-400">Aucune actualité n'a été publiée pour le moment.</p>
            </div>
            <div th:each="article : ${articles}" class="bg-gray-800 rounded-lg p-4 sm:p-5 md:p-6 shadow-lg">
                <p class="text-xs sm:text-sm text-gray-400" th:text="${#temporals.format(article.datePublication, 'dd MMMM yyyy')}"></p>
                <h3 class="text-lg sm:text-xl md:text-2xl font-bold text-indigo-400 mt-2 mb-3 sm:mb-4" th:text="${article.titre}"></h3>
                <p class="text-sm sm:text-base text-gray-300 whitespace-pre-wrap" th:text="${article.contenu}"></p>

                <!-- Section des commentaires -->
                <div class="mt-5 sm:mt-6 pt-5 sm:pt-6 border-t border-gray-700">
                    <div class="flex items-center justify-between mb-3 sm:mb-4">
                        <h4 class="text-base sm:text-lg font-semibold text-gray-300">
                            💬 Commentaires (<span th:text="${#ctx.getVariable('commentCount_' + article.id) ?: 0}">0</span>)
                        </h4>
                    </div>

                    <!-- Formulaire d'ajout de commentaire (si connecté) -->
                    <div sec:authorize="isAuthenticated()" class="mb-3 sm:mb-4">
                        <form th:action="@{/comments/article/{id}(id=${article.id})}" method="post" class="space-y-2" data-comment-form="true">
                            <textarea name="content" rows="3" maxlength="1000" required
                                      placeholder="Ajouter un commentaire..."
                                      class="w-full bg-gray-700 border border-gray-600 rounded-md shadow-sm py-2 px-3 text-white text-sm resize-none focus:border-indigo-500 focus:ring-1 focus:ring-indigo-500"></textarea>
                            <div class="flex flex-col sm:flex-row justify-between items-start sm:items-center gap-2">
                                <span class="text-xs text-gray-400">Max 1000 caractères</span>
                                <button type="submit" class="w-full sm:w-auto bg-indigo-600 hover:bg-indigo-700 text-white font-medium py-1.5 px-4 rounded-md text-xs sm:text-sm transition-colors">
                                    Publier
                                </button>
                            </div>
                        </form>
                    </div>

                    <!-- Message pour se connecter si non connecté -->
                    <div sec:authorize="!isAuthenticated()" class="mb-3 sm:mb-4 text-center">
                        <p class="text-xs sm:text-sm text-gray-400">
                            <a th:href="@{/login}" class="text-indigo-400 hover:text-indigo-300">Connectez-vous</a> pour laisser un commentaire
                        </p>
                    </div>

                    <!-- Liste des commentaires approuvés -->
                    <div class="space-y-2 sm:space-y-3">
                        <div th:each="comment : ${#ctx.getVariable('comments_' + article.id)}" class="bg-gray-800 rounded-md p-3 sm:p-4">
                            <div class="flex items-start gap-2 sm:gap-3">
                                <div class="flex-shrink-0">
                                    <div th:if="${comment.user.avatarFilename != null}">
                                        <img th:src="@{/uploaded-avatars/{filename}(filename=${comment.user.avatarFilename})}"
                                             alt="Avatar"
                                             class="w-7 h-7 sm:w-8 sm:h-8 rounded-full object-cover"
                                             loading="lazy" decoding="async">
                                    </div>
                                    <div th:if="${comment.user.avatarFilename == null}"
                                         class="w-7 h-7 sm:w-8 sm:h-8 rounded-full bg-gradient-to-br from-indigo-500 to-purple-600 flex items-center justify-center text-white font-bold text-xs">
                                        <span th:text="${comment.user.initials}"></span>
                                    </div>
                                </div>
                                <div class="flex-1 min-w-0">
                                    <div class="flex flex-col sm:flex-row sm:items-center gap-1 sm:gap-2 mb-1">
                                        <span class="font-semibold text-xs sm:text-sm text-indigo-400" th:text="${comment.user.username}">Utilisateur</span>
                                        <span class="text-xs text-gray-500" th:text="${#temporals.format(comment.createdAt, 'dd/MM/yyyy HH:mm')}">Date</span>
                                    </div>
                                    <p class="text-xs sm:text-sm text-gray-300 whitespace-pre-wrap" th:text="${comment.content}">Contenu du commentaire</p>
                                </div>
                            </div>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </section>
</main>

<footer th:replace="~{fragments/layout :: footer}"></footer>

</body>
</html>
