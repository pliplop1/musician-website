<!DOCTYPE html>
<html lang="fr" xmlns:th="http://www.thymeleaf.org" xmlns:sec="http://www.thymeleaf.org/extras/spring-security">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Actualités - Le Nom de l'Artiste</title>
<link rel="stylesheet" th:href="@{/css/style.css}">
</head>
<body class="bg-gray-900 text-white">

	<header class="bg-gray-800 shadow-lg sticky top-0 z-50">
		<div class="container mx-auto px-6 py-4 flex justify-between items-center">
			<a th:href="@{/}" class="text-3xl font-bold tracking-wider">LE NOM DE L'ARTISTE</a>
			<nav>
				<a th:href="@{/} + '#concerts'" class="px-4 hover:text-indigo-400">Concerts</a>
				
				<a th:href="@{/actualites}" class="px-4 text-indigo-400 font-bold">Actualités</a>
				
				<a th:href="@{/} + '#contact'" class="px-4 hover:text-indigo-400">Contact</a>
				
				<div sec:authorize="!isAuthenticated()" class="inline">
					<a th:href="@{/login}" class="px-4 hover:text-indigo-400">Connexion</a>
				</div>
				<div sec:authorize="isAuthenticated()" class="inline">
					<a th:href="@{/user/profile}" sec:authentication="name" class="px-4 font-bold text-indigo-400 hover:underline"></a>
					<a th:href="@{/admin/dashboard}" sec:authorize="hasRole('ADMIN')" class="px-4 py-2 bg-indigo-600 hover:bg-indigo-700 rounded-md ml-4">Admin</a>
					<form th:action="@{/logout}" method="post" class="inline ml-4">
						<button type="submit" class="px-4 text-gray-400 hover:text-white">Déconnexion</button>
					</form>
				</div>
			</nav>
		</div>
	</header>

	<main class="container mx-auto px-6 py-12">
		<section id="articles">
			<h2 class="text-4xl font-bold text-center mb-10">Toutes les Actualités</h2>
			
			<div class="max-w-4xl mx-auto space-y-8">
				
				<div th:if="${#lists.isEmpty(articles)}" class="bg-gray-800 rounded-lg p-8 text-center shadow-lg">
					<p class="text-gray-400 text-lg">Aucune actualité n'a été publiée pour le moment.</p>
				</div>
				
				<div th:each="article : ${articles}" class="bg-gray-800 rounded-lg p-6 shadow-lg">
					<p class="text-sm text-gray-400" th:text="${#temporals.format(article.datePublication, 'dd MMMM yyyy')}"></p>
					<h3 class="text-2xl font-bold text-indigo-400 mt-2 mb-4" th:text="${article.titre}"></h3>
					<p class="text-gray-300 whitespace-pre-wrap" th:text="${article.contenu}"></p>
				</div>
				
			</div>
		</section>
	</main>

	<footer class="bg-gray-800 mt-20">
		<div class="container mx-auto px-6 py-4 text-center text-gray-400">
			<p>&copy; 2025 Le Nom de l'Artiste. Tous droits réservés.</p>
		</div>
	</footer>

</body>
</html>
