<!DOCTYPE html>
<html lang="fr" xmlns:th="http://www.thymeleaf.org" xmlns:sec="http://www.thymeleaf.org/extras/spring-security">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Actualités - MARC DUPONT</title>
<link rel="stylesheet" th:href="@{/css/style.css}">
</head>
<body class="bg-gray-900 text-white">

<header th:replace="~{fragments/layout :: header}"></header>

<main class="container mx-auto px-6 py-12">
    <section id="articles">
        <h2 class="text-4xl font-bold text-center mb-10">Toutes les Actualités</h2>
        <div class="max-w-4xl mx-auto space-y-8">
            <div th:if="${#lists.isEmpty(articles)}" class="bg-gray-800 rounded-lg p-8 text-center shadow-lg">
                <p class="text-gray-400 text-lg">Aucune actualité n'a été publiée pour le moment.</p>
            </div>
            <div th:each="article : ${articles}" class="bg-gray-800 rounded-lg p-6 shadow-lg">
                <p class="text-sm text-gray-400" th:text="${#temporals.format(article.datePublication, 'dd MMMM yyyy')}"></p>
                <h3 class="text-2xl font-bold text-indigo-400 mt-2 mb-4" th:text="${article.titre}"></h3>
                <p class="text-gray-300 whitespace-pre-wrap" th:text="${article.contenu}"></p>
            </div>
        </div>
    </section>
</main>

<footer class="bg-gray-800 mt-20 py-8">
    <div class="container mx-auto px-6 text-center text-gray-400">
        <div class="flex justify-center space-x-6 mb-6">
            <a href="https://facebook.com/VOTRE_PAGE" target="_blank" class="hover:text-white transition-colors">Facebook</a>
            <a href="https://instagram.com/VOTRE_PROFIL" target="_blank" class="hover:text-white transition-colors">Instagram</a>
        </div>
        <p>© 2025 MARC DUPONT. Tous droits réservés.</p>
    </div>
</footer>

</body>
</html>
