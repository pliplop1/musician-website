<!DOCTYPE html>
<html lang="fr" xmlns:th="http://www.thymeleaf.org">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Paramètres du compte</title>
<link rel="stylesheet" th:href="@{/css/style.css}">
</head>
<body class="bg-gray-100 text-gray-800">

	<header class="bg-white shadow-md">
		<div class="container mx-auto px-4 sm:px-6 py-3 sm:py-4 flex flex-col sm:flex-row justify-between items-center gap-3 sm:gap-0">
			<h1 class="text-xl sm:text-2xl font-bold text-gray-800">Mon Espace</h1>
			<div class="flex flex-wrap items-center gap-2 sm:gap-0">
				<a th:href="@{/user/profile}" class="px-3 sm:px-4 text-sm sm:text-base text-gray-600 hover:text-indigo-600">Retour au profil</a>
				<form th:action="@{/logout}" method="post" class="inline">
					<button type="submit" class="px-3 sm:px-4 text-sm sm:text-base text-gray-600 hover:text-indigo-600">Déconnexion</button>
				</form>
			</div>
		</div>
	</header>

	<main class="container mx-auto px-4 sm:px-6 py-6 sm:py-8">
		<div class="max-w-lg mx-auto bg-white p-4 sm:p-6 md:p-8 rounded-lg shadow-md">
			<h2 class="text-xl sm:text-2xl font-bold mb-4 sm:mb-6 text-center">Paramètres du compte</h2>
			
			<div th:if="${errorMessage}" class="bg-red-100 border-l-4 border-red-500 text-red-700 p-3 sm:p-4 mb-4 sm:mb-6">
				<p class="text-sm sm:text-base" th:text="${errorMessage}"></p>
			</div>
			
			<form th:action="@{/user/profile/update}" th:object="${user}" method="post" class="space-y-4 sm:space-y-6">
				<div>
					<label for="username" class="block text-xs sm:text-sm font-medium text-gray-700">Nom d'utilisateur</label>
					<input type="text" id="username" th:field="*{username}" required
						class="mt-1 block w-full border border-gray-300 rounded-md shadow-sm py-2 px-3 text-sm sm:text-base focus:outline-none focus:ring-2 focus:ring-indigo-500">
				</div>
				<div>
					<label for="email" class="block text-xs sm:text-sm font-medium text-gray-700">Email</label>
					<input type="email" id="email" th:field="*{email}" required
						class="mt-1 block w-full border border-gray-300 rounded-md shadow-sm py-2 px-3 text-sm sm:text-base focus:outline-none focus:ring-2 focus:ring-indigo-500">
				</div>
				<div>
					<button type="submit" class="w-full bg-indigo-600 hover:bg-indigo-700 text-white font-bold py-2 sm:py-3 px-4 rounded-md text-sm sm:text-base transition duration-300">
						Enregistrer les modifications
					</button>
				</div>
			</form>
            
            <div class="mt-6 sm:mt-8 border-t pt-4 sm:pt-6 text-center">
                <a th:href="@{/user/profile/change-password}" class="font-medium text-sm sm:text-base text-indigo-600 hover:text-indigo-500">
                    Changer mon mot de passe
                </a>
            </div>
		</div>
	</main>

</body>
</html>
