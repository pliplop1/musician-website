<!DOCTYPE html>
<html lang="fr" xmlns:th="http://www.thymeleaf.org">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Paramètres du compte - Duo Black & White</title>
<meta name="description" content="Modifiez les paramètres de votre compte Duo Black & White">
<link rel="preload" as="style" th:href="@{/css/style.css(v=${#dates.createNow().time})}" onload="this.onload=null;this.rel='stylesheet'">
<noscript><link rel="stylesheet" th:href="@{/css/style.css(v=${#dates.createNow().time})}"></noscript>
<style>
body {
	background: linear-gradient(135deg, #0f0f23 0%, #1a1a2e 100%);
	min-height: 100vh;
	color: #fff;
	position: relative;
	overflow-x: hidden;
}

.settings-wrapper {
	display: flex;
	align-items: center;
	justify-content: center;
	min-height: calc(100vh - 140px);
	padding: 2rem 1rem;
	position: relative;
	z-index: 1;
}

.settings-container {
	max-width: 600px;
	width: 100%;
	background: rgba(255, 255, 255, 0.97);
	backdrop-filter: blur(10px);
	border-radius: 20px;
	padding: 3rem 2.5rem;
	box-shadow: 0 20px 60px rgba(0, 0, 0, 0.5);
	border: 1px solid rgba(255, 255, 255, 0.1);
	color: #1f2937;
}

h1 {
	text-align: center;
	font-size: 2rem;
	margin-bottom: 2rem;
	color: #1f2937;
}

.alert-error {
	background: rgba(239, 68, 68, 0.1);
	border-left: 4px solid #ef4444;
	padding: 1rem;
	border-radius: 8px;
	margin-bottom: 1.5rem;
	color: #ef4444;
}

.form-group {
	margin-bottom: 1.5rem;
}

label {
	display: block;
	margin-bottom: 0.5rem;
	color: #374151;
	font-size: 0.95rem;
	font-weight: 500;
}

input[type="text"],
input[type="email"] {
	width: 100%;
	padding: 0.75rem 1rem;
	background: rgba(255, 255, 255, 1);
	border: 1px solid #d1d5db;
	border-radius: 8px;
	color: #1f2937;
	font-size: 1rem;
	transition: all 0.3s ease;
}

input[type="text"]:focus,
input[type="email"]:focus {
	outline: none;
	border-color: #4a90e2;
	box-shadow: 0 0 0 3px rgba(74, 144, 226, 0.1);
}

.btn-submit {
	width: 100%;
	padding: 1rem;
	background: linear-gradient(135deg, #4a90e2 0%, #357abd 100%);
	color: #fff;
	border: none;
	border-radius: 8px;
	font-size: 1rem;
	font-weight: 600;
	cursor: pointer;
	transition: all 0.3s ease;
	text-transform: uppercase;
	letter-spacing: 1px;
}

.btn-submit:hover {
	background: linear-gradient(135deg, #357abd 0%, #2868a8 100%);
	transform: translateY(-2px);
	box-shadow: 0 8px 20px rgba(74, 144, 226, 0.3);
}

.links {
	margin-top: 2rem;
	padding-top: 1.5rem;
	border-top: 1px solid #e5e7eb;
	text-align: center;
}

.links a {
	color: #4a90e2;
	text-decoration: none;
	font-weight: 500;
	font-size: 1rem;
	transition: color 0.3s ease;
}

.links a:hover {
	color: #357abd;
	text-decoration: underline;
}

@media (max-width: 480px) {
	.settings-container {
		padding: 2rem 1.5rem;
		margin: 1rem;
	}

	h1 {
		font-size: 1.5rem;
	}
}
</style>
</head>
<body>

<header th:replace="~{fragments/layout :: header}"></header>

<main class="settings-wrapper">
	<div class="settings-container">
		<h1>Paramètres du compte</h1>

		<div th:if="${errorMessage}" class="alert-error" role="alert">
			<p style="margin:0;" th:text="${errorMessage}"></p>
		</div>

		<form th:action="@{/user/profile/update}" th:object="${user}" method="post">
			<div class="form-group">
				<label for="username">Nom d'utilisateur</label>
				<input type="text" id="username" th:field="*{username}" required
					aria-label="Nom d'utilisateur"
					autocomplete="username">
			</div>
			<div class="form-group">
				<label for="email">Email</label>
				<input type="email" id="email" th:field="*{email}" required
					aria-label="Adresse email"
					autocomplete="email">
			</div>
			<div>
				<button type="submit" class="btn-submit">
					Enregistrer les modifications
				</button>
			</div>
			<input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}" />
		</form>

		<div class="links">
			<a th:href="@{/user/profile/change-password}">
				Changer mon mot de passe
			</a>
		</div>
	</div>
</main>

<footer th:replace="~{fragments/layout :: footer}"></footer>

</body>
</html>
