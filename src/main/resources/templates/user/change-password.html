<!DOCTYPE html>
<html lang="fr" xmlns:th="http://www.thymeleaf.org">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Changer mon mot de passe - Duo Black & White</title>
<meta name="description" content="Changez le mot de passe de votre compte Duo Black & White">
<link rel="preload" as="style" th:href="@{/css/style.css(v=${#dates.createNow().time})}" onload="this.onload=null;this.rel='stylesheet'">
<noscript><link rel="stylesheet" th:href="@{/css/style.css(v=${#dates.createNow().time})}"></noscript>
<style>
body {
	background: linear-gradient(135deg, #0f0f23 0%, #1a1a2e 100%);
	min-height: 100vh;
	color: #fff;
	position: relative;
	overflow-x: hidden;
}

.password-wrapper {
	display: flex;
	align-items: center;
	justify-content: center;
	min-height: calc(100vh - 140px);
	padding: 2rem 1rem;
	position: relative;
	z-index: 1;
}

.password-container {
	max-width: 600px;
	width: 100%;
	background: rgba(255, 255, 255, 0.97);
	backdrop-filter: blur(10px);
	border-radius: 20px;
	padding: 3rem 2.5rem;
	box-shadow: 0 20px 60px rgba(0, 0, 0, 0.5);
	border: 1px solid rgba(255, 255, 255, 0.1);
	color: #1f2937;
}

h1 {
	text-align: center;
	font-size: 2rem;
	margin-bottom: 2rem;
	color: #1f2937;
}

.alert-success {
	background: rgba(16, 185, 129, 0.1);
	border-left: 4px solid #10b981;
	padding: 1rem;
	border-radius: 8px;
	margin-bottom: 1.5rem;
	color: #10b981;
}

.alert-error {
	background: rgba(239, 68, 68, 0.1);
	border-left: 4px solid #ef4444;
	padding: 1rem;
	border-radius: 8px;
	margin-bottom: 1.5rem;
	color: #ef4444;
	white-space: pre-wrap;
}

.form-group {
	margin-bottom: 1.5rem;
}

label {
	display: block;
	margin-bottom: 0.5rem;
	color: #374151;
	font-size: 0.95rem;
	font-weight: 500;
}

input[type="password"] {
	width: 100%;
	padding: 0.75rem 1rem;
	background: rgba(255, 255, 255, 1);
	border: 1px solid #d1d5db;
	border-radius: 8px;
	color: #1f2937;
	font-size: 1rem;
	transition: all 0.3s ease;
}

input[type="password"]:focus {
	outline: none;
	border-color: #4a90e2;
	box-shadow: 0 0 0 3px rgba(74, 144, 226, 0.1);
}

.password-hint {
	color: #6b7280;
	font-size: 0.85rem;
	margin-top: 0.5rem;
	line-height: 1.6;
}

.checkbox-group {
	display: flex;
	align-items: center;
	margin-bottom: 1.5rem;
}

input[type="checkbox"] {
	width: 18px;
	height: 18px;
	margin-right: 0.5rem;
	cursor: pointer;
}

.checkbox-group label {
	margin: 0;
	cursor: pointer;
	color: #374151;
}

.btn-submit {
	width: 100%;
	padding: 1rem;
	background: linear-gradient(135deg, #4a90e2 0%, #357abd 100%);
	color: #fff;
	border: none;
	border-radius: 8px;
	font-size: 1rem;
	font-weight: 600;
	cursor: pointer;
	transition: all 0.3s ease;
	text-transform: uppercase;
	letter-spacing: 1px;
}

.btn-submit:hover {
	background: linear-gradient(135deg, #357abd 0%, #2868a8 100%);
	transform: translateY(-2px);
	box-shadow: 0 8px 20px rgba(74, 144, 226, 0.3);
}

@media (max-width: 480px) {
	.password-container {
		padding: 2rem 1.5rem;
		margin: 1rem;
	}

	h1 {
		font-size: 1.5rem;
	}
}
</style>
</head>
<body>

<header th:replace="~{fragments/layout :: header}"></header>

<main class="password-wrapper">
	<div class="password-container">
		<h1>Changer mon mot de passe</h1>

		<div th:if="${successMessage}" class="alert-success" role="alert">
			<p style="margin:0;" th:text="${successMessage}"></p>
		</div>
		<div th:if="${errorMessage}" class="alert-error" role="alert">
			<p style="margin:0;" th:text="${errorMessage}"></p>
		</div>

		<form th:action="@{/user/profile/change-password}" method="post">
			<div class="form-group">
				<label for="oldPassword">Ancien mot de passe</label>
				<input type="password" id="oldPassword" name="oldPassword" required
					aria-label="Ancien mot de passe"
					autocomplete="current-password">
			</div>
			<div class="form-group">
				<label for="newPassword">Nouveau mot de passe</label>
				<input type="password" id="newPassword" name="newPassword" required
					aria-label="Nouveau mot de passe"
					aria-describedby="password-hint"
					autocomplete="new-password">
				<div id="password-hint" class="password-hint">
					Le mot de passe doit contenir au moins : 8 caractères, une majuscule, une minuscule, un chiffre et un caractère spécial (@$!%*?&).
				</div>
			</div>
			<div class="form-group">
				<label for="confirmPassword">Confirmez le nouveau mot de passe</label>
				<input type="password" id="confirmPassword" name="confirmPassword" required
					aria-label="Confirmer le nouveau mot de passe"
					autocomplete="new-password">
			</div>

			<div class="checkbox-group">
				<input id="showPassword" type="checkbox" aria-label="Afficher les mots de passe">
				<label for="showPassword">Afficher les mots de passe</label>
			</div>

			<div>
				<button type="submit" class="btn-submit">
					Changer le mot de passe
				</button>
			</div>
			<input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}" />
		</form>
	</div>
</main>

<footer th:replace="~{fragments/layout :: footer}"></footer>

<script>
(function() {
	'use strict';

	document.addEventListener('DOMContentLoaded', function() {
		const showPasswordCheckbox = document.getElementById('showPassword');
		const oldPassword = document.getElementById('oldPassword');
		const newPassword = document.getElementById('newPassword');
		const confirmPassword = document.getElementById('confirmPassword');

		if (showPasswordCheckbox && oldPassword && newPassword && confirmPassword) {
			showPasswordCheckbox.addEventListener('change', function() {
				const type = this.checked ? 'text' : 'password';
				oldPassword.type = type;
				newPassword.type = type;
				confirmPassword.type = type;
			});
		}
	});
})();
</script>

</body>
</html>
