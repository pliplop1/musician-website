<!DOCTYPE html>
<html lang="fr" xmlns:th="http://www.thymeleaf.org">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Changer mon mot de passe</title>
<link rel="stylesheet" th:href="@{/css/style.css}">
</head>
<body class="bg-gray-100 text-gray-800">

	<header class="bg-white shadow-md">
		<div class="container mx-auto px-4 sm:px-6 py-3 sm:py-4 flex flex-col sm:flex-row justify-between items-center gap-3 sm:gap-0">
			<h1 class="text-xl sm:text-2xl font-bold text-gray-800">Mon Espace</h1>
			<div class="flex flex-wrap items-center gap-2 sm:gap-0">
				<a th:href="@{/user/profile}" class="px-3 sm:px-4 text-sm sm:text-base text-gray-600 hover:text-indigo-600">Retour au profil</a>
				<form th:action="@{/logout}" method="post" class="inline">
					<button type="submit" class="px-3 sm:px-4 text-sm sm:text-base text-gray-600 hover:text-indigo-600">Déconnexion</button>
				</form>
			</div>
		</div>
	</header>

	<main class="container mx-auto px-4 sm:px-6 py-6 sm:py-8">
		<div class="max-w-lg mx-auto bg-white p-4 sm:p-6 md:p-8 rounded-lg shadow-md">
			<h2 class="text-xl sm:text-2xl font-bold mb-4 sm:mb-6 text-center">Changer mon mot de passe</h2>

			<div th:if="${successMessage}" class="bg-green-100 border-l-4 border-green-500 text-green-700 p-3 sm:p-4 mb-4 sm:mb-6">
				<p class="text-sm sm:text-base" th:text="${successMessage}"></p>
			</div>
			<div th:if="${errorMessage}" class="bg-red-100 border-l-4 border-red-500 text-red-700 p-3 sm:p-4 mb-4 sm:mb-6">
				<p class="text-sm sm:text-base whitespace-pre-wrap" th:text="${errorMessage}"></p>
			</div>
			
			<form th:action="@{/user/profile/change-password}" method="post" class="space-y-4 sm:space-y-6">
				<div>
					<label for="oldPassword" class="block text-xs sm:text-sm font-medium text-gray-700">Ancien mot de passe</label>
					<input type="password" id="oldPassword" name="oldPassword" required
						class="mt-1 block w-full border border-gray-300 rounded-md shadow-sm py-2 px-3 text-sm sm:text-base focus:outline-none focus:ring-2 focus:ring-indigo-500">
				</div>
				<div>
					<label for="newPassword" class="block text-xs sm:text-sm font-medium text-gray-700">Nouveau mot de passe</label>
					<input type="password" id="newPassword" name="newPassword" required
						class="mt-1 block w-full border border-gray-300 rounded-md shadow-sm py-2 px-3 text-sm sm:text-base focus:outline-none focus:ring-2 focus:ring-indigo-500">

					<div class="mt-2 text-xs text-gray-500 leading-relaxed">
                        Le mot de passe doit contenir au moins : 8 caractères, une majuscule, une minuscule, un chiffre et un caractère spécial (@$!%*?&).
                    </div>
				</div>
				<div>
					<label for="confirmPassword" class="block text-xs sm:text-sm font-medium text-gray-700">Confirmez le nouveau mot de passe</label>
					<input type="password" id="confirmPassword" name="confirmPassword" required
						class="mt-1 block w-full border border-gray-300 rounded-md shadow-sm py-2 px-3 text-sm sm:text-base focus:outline-none focus:ring-2 focus:ring-indigo-500">
				</div>

                <div class="flex items-center">
                    <input id="showPassword" type="checkbox" class="h-4 w-4 text-indigo-600 border-gray-300 rounded focus:ring-2 focus:ring-indigo-500">
                    <label for="showPassword" class="ml-2 block text-xs sm:text-sm text-gray-900">Afficher les mots de passe</label>
                </div>

				<div>
					<button type="submit" class="w-full bg-indigo-600 hover:bg-indigo-700 text-white font-bold py-2 sm:py-3 px-4 rounded-md text-sm sm:text-base transition duration-300">
						Changer le mot de passe
					</button>
				</div>
			</form>
		</div>
	</main>

    <script>
        document.getElementById('showPassword').addEventListener('change', function(event) {
            const isChecked = event.target.checked;
            document.getElementById('oldPassword').type = isChecked ? 'text' : 'password';
            document.getElementById('newPassword').type = isChecked ? 'text' : 'password';
            document.getElementById('confirmPassword').type = isChecked ? 'text' : 'password';
        });
    </script>

</body>
</html>
