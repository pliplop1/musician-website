<!DOCTYPE html>
<html lang="fr" xmlns:th="http://www.thymeleaf.org">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Mon Profil</title>
<link rel="stylesheet" th:href="@{/css/style.css}">
</head>
<body class="bg-gray-100 text-gray-800">

	<!-- Header -->
	<header class="bg-white shadow-md">
		<div
			class="container mx-auto px-6 py-4 flex justify-between items-center">
			<h1 class="text-2xl font-bold text-gray-800">Mon Espace</h1>
			<nav>
				<a th:href="@{/}" class="px-4 hover:text-indigo-600">Retour au
					site</a>
				<form th:action="@{/logout}" method="post" class="inline">
					<button type="submit"
						class="px-4 py-2 bg-red-600 hover:bg-red-700 text-white rounded-md ml-4">Déconnexion</button>
				</form>
			</nav>
		</div>
	</header>

	<!-- Main Content -->
	<main class="container mx-auto px-6 py-12">
		<div class="bg-white p-8 rounded-lg shadow-lg max-w-2xl mx-auto">
			<h2 class="text-3xl font-bold mb-6 text-center">
				Bienvenue, <span class="text-indigo-600" th:text="${username}"></span>
				!
			</h2>
			<p class="text-center text-gray-600">Cette section est en cours
				de construction. Bientôt, vous pourrez y retrouver des informations
				personnalisées.</p>
		</div>
	</main>

</body>
</html>
