<!DOCTYPE html>
<html lang="fr" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Connexion</title>
    <link rel="stylesheet" th:href="@{/css/style.css}">
</head>
<body class="bg-gray-100 flex items-center justify-center min-h-screen">

    <div class="w-full max-w-md p-8 space-y-8 bg-white rounded-lg shadow-lg">
        <h2 class="text-3xl font-bold text-center text-gray-900">Connexion</h2>

        <div th:if="${successMessage}" class="bg-green-100 border-l-4 border-green-500 text-green-700 p-4" role="alert">
            <p class="font-bold">Succès !</p>
            <p th:text="${successMessage}"></p>
        </div>

        <form class="space-y-6" th:action="@{/login}" method="post">
            <div>
                <label for="username" class="block text-sm font-medium text-gray-700">Nom d'utilisateur</label>
                <input id="username" name="username" type="text" autocomplete="username" required
                       class="w-full px-3 py-2 border border-gray-300 rounded-md shadow-sm focus:outline-none focus:ring-indigo-500 focus:border-indigo-500">
            </div>

            <div>
                <label for="password" class="block text-sm font-medium text-gray-700">Mot de passe</label>
                <input id="password" name="password" type="password" autocomplete="current-password" required
                       class="w-full px-3 py-2 border border-gray-300 rounded-md shadow-sm focus:outline-none focus:ring-indigo-500 focus:border-indigo-500">
            </div>

            <div class="flex items-center">
                <input id="showPassword" type="checkbox" class="h-4 w-4 text-indigo-600 border-gray-300 rounded">
                <label for="showPassword" class="ml-2 block text-sm text-gray-900">Afficher le mot de passe</label>
            </div>

            <div>
                <button type="submit" class="w-full flex justify-center py-2 px-4 border border-transparent rounded-md shadow-sm text-sm font-medium text-white bg-indigo-600 hover:bg-indigo-700">Se connecter</button>
            </div>
        </form>
        
        <div class="space-y-2">
            <p class="text-center text-sm text-gray-600">
                Pas encore de compte ? <a th:href="@{/register}" class="font-medium text-indigo-600 hover:text-indigo-500">Inscrivez-vous</a>
            </p>
            <p class="text-center text-sm text-gray-600">
                <a th:href="@{/}" class="font-medium text-gray-700 hover:text-indigo-500">← Retour à l'accueil</a>
            </p>
        </div>
    </div>

    <script>
        document.getElementById('showPassword').addEventListener('change', function(event) {
            const passwordInput = document.getElementById('password');
            if (event.target.checked) {
                passwordInput.type = 'text';
            } else {
                passwordInput.type = 'password';
            }
        });
    </script>

</body>
</html>
