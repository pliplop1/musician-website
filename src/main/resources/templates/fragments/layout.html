<!DOCTYPE html>
<html lang="fr" xmlns:th="http://www.thymeleaf.org" xmlns:sec="http://www.thymeleaf.org/extras/spring-security">
<body>

    <header th:fragment="header" class="header-black">
        <div class="header-container">
            <a th:href="@{/}" class="header-logo">DUO BLACK & WHITE</a>
            <nav class="header-nav">
                <a th:href="@{/}" th:classappend="${currentUri == '/'} ? 'active' : ''">Accueil</a>
                <a th:href="@{/biographie}" th:classappend="${currentUri == '/biographie'} ? 'active' : ''">Biographie</a>
                <a th:href="@{/galerie}" th:classappend="${currentUri == '/galerie'} ? 'active' : ''">Galerie</a>
                <a th:href="@{/musique}" th:classappend="${currentUri == '/musique'} ? 'active' : ''">Musique</a>
                <a th:href="@{/videos}" th:classappend="${currentUri == '/videos'} ? 'active' : ''">Vidéos</a>
                <a th:href="@{/actualites}" th:classappend="${currentUri == '/actualites'} ? 'active' : ''">Actualités</a>

                <div sec:authorize="!isAuthenticated()" class="auth-section">
                    <a th:href="@{/login}" class="btn-login">Connexion</a>
                </div>

                <div sec:authorize="isAuthenticated()" class="auth-section authenticated">
                    <a th:href="@{/user/profile}" class="user-profile-link">
                        <!-- Avatar avec image si disponible -->
                        <div th:if="${currentUser != null && currentUser.avatarFilename != null}" class="user-avatar-img">
                            <img th:src="@{/uploaded-avatars/{filename}(filename=${currentUser.avatarFilename})}"
                                 th:alt="'Avatar de ' + ${currentUser.username}">
                        </div>

                        <!-- Avatar avec initiales sinon -->
                        <div th:if="${currentUser == null || currentUser.avatarFilename == null}"
                             class="user-avatar-initials">
                            <span th:text="${currentUser != null ? currentUser.initials : '?'}"></span>
                        </div>

                        <span sec:authentication="name" class="username"></span>
                    </a>
                    <a th:href="@{/admin/dashboard}" sec:authorize="hasRole('ADMIN')" class="btn-admin">Admin</a>
                    <form th:action="@{/logout}" method="post" class="logout-form">
                        <button type="submit" class="btn-logout">Déconnexion</button>
                    </form>
                </div>
            </nav>
        </div>

        <style>
            .header-black {
                background: rgba(0, 0, 0, 0.95);
                backdrop-filter: blur(10px);
                box-shadow: 0 2px 20px rgba(0, 0, 0, 0.5);
                position: sticky;
                top: 0;
                z-index: 1000;
                color: #fff;
            }

            .header-container {
                max-width: 1200px;
                margin: 0 auto;
                padding: 1.25rem 2rem;
                display: flex;
                justify-content: space-between;
                align-items: center;
            }

            .header-logo {
                font-size: 1.5rem;
                font-weight: bold;
                letter-spacing: 2px;
                color: #fff;
                text-decoration: none;
                transition: color 0.3s ease;
            }

            .header-logo:hover {
                color: #4a90e2;
            }

            .header-nav {
                display: flex;
                align-items: center;
                gap: 1.5rem;
            }

            .header-nav > a {
                color: #ddd;
                text-decoration: none;
                font-size: 0.95rem;
                transition: color 0.3s ease;
                text-transform: uppercase;
                letter-spacing: 1px;
            }

            .header-nav > a:hover,
            .header-nav > a.active {
                color: #4a90e2;
            }

            .auth-section {
                display: flex;
                align-items: center;
                gap: 0.75rem;
                margin-left: 1rem;
            }

            .btn-login {
                padding: 0.5rem 1.25rem;
                background: linear-gradient(135deg, #4a90e2 0%, #357abd 100%);
                color: #fff !important;
                border-radius: 5px;
                text-decoration: none;
                font-size: 0.9rem;
                transition: all 0.3s ease;
                text-transform: uppercase;
                letter-spacing: 1px;
            }

            .btn-login:hover {
                background: linear-gradient(135deg, #357abd 0%, #2868a8 100%);
                transform: translateY(-2px);
                box-shadow: 0 4px 12px rgba(74, 144, 226, 0.4);
            }

            .user-profile-link {
                display: flex;
                align-items: center;
                gap: 0.5rem;
                padding: 0.5rem 1rem;
                background: rgba(255, 255, 255, 0.05);
                border: 1px solid rgba(255, 255, 255, 0.1);
                border-radius: 25px;
                text-decoration: none;
                transition: all 0.3s ease;
            }

            .user-profile-link:hover {
                background: rgba(255, 255, 255, 0.1);
                border-color: rgba(74, 144, 226, 0.5);
            }

            .user-avatar-img img {
                width: 32px;
                height: 32px;
                border-radius: 50%;
                object-fit: cover;
                border: 2px solid #4a90e2;
                transition: transform 0.3s ease;
            }

            .user-profile-link:hover .user-avatar-img img {
                transform: scale(1.1);
            }

            .user-avatar-initials {
                width: 32px;
                height: 32px;
                border-radius: 50%;
                background: linear-gradient(135deg, #4a90e2 0%, #357abd 100%);
                display: flex;
                align-items: center;
                justify-content: center;
                color: #fff;
                font-weight: bold;
                font-size: 0.85rem;
                transition: transform 0.3s ease;
            }

            .user-profile-link:hover .user-avatar-initials {
                transform: scale(1.1);
            }

            .username {
                color: #4a90e2;
                font-weight: 600;
                font-size: 0.9rem;
            }

            .btn-admin {
                padding: 0.5rem 1rem;
                background: linear-gradient(135deg, #f59e0b 0%, #d97706 100%);
                color: #fff !important;
                border-radius: 5px;
                text-decoration: none;
                font-size: 0.9rem;
                font-weight: 600;
                transition: all 0.3s ease;
                text-transform: uppercase;
                letter-spacing: 1px;
            }

            .btn-admin:hover {
                background: linear-gradient(135deg, #d97706 0%, #b45309 100%);
                transform: translateY(-2px);
                box-shadow: 0 4px 12px rgba(245, 158, 11, 0.4);
            }

            .logout-form {
                display: inline;
            }

            .btn-logout {
                padding: 0.5rem 1rem;
                background: transparent;
                border: 1px solid rgba(255, 255, 255, 0.2);
                color: #ddd;
                border-radius: 5px;
                cursor: pointer;
                font-size: 0.9rem;
                transition: all 0.3s ease;
                text-transform: uppercase;
                letter-spacing: 1px;
            }

            .btn-logout:hover {
                background: rgba(239, 68, 68, 0.1);
                border-color: #ef4444;
                color: #ef4444;
            }
        </style>
    </header>

    <footer th:fragment="footer" class="bg-gray-800 mt-20 py-8">
        <div class="container mx-auto px-6 text-center text-gray-400">
            <div class="flex justify-center space-x-6 mb-6" th:if="${!#lists.isEmpty(enabledSocialLinks)}">
                <a th:each="link : ${enabledSocialLinks}"
                   th:href="${link.url}"
                   target="_blank"
                   rel="noopener noreferrer"
                   class="hover:text-white transition-colors flex items-center gap-2"
                   th:aria-label="'Visiter notre page ' + ${link.name} + ' (ouvre dans un nouvel onglet)'"
                   th:title="${link.name}">
                    <i th:class="${link.icon} + ' text-xl'" aria-hidden="true"></i>
                    <span th:text="${link.name}"></span>
                </a>
            </div>
            <div th:if="${#lists.isEmpty(enabledSocialLinks)}" class="mb-6 text-sm">
                <p>Aucun réseau social configuré</p>
            </div>
            <p>© 2025 Duo Black & White. Tous droits réservés.</p>
            <div style="margin-top: 1.5rem;">
                <a th:href="@{/privacy-policy}" style="color: #888; text-decoration: none; margin: 0 0.5rem;">Politique de confidentialité</a> |
                <a th:href="@{/mentions-legales}" style="color: #888; text-decoration: none; margin: 0 0.5rem;">Mentions légales</a> |
                <a th:href="@{/cookies}" style="color: #888; text-decoration: none; margin: 0 0.5rem;">Cookies</a>
            </div>
        </div>
    </footer>

</body>
</html>
