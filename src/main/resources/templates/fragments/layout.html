<!DOCTYPE html>
<html lang="fr" xmlns:th="http://www.thymeleaf.org" xmlns:sec="http://www.thymeleaf.org/extras/spring-security">
<body>

    <a href="#main-content" class="skip-link">Aller au contenu</a>

    <header th:fragment="header" class="header-black">
        <div class="header-container">
            <a th:href="@{/}" class="header-logo">DUO BLACK & WHITE</a>

            <!-- Bouton burger pour mobile -->
            <button class="mobile-menu-toggle" aria-label="Menu" aria-expanded="false" id="mobileMenuToggle">
                <span class="burger-line"></span>
            </button>

            <nav class="header-nav" id="headerNav" aria-label="Navigation principale">
                <a th:href="@{/}" th:classappend="${currentUri == '/'} ? 'active' : ''" aria-current="${currentUri == '/'} ? 'page' : 'false'">Accueil</a>
                <a th:href="@{/biographie}" th:classappend="${currentUri == '/biographie'} ? 'active' : ''" aria-current="${currentUri == '/biographie'} ? 'page' : 'false'">Biographie</a>
                <a th:href="@{/galerie}" th:classappend="${currentUri == '/galerie'} ? 'active' : ''" aria-current="${currentUri == '/galerie'} ? 'page' : 'false'">Galerie</a>
                <a th:href="@{/musique}" th:classappend="${currentUri == '/musique'} ? 'active' : ''" aria-current="${currentUri == '/musique'} ? 'page' : 'false'">Musique</a>
                <a th:href="@{/videos}" th:classappend="${currentUri == '/videos'} ? 'active' : ''" aria-current="${currentUri == '/videos'} ? 'page' : 'false'">Vidéos</a>
                <a th:href="@{/actualites}" th:classappend="${currentUri == '/actualites'} ? 'active' : ''" aria-current="${currentUri == '/actualites'} ? 'page' : 'false'">Actualités</a>
            </nav>

            <!-- Section Auth séparée à droite -->
            <div class="header-auth">
                <!-- Bouton Connexion si non authentifié -->
                <div sec:authorize="!isAuthenticated()">
                    <a th:href="@{/login}" class="btn-login" aria-label="Se connecter">Connexion</a>
                </div>

                <!-- Menu utilisateur si authentifié -->
                <div sec:authorize="isAuthenticated()" class="user-menu-wrapper">
                    <button class="user-menu-button" id="userMenuButton" aria-expanded="false" aria-haspopup="true" aria-label="Menu utilisateur">
                        <!-- Avatar -->
                        <div th:if="${currentUser != null && currentUser.avatarFilename != null}" class="user-avatar-img">
                            <img th:src="@{/uploaded-avatars/{filename}(filename=${currentUser.avatarFilename})}"
                                 th:alt="'Avatar de ' + ${currentUser.username}" loading="lazy" decoding="async" width="40" height="40">
                        </div>
                        <div th:if="${currentUser == null || currentUser.avatarFilename == null}"
                             class="user-avatar-initials" aria-hidden="true">
                            <span th:text="${currentUser != null ? currentUser.initials : '?'}"></span>
                        </div>
                        <span sec:authentication="name" class="username"></span>
                        <svg class="dropdown-icon" width="12" height="12" viewBox="0 0 12 12" fill="currentColor" aria-hidden="true">
                            <path d="M6 9L1 4h10L6 9z"/>
                        </svg>
                    </button>

                    <!-- Dropdown menu -->
                    <div class="user-dropdown" id="userDropdown" role="menu" aria-labelledby="userMenuButton">
                        <a th:href="@{/user/profile}" class="dropdown-item" role="menuitem">
                            <svg width="16" height="16" viewBox="0 0 16 16" fill="currentColor" aria-hidden="true">
                                <path d="M8 8a3 3 0 100-6 3 3 0 000 6zm0 1.5c-2.3 0-7 1.15-7 3.5v1.5h14V13c0-2.35-4.7-3.5-7-3.5z"/>
                            </svg>
                            Mon Profil
                        </a>
                        <a th:href="@{/admin/dashboard}" sec:authorize="hasRole('ADMIN')" class="dropdown-item admin-item" role="menuitem">
                            <svg width="16" height="16" viewBox="0 0 16 16" fill="currentColor" aria-hidden="true">
                                <path d="M13.5 1h-11A1.5 1.5 0 001 2.5v11A1.5 1.5 0 002.5 15h11a1.5 1.5 0 001.5-1.5v-11A1.5 1.5 0 0013.5 1zm-10 12a.5.5 0 01-.5-.5v-9a.5.5 0 01.5-.5h9a.5.5 0 01.5.5v9a.5.5 0 01-.5.5h-9z"/>
                            </svg>
                            Administration
                        </a>
                        <div class="dropdown-divider"></div>
                        <form th:action="@{/logout}" method="post" style="margin: 0;">
                            <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}"/>
                            <button type="submit" class="dropdown-item logout-item" role="menuitem">
                                <svg width="16" height="16" viewBox="0 0 16 16" fill="currentColor" aria-hidden="true">
                                    <path d="M10 12.5a.5.5 0 01-.5.5h-6a.5.5 0 01-.5-.5v-9a.5.5 0 01.5-.5h6a.5.5 0 01.5.5V5a.5.5 0 001 0V3.5A1.5 1.5 0 009.5 2h-6A1.5 1.5 0 002 3.5v9A1.5 1.5 0 003.5 14h6a1.5 1.5 0 001.5-1.5V11a.5.5 0 00-1 0v1.5zm3.854-8.354a.5.5 0 00-.708 0L11 6.293V.5a.5.5 0 00-1 0v5.793L7.854 4.146a.5.5 0 10-.708.708l3 3a.5.5 0 00.708 0l3-3a.5.5 0 000-.708z"/>
                                </svg>
                                Déconnexion
                            </button>
                        </form>
                    </div>
                </div>
            </div>
        </div>

        <!-- Script menu burger mobile -->
        <script>
            (function() {
                'use strict';

                document.addEventListener('DOMContentLoaded', function() {
                    const menuToggle = document.getElementById('mobileMenuToggle');
                    const headerNav = document.getElementById('headerNav');

                    if (!menuToggle || !headerNav) return;

                    function closeMenu() {
                        headerNav.classList.remove('active');
                        menuToggle.setAttribute('aria-expanded', 'false');
                        document.body.style.overflow = '';
                    }

                    function openMenu() {
                        headerNav.classList.add('active');
                        menuToggle.setAttribute('aria-expanded', 'true');
                        document.body.style.overflow = 'hidden';
                    }

                    // Toggle du menu
                    menuToggle.addEventListener('click', function(e) {
                        e.stopPropagation();
                        e.preventDefault();

                        const isOpen = headerNav.classList.contains('active');
                        isOpen ? closeMenu() : openMenu();
                    });

                    // Fermer le menu en cliquant sur un lien
                    const navLinks = headerNav.querySelectorAll('a, button');
                    navLinks.forEach(function(link) {
                        link.addEventListener('click', closeMenu);
                    });

                    // Fermer le menu avec Escape (seulement si ouvert)
                    document.addEventListener('keydown', function(e) {
                        if (e.key === 'Escape' && headerNav.classList.contains('active')) {
                            closeMenu();
                        }
                    });

                    // Fermer en cliquant à l'extérieur
                    document.addEventListener('click', function(e) {
                        if (headerNav.classList.contains('active') &&
                            !headerNav.contains(e.target) &&
                            !menuToggle.contains(e.target)) {
                            closeMenu();
                        }
                    });

                    // Gestion du lien de réinitialisation des cookies
                    const cookieResetLink = document.getElementById('cookieResetLink');
                    if (cookieResetLink) {
                        cookieResetLink.addEventListener('click', function(e) {
                            e.preventDefault();
                            if (typeof window.resetCookieConsent === 'function') {
                                window.resetCookieConsent();
                            }
                        });
                    }

                    // Gestion du menu déroulant utilisateur
                    const userMenuButton = document.getElementById('userMenuButton');
                    const userDropdown = document.getElementById('userDropdown');

                    if (userMenuButton && userDropdown) {
                        function closeDropdown() {
                            userDropdown.classList.remove('active');
                            userMenuButton.setAttribute('aria-expanded', 'false');
                        }

                        function openDropdown() {
                            userDropdown.classList.add('active');
                            userMenuButton.setAttribute('aria-expanded', 'true');
                        }

                        function toggleDropdown(e) {
                            e.stopPropagation();
                            const isOpen = userDropdown.classList.contains('active');
                            isOpen ? closeDropdown() : openDropdown();
                        }

                        // Toggle au clic sur le bouton
                        userMenuButton.addEventListener('click', toggleDropdown);

                        // Fermer au clic à l'extérieur
                        document.addEventListener('click', function(e) {
                            if (!userMenuButton.contains(e.target) && !userDropdown.contains(e.target)) {
                                closeDropdown();
                            }
                        });

                        // Fermer avec Escape
                        document.addEventListener('keydown', function(e) {
                            if (e.key === 'Escape' && userDropdown.classList.contains('active')) {
                                closeDropdown();
                                userMenuButton.focus();
                            }
                        });
                    }
                });
            })();
        </script>

        <style>
            .skip-link {
                position: absolute;
                left: -9999px;
                top: 0;
                background: #4a90e2;
                color: #fff;
                padding: 8px 12px;
                z-index: 10000;
            }
            .skip-link:focus {
                left: 8px;
                top: 8px;
                outline: 3px solid #fff;
            }
            .header-black {
                background: rgba(0, 0, 0, 0.95);
                backdrop-filter: blur(10px);
                box-shadow: 0 2px 20px rgba(0, 0, 0, 0.5);
                position: sticky;
                top: 0;
                z-index: 1000;
                color: #fff;
            }

            .header-container {
                max-width: 1200px;
                margin: 0 auto;
                padding: 1.25rem 2rem;
                display: flex;
                justify-content: space-between;
                align-items: center;
                position: relative;
            }

            .header-logo {
                font-size: 1.5rem;
                font-weight: bold;
                letter-spacing: 2px;
                color: #fff;
                text-decoration: none;
                transition: color 0.3s ease;
                z-index: 1001;
            }

            .header-logo:hover {
                color: #4a90e2;
            }

            /* Bouton burger (caché par défaut sur desktop) */
            .mobile-menu-toggle {
                display: none;
                background: transparent;
                border: none;
                cursor: pointer;
                padding: 0.5rem;
                z-index: 1001;
            }

            .mobile-menu-toggle:focus {
                outline: 3px solid #4a90e2;
                outline-offset: 4px;
            }

            .burger-line {
                display: block;
                width: 30px;
                height: 3px;
                background: #fff;
                position: relative;
                transition: all 0.3s ease;
            }

            .burger-line::before,
            .burger-line::after {
                content: '';
                position: absolute;
                width: 30px;
                height: 3px;
                background: #fff;
                transition: all 0.3s ease;
            }

            .burger-line::before {
                top: -10px;
            }

            .burger-line::after {
                bottom: -10px;
            }

            .mobile-menu-toggle[aria-expanded="true"] .burger-line {
                background: transparent;
            }

            .mobile-menu-toggle[aria-expanded="true"] .burger-line::before {
                top: 0;
                transform: rotate(45deg);
            }

            .mobile-menu-toggle[aria-expanded="true"] .burger-line::after {
                bottom: 0;
                transform: rotate(-45deg);
            }

            .header-nav {
                display: flex;
                align-items: center;
                gap: 2rem;
            }

            .header-nav > a {
                color: #ddd;
                text-decoration: none;
                font-size: 1rem;
                transition: color 0.3s ease;
                text-transform: uppercase;
                letter-spacing: 1px;
                white-space: nowrap;
                position: relative;
            }

            .header-nav > a:hover,
            .header-nav > a.active {
                color: #4a90e2;
            }

            .header-nav > a:focus {
                outline: 3px solid #4a90e2;
                outline-offset: 4px;
                color: #4a90e2;
            }

            /* Section Auth (bouton login ou menu utilisateur) */
            .header-auth {
                display: flex;
                align-items: center;
                margin-left: 2rem;
            }

            .btn-login {
                padding: 0.5rem 1.25rem;
                background: linear-gradient(135deg, #4a90e2 0%, #357abd 100%);
                color: #fff !important;
                border-radius: 5px;
                text-decoration: none;
                font-size: 0.9rem;
                transition: all 0.3s ease;
                text-transform: uppercase;
                letter-spacing: 1px;
                white-space: nowrap;
            }

            .btn-login:hover {
                background: linear-gradient(135deg, #357abd 0%, #2868a8 100%);
                transform: translateY(-2px);
                box-shadow: 0 4px 12px rgba(74, 144, 226, 0.4);
            }

            .btn-login:focus {
                outline: 3px solid #fff;
                outline-offset: 2px;
            }

            /* Menu utilisateur déroulant */
            .user-menu-wrapper {
                position: relative;
            }

            .user-menu-button {
                display: flex;
                align-items: center;
                gap: 0.75rem;
                padding: 0.5rem 1rem;
                background: rgba(255, 255, 255, 0.08);
                border: 1px solid rgba(74, 144, 226, 0.3);
                border-radius: 30px;
                color: #fff;
                cursor: pointer;
                transition: all 0.3s ease;
                white-space: nowrap;
            }

            .user-menu-button:hover {
                background: rgba(255, 255, 255, 0.12);
                border-color: rgba(74, 144, 226, 0.5);
            }

            .user-menu-button:focus {
                outline: 3px solid #fff;
                outline-offset: 2px;
            }

            .user-avatar-img img {
                width: 32px;
                height: 32px;
                border-radius: 50%;
                object-fit: cover;
                border: 2px solid #4a90e2;
            }

            .user-avatar-initials {
                width: 32px;
                height: 32px;
                border-radius: 50%;
                background: linear-gradient(135deg, #4a90e2 0%, #357abd 100%);
                display: flex;
                align-items: center;
                justify-content: center;
                color: #fff;
                font-weight: bold;
                font-size: 0.9rem;
            }

            .username {
                color: #fff;
                font-weight: 600;
                font-size: 0.95rem;
            }

            .dropdown-icon {
                transition: transform 0.3s ease;
            }

            .user-menu-button[aria-expanded="true"] .dropdown-icon {
                transform: rotate(180deg);
            }

            /* Dropdown menu */
            .user-dropdown {
                position: absolute;
                top: calc(100% + 0.5rem);
                right: 0;
                min-width: 200px;
                background: rgba(0, 0, 0, 0.95);
                backdrop-filter: blur(10px);
                border: 1px solid rgba(74, 144, 226, 0.3);
                border-radius: 8px;
                box-shadow: 0 8px 24px rgba(0, 0, 0, 0.5);
                opacity: 0;
                visibility: hidden;
                transform: translateY(-10px);
                transition: all 0.3s ease;
                z-index: 1002;
            }

            .user-dropdown.active {
                opacity: 1;
                visibility: visible;
                transform: translateY(0);
            }

            .dropdown-item {
                display: flex;
                align-items: center;
                gap: 0.75rem;
                padding: 0.75rem 1rem;
                color: #ddd;
                text-decoration: none;
                font-size: 0.95rem;
                transition: all 0.2s ease;
                border: none;
                background: transparent;
                width: 100%;
                text-align: left;
                cursor: pointer;
            }

            .dropdown-item:first-child {
                border-radius: 8px 8px 0 0;
            }

            .dropdown-item:last-child {
                border-radius: 0 0 8px 8px;
            }

            .dropdown-item:hover {
                background: rgba(74, 144, 226, 0.15);
                color: #4a90e2;
            }

            .dropdown-item:focus {
                outline: 2px solid #4a90e2;
                outline-offset: -2px;
                background: rgba(74, 144, 226, 0.15);
                color: #4a90e2;
            }

            .dropdown-item.admin-item:hover {
                background: rgba(245, 158, 11, 0.15);
                color: #f59e0b;
            }

            .dropdown-item.admin-item:focus {
                outline-color: #f59e0b;
                background: rgba(245, 158, 11, 0.15);
                color: #f59e0b;
            }

            .dropdown-item.logout-item:hover {
                background: rgba(239, 68, 68, 0.15);
                color: #ef4444;
            }

            .dropdown-item.logout-item:focus {
                outline-color: #ef4444;
                background: rgba(239, 68, 68, 0.15);
                color: #ef4444;
            }

            .dropdown-divider {
                height: 1px;
                background: rgba(255, 255, 255, 0.1);
                margin: 0.25rem 0;
            }

            /* ============================================ */
            /* RESPONSIVE MOBILE */
            /* ============================================ */

            @media (max-width: 1024px) {
                .header-container {
                    padding: 1rem 1.5rem;
                }

                .header-nav {
                    gap: 1rem;
                }

                .header-nav > a {
                    font-size: 0.85rem;
                }

                .header-logo {
                    font-size: 1.3rem;
                }

                .btn-login,
                .btn-admin,
                .btn-logout {
                    font-size: 0.8rem;
                    padding: 0.4rem 0.9rem;
                }
            }

            @media (max-width: 900px) {
                /* Afficher le bouton burger */
                .mobile-menu-toggle {
                    display: block;
                }

                /* Menu mobile dropdown en dessous du header */
                .header-nav {
                    position: fixed;
                    top: 80px; /* En dessous du header */
                    left: 0;
                    right: 0;
                    width: 100%;
                    height: 0; /* Caché par défaut */
                    max-height: 0;
                    overflow: hidden;
                    background: rgba(0, 0, 0, 0.98);
                    backdrop-filter: blur(10px);
                    flex-direction: column;
                    justify-content: flex-start;
                    align-items: center;
                    gap: 0;
                    transition: max-height 0.3s ease, padding 0.3s ease;
                    box-shadow: 0 5px 30px rgba(0, 0, 0, 0.5);
                    padding: 0;
                    z-index: 999;
                }

                .header-nav.active {
                    max-height: calc(100vh - 80px); /* S'ouvre en dessous */
                    height: auto;
                    padding: 2rem 0;
                    overflow-y: auto;
                }

                .header-nav > a {
                    font-size: 1.2rem;
                    padding: 1rem 2rem;
                    width: 100%;
                    text-align: center;
                    transition: all 0.3s ease;
                    border-bottom: 1px solid rgba(255, 255, 255, 0.1);
                }

                .header-nav > a:hover,
                .header-nav > a.active {
                    color: #4a90e2;
                    transform: translateX(10px);
                }

                /* Auth section sur mobile */
                .header-auth {
                    position: absolute;
                    top: 1rem;
                    right: 4rem;
                    margin-left: 0;
                }

                .btn-login {
                    padding: 0.5rem 1rem;
                    font-size: 0.85rem;
                }

                /* Dropdown utilisateur adapté au mobile */
                .user-menu-button {
                    padding: 0.4rem 0.8rem;
                    gap: 0.5rem;
                }

                .username {
                    display: none; /* Cache le nom sur mobile */
                }

                .user-dropdown {
                    right: 0;
                    min-width: 180px;
                }
            }

            @media (max-width: 480px) {
                .header-container {
                    padding: 1rem;
                }

                .header-logo {
                    font-size: 1rem;
                    letter-spacing: 1px;
                }

                .mobile-menu-toggle {
                    width: 1.75rem;
                    height: 1.75rem;
                }

                .burger-line {
                    width: 1.75rem;
                    height: 0.2rem;
                }

                .header-nav {
                    width: 90%;
                }

                .header-nav > a {
                    font-size: 1rem;
                }
            }
        </style>
    </header>

    <footer th:fragment="footer" class="bg-gray-800 mt-12 md:mt-20 py-6 md:py-8">
        <div class="container mx-auto px-4 md:px-6 text-center text-gray-400">
            <!-- Réseaux sociaux responsive -->
            <div class="flex flex-wrap justify-center gap-3 sm:gap-4 md:gap-6 mb-6" th:if="${!#lists.isEmpty(enabledSocialLinks)}">
                <a th:each="link : ${enabledSocialLinks}"
                   th:href="${link.url}"
                   target="_blank"
                   rel="noopener noreferrer"
                   class="hover:text-white transition-colors flex items-center gap-2 text-sm sm:text-base"
                   th:aria-label="'Visiter notre page ' + ${link.name} + ' (ouvre dans un nouvel onglet)'"
                   th:title="${link.name}">
                    <i th:class="${link.icon} + ' text-lg sm:text-xl'" aria-hidden="true"></i>
                    <span th:text="${link.name}" class="hidden sm:inline"></span>
                </a>
            </div>
            <div th:if="${#lists.isEmpty(enabledSocialLinks)}" class="mb-6 text-xs sm:text-sm">
                <p>Aucun réseau social configuré</p>
            </div>
            <!-- Copyright responsive -->
            <p class="text-xs sm:text-sm md:text-base mb-4">© 2025 Duo Black & White. Tous droits réservés.</p>

            <!-- Liens légaux responsive (colonnes sur mobile, ligne sur desktop) -->
            <nav aria-label="Liens légaux" class="flex flex-col sm:flex-row flex-wrap justify-center items-center gap-2 sm:gap-1 text-xs sm:text-sm">
                <a th:href="@{/privacy-policy}" class="text-gray-500 hover:text-gray-300 transition-colors px-2 py-1">Politique de confidentialité</a>
                <span class="hidden sm:inline text-gray-600" aria-hidden="true">|</span>
                <a th:href="@{/mentions-legales}" class="text-gray-500 hover:text-gray-300 transition-colors px-2 py-1">Mentions légales</a>
                <span class="hidden sm:inline text-gray-600" aria-hidden="true">|</span>
                <a th:href="@{/cookies}" class="text-gray-500 hover:text-gray-300 transition-colors px-2 py-1">Cookies</a>
                <span class="hidden sm:inline text-gray-600" aria-hidden="true">|</span>
                <a href="#" id="cookieResetLink" class="text-gray-500 hover:text-gray-300 transition-colors px-2 py-1">Gérer les cookies</a>
</nav>
        </div>
    </footer>

</body>
</html>
