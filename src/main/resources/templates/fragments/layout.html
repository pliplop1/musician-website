<!DOCTYPE html>
<html lang="fr" xmlns:th="http://www.thymeleaf.org" xmlns:sec="http://www.thymeleaf.org/extras/spring-security">
<body>

    <a href="#main-content" class="skip-link">Aller au contenu</a>

    <header th:fragment="header" class="header-black">
        <div class="header-container">
            <a th:href="@{/}" class="header-logo">DUO BLACK & WHITE</a>

            <!-- Bouton burger pour mobile -->
            <button class="mobile-menu-toggle" aria-label="Menu" aria-expanded="false" id="mobileMenuToggle">
                <span class="burger-line"></span>
                <span class="burger-line"></span>
                <span class="burger-line"></span>
            </button>

            <nav class="header-nav" id="headerNav">
                <a th:href="@{/}" th:classappend="${currentUri == '/'} ? 'active' : ''">Accueil</a>
                <a th:href="@{/biographie}" th:classappend="${currentUri == '/biographie'} ? 'active' : ''">Biographie</a>
                <a th:href="@{/galerie}" th:classappend="${currentUri == '/galerie'} ? 'active' : ''">Galerie</a>
                <a th:href="@{/musique}" th:classappend="${currentUri == '/musique'} ? 'active' : ''">Musique</a>
                <a th:href="@{/videos}" th:classappend="${currentUri == '/videos'} ? 'active' : ''">Vidéos</a>
                <a th:href="@{/actualites}" th:classappend="${currentUri == '/actualites'} ? 'active' : ''">Actualités</a>

                <div sec:authorize="!isAuthenticated()" class="auth-section">
                    <a th:href="@{/login}" class="btn-login">Connexion</a>
                </div>

                <div sec:authorize="isAuthenticated()" class="auth-section authenticated">
                    <a th:href="@{/user/profile}" class="user-profile-link">
                        <!-- Avatar avec image si disponible -->
                        <div th:if="${currentUser != null && currentUser.avatarFilename != null}" class="user-avatar-img">
                            <img th:src="@{/uploaded-avatars/{filename}(filename=${currentUser.avatarFilename})}"
                                 th:alt="'Avatar de ' + ${currentUser.username}" loading="lazy" decoding="async" width="32" height="32">
                        </div>

                        <!-- Avatar avec initiales sinon -->
                        <div th:if="${currentUser == null || currentUser.avatarFilename == null}"
                             class="user-avatar-initials">
                            <span th:text="${currentUser != null ? currentUser.initials : '?'}"></span>
                        </div>

                        <span sec:authentication="name" class="username"></span>
                    </a>
                    <a th:href="@{/admin/dashboard}" sec:authorize="hasRole('ADMIN')" class="btn-admin">Admin</a>
                    <form th:action="@{/logout}" method="post" class="logout-form">
                        <button type="submit" class="btn-logout">Déconnexion</button>
                    </form>
                </div>
            </nav>
        </div>

        <style>
            .skip-link {
                position: absolute;
                left: -9999px;
                top: 0;
                background: #4a90e2;
                color: #fff;
                padding: 8px 12px;
                z-index: 10000;
            }
            .skip-link:focus {
                left: 8px;
                top: 8px;
                outline: 3px solid #fff;
            }
            .header-black {
                background: rgba(0, 0, 0, 0.95);
                backdrop-filter: blur(10px);
                box-shadow: 0 2px 20px rgba(0, 0, 0, 0.5);
                position: sticky;
                top: 0;
                z-index: 1000;
                color: #fff;
            }

            .header-container {
                max-width: 1200px;
                margin: 0 auto;
                padding: 1.25rem 2rem;
                display: flex;
                justify-content: space-between;
                align-items: center;
                position: relative;
            }

            .header-logo {
                font-size: 1.5rem;
                font-weight: bold;
                letter-spacing: 2px;
                color: #fff;
                text-decoration: none;
                transition: color 0.3s ease;
                z-index: 1001;
            }

            .header-logo:hover {
                color: #4a90e2;
            }

            /* Bouton burger (caché par défaut sur desktop) */
            .mobile-menu-toggle {
                display: none;
                flex-direction: column;
                justify-content: space-around;
                width: 2rem;
                height: 2rem;
                background: transparent;
                border: none;
                cursor: pointer;
                padding: 0;
                z-index: 1001;
            }

            .burger-line {
                width: 2rem;
                height: 0.25rem;
                background: #fff;
                border-radius: 10px;
                transition: all 0.3s ease;
            }

            .mobile-menu-toggle[aria-expanded="true"] .burger-line:nth-child(1) {
                transform: rotate(45deg) translate(0.5rem, 0.5rem);
            }

            .mobile-menu-toggle[aria-expanded="true"] .burger-line:nth-child(2) {
                opacity: 0;
            }

            .mobile-menu-toggle[aria-expanded="true"] .burger-line:nth-child(3) {
                transform: rotate(-45deg) translate(0.5rem, -0.5rem);
            }

            .header-nav {
                display: flex;
                align-items: center;
                gap: 1.5rem;
            }

            .header-nav > a {
                color: #ddd;
                text-decoration: none;
                font-size: 0.95rem;
                transition: color 0.3s ease;
                text-transform: uppercase;
                letter-spacing: 1px;
            }

            .header-nav > a:hover,
            .header-nav > a.active {
                color: #4a90e2;
            }

            .auth-section {
                display: flex;
                align-items: center;
                gap: 0.75rem;
                margin-left: 1rem;
            }

            .btn-login {
                padding: 0.5rem 1.25rem;
                background: linear-gradient(135deg, #4a90e2 0%, #357abd 100%);
                color: #fff !important;
                border-radius: 5px;
                text-decoration: none;
                font-size: 0.9rem;
                transition: all 0.3s ease;
                text-transform: uppercase;
                letter-spacing: 1px;
            }

            .btn-login:hover {
                background: linear-gradient(135deg, #357abd 0%, #2868a8 100%);
                transform: translateY(-2px);
                box-shadow: 0 4px 12px rgba(74, 144, 226, 0.4);
            }

            .user-profile-link {
                display: flex;
                align-items: center;
                gap: 0.5rem;
                padding: 0.5rem 1rem;
                background: rgba(255, 255, 255, 0.05);
                border: 1px solid rgba(255, 255, 255, 0.1);
                border-radius: 25px;
                text-decoration: none;
                transition: all 0.3s ease;
            }

            .user-profile-link:hover {
                background: rgba(255, 255, 255, 0.1);
                border-color: rgba(74, 144, 226, 0.5);
            }

            .user-avatar-img img {
                width: 32px;
                height: 32px;
                border-radius: 50%;
                object-fit: cover;
                border: 2px solid #4a90e2;
                transition: transform 0.3s ease;
            }

            .user-profile-link:hover .user-avatar-img img {
                transform: scale(1.1);
            }

            .user-avatar-initials {
                width: 32px;
                height: 32px;
                border-radius: 50%;
                background: linear-gradient(135deg, #4a90e2 0%, #357abd 100%);
                display: flex;
                align-items: center;
                justify-content: center;
                color: #fff;
                font-weight: bold;
                font-size: 0.85rem;
                transition: transform 0.3s ease;
            }

            .user-profile-link:hover .user-avatar-initials {
                transform: scale(1.1);
            }

            .username {
                color: #4a90e2;
                font-weight: 600;
                font-size: 0.9rem;
            }

            .btn-admin {
                padding: 0.5rem 1rem;
                background: linear-gradient(135deg, #f59e0b 0%, #d97706 100%);
                color: #fff !important;
                border-radius: 5px;
                text-decoration: none;
                font-size: 0.9rem;
                font-weight: 600;
                transition: all 0.3s ease;
                text-transform: uppercase;
                letter-spacing: 1px;
            }

            .btn-admin:hover {
                background: linear-gradient(135deg, #d97706 0%, #b45309 100%);
                transform: translateY(-2px);
                box-shadow: 0 4px 12px rgba(245, 158, 11, 0.4);
            }

            .logout-form {
                display: inline;
            }

            .btn-logout {
                padding: 0.5rem 1rem;
                background: transparent;
                border: 1px solid rgba(255, 255, 255, 0.2);
                color: #ddd;
                border-radius: 5px;
                cursor: pointer;
                font-size: 0.9rem;
                transition: all 0.3s ease;
                text-transform: uppercase;
                letter-spacing: 1px;
            }

            .btn-logout:hover {
                background: rgba(239, 68, 68, 0.1);
                border-color: #ef4444;
                color: #ef4444;
            }

            /* ============================================ */
            /* RESPONSIVE MOBILE */
            /* ============================================ */

            @media (max-width: 1024px) {
                .header-container {
                    padding: 1rem 1.5rem;
                }

                .header-nav {
                    gap: 1rem;
                }

                .header-nav > a {
                    font-size: 0.85rem;
                }

                .header-logo {
                    font-size: 1.3rem;
                }

                .btn-login,
                .btn-admin,
                .btn-logout {
                    font-size: 0.8rem;
                    padding: 0.4rem 0.9rem;
                }
            }

            @media (max-width: 900px) {
                /* Afficher le bouton burger */
                .mobile-menu-toggle {
                    display: flex;
                }

                /* Menu mobile en fullscreen overlay */
                .header-nav {
                    position: fixed;
                    top: 0;
                    right: -100%;
                    width: 80%;
                    max-width: 400px;
                    height: 100vh;
                    background: rgba(0, 0, 0, 0.98);
                    backdrop-filter: blur(10px);
                    flex-direction: column;
                    justify-content: center;
                    align-items: center;
                    gap: 2rem;
                    transition: right 0.4s cubic-bezier(0.68, -0.55, 0.265, 1.55);
                    box-shadow: -5px 0 30px rgba(0, 0, 0, 0.5);
                    padding: 2rem;
                    overflow-y: auto;
                }

                .header-nav.active {
                    right: 0;
                }

                .header-nav > a {
                    font-size: 1.2rem;
                    padding: 0.75rem 1.5rem;
                    border-radius: 10px;
                    width: 100%;
                    text-align: center;
                    transition: all 0.3s ease;
                }

                .header-nav > a:hover,
                .header-nav > a.active {
                    background: rgba(74, 144, 226, 0.1);
                    transform: scale(1.05);
                }

                .auth-section {
                    flex-direction: column;
                    width: 100%;
                    margin-left: 0;
                    gap: 1rem;
                }

                .btn-login,
                .btn-admin {
                    width: 100%;
                    text-align: center;
                    padding: 0.75rem 1.5rem;
                    font-size: 1rem;
                }

                .user-profile-link {
                    width: 100%;
                    justify-content: center;
                    padding: 0.75rem 1.5rem;
                }

                .logout-form {
                    width: 100%;
                }

                .btn-logout {
                    width: 100%;
                    padding: 0.75rem 1.5rem;
                    font-size: 1rem;
                }
            }

            @media (max-width: 480px) {
                .header-container {
                    padding: 1rem;
                }

                .header-logo {
                    font-size: 1rem;
                    letter-spacing: 1px;
                }

                .mobile-menu-toggle {
                    width: 1.75rem;
                    height: 1.75rem;
                }

                .burger-line {
                    width: 1.75rem;
                    height: 0.2rem;
                }

                .header-nav {
                    width: 90%;
                }

                .header-nav > a {
                    font-size: 1rem;
                }
            }
        </style>
    </header>

    <footer th:fragment="footer" class="bg-gray-800 mt-12 md:mt-20 py-6 md:py-8">
        <div class="container mx-auto px-4 md:px-6 text-center text-gray-400">
            <!-- Réseaux sociaux responsive -->
            <div class="flex flex-wrap justify-center gap-3 sm:gap-4 md:gap-6 mb-6" th:if="${!#lists.isEmpty(enabledSocialLinks)}">
                <a th:each="link : ${enabledSocialLinks}"
                   th:href="${link.url}"
                   target="_blank"
                   rel="noopener noreferrer"
                   class="hover:text-white transition-colors flex items-center gap-2 text-sm sm:text-base"
                   th:aria-label="'Visiter notre page ' + ${link.name} + ' (ouvre dans un nouvel onglet)'"
                   th:title="${link.name}">
                    <i th:class="${link.icon} + ' text-lg sm:text-xl'" aria-hidden="true"></i>
                    <span th:text="${link.name}" class="hidden sm:inline"></span>
                </a>
            </div>
            <div th:if="${#lists.isEmpty(enabledSocialLinks)}" class="mb-6 text-xs sm:text-sm">
                <p>Aucun réseau social configuré</p>
            </div>
            <!-- Copyright responsive -->
            <p class="text-xs sm:text-sm md:text-base mb-4">© 2025 Duo Black & White. Tous droits réservés.</p>

            <!-- Liens légaux responsive (colonnes sur mobile, ligne sur desktop) -->
            <nav aria-label="Liens légaux" class="flex flex-col sm:flex-row flex-wrap justify-center items-center gap-2 sm:gap-1 text-xs sm:text-sm">
                <a th:href="@{/privacy-policy}" class="text-gray-500 hover:text-gray-300 transition-colors px-2 py-1">Politique de confidentialité</a>
                <span class="hidden sm:inline text-gray-600" aria-hidden="true">|</span>
                <a th:href="@{/mentions-legales}" class="text-gray-500 hover:text-gray-300 transition-colors px-2 py-1">Mentions légales</a>
                <span class="hidden sm:inline text-gray-600" aria-hidden="true">|</span>
                <a th:href="@{/cookies}" class="text-gray-500 hover:text-gray-300 transition-colors px-2 py-1">Cookies</a>
                <span class="hidden sm:inline text-gray-600" aria-hidden="true">|</span>
                <a href="#" onclick="window.resetCookieConsent(); return false;" class="text-gray-500 hover:text-gray-300 transition-colors px-2 py-1">Gérer les cookies</a>
</nav>
        </div>
    </footer>

    <!-- Script menu burger mobile -->
    <script>
        (function() {
            const menuToggle = document.getElementById('mobileMenuToggle');
            const headerNav = document.getElementById('headerNav');

            if (menuToggle && headerNav) {
                // Toggle du menu
                menuToggle.addEventListener('click', function(e) {
                    e.stopPropagation();
                    const isExpanded = this.getAttribute('aria-expanded') === 'true';
                    this.setAttribute('aria-expanded', !isExpanded);
                    headerNav.classList.toggle('active');
                    document.body.style.overflow = !isExpanded ? 'hidden' : '';
                });

                // Fermer le menu en cliquant sur un lien
                const navLinks = headerNav.querySelectorAll('a, button');
                navLinks.forEach(link => {
                    link.addEventListener('click', function() {
                        headerNav.classList.remove('active');
                        menuToggle.setAttribute('aria-expanded', 'false');
                        document.body.style.overflow = '';
                    });
                });

                // Fermer le menu avec Escape
                document.addEventListener('keydown', function(e) {
                    if (e.key === 'Escape' && headerNav.classList.contains('active')) {
                        headerNav.classList.remove('active');
                        menuToggle.setAttribute('aria-expanded', 'false');
                        document.body.style.overflow = '';
                    }
                });

                // Fermer en cliquant à l'extérieur
                document.addEventListener('click', function(e) {
                    if (headerNav.classList.contains('active') &&
                        !headerNav.contains(e.target) &&
                        !menuToggle.contains(e.target)) {
                        headerNav.classList.remove('active');
                        menuToggle.setAttribute('aria-expanded', 'false');
                        document.body.style.overflow = '';
                    }
                });
            }
        })();
    </script>

</body>
</html>
