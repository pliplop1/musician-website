<!DOCTYPE html>
<html lang="fr" xmlns:th="http://www.thymeleaf.org">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Gestion de la Musique</title>
<link rel="stylesheet" th:href="@{/css/style.css}">
<script th:src="@{/js/admin-table.js}" defer></script>
</head>
<body class="bg-gray-100 text-gray-800">

	<div class="flex min-h-screen">
		<div th:replace="~{fragments/admin-layout :: mobile-menu-toggle}"></div>
		<div th:replace="~{fragments/admin-layout :: sidebar}"></div>

		<main class="flex-grow p-4 sm:p-6 lg:p-8">
			<h1 class="text-2xl sm:text-3xl font-bold mb-6">Gérer la Musique</h1>

			<div th:if="${successMessage}"
				class="bg-green-100 border-l-4 border-green-500 text-green-700 p-4 rounded-md mb-8 shadow-sm">
				<p class="font-bold">Succès !</p>
				<span th:text="${successMessage}"></span>
			</div>
			<div th:if="${errorMessage}"
				class="bg-red-100 border-l-4 border-red-500 text-red-700 p-4 rounded-md mb-8 shadow-sm">
				<p class="font-bold">Erreur !</p>
				<span th:text="${errorMessage}"></span>
			</div>

			<div class="grid grid-cols-1 md:grid-cols-2 gap-8 mb-8">
				<div class="bg-white p-4 sm:p-6 lg:p-8 rounded-lg shadow-md">
					<h3 class="text-xl font-semibold mb-4">Option A : Ajouter via
						code d'intégration</h3>
					<form th:action="@{/admin/tracks/add-embed}" method="post"
						class="space-y-4">
						<div>
							<label for="embedTitle" class="block text-sm font-medium">Titre
								du morceau</label> <input type="text" id="embedTitle" name="title"
								required
								class="mt-1 block w-full border border-gray-300 rounded-md shadow-sm py-2 px-3 focus:outline-none focus:ring-2 focus:ring-indigo-500">
						</div>
						<div>
							<label for="embedCode" class="block text-sm font-medium">Code
								d'intégration (&lt;iframe&gt;...&lt;/iframe&gt;)</label>
							<textarea id="embedCode" name="embedCode" rows="4" required
								class="mt-1 block w-full border border-gray-300 rounded-md shadow-sm py-2 px-3 focus:outline-none focus:ring-2 focus:ring-indigo-500"></textarea>
						</div>
						<div>
							<button type="submit"
								class="w-full bg-blue-600 hover:bg-blue-700 text-white font-bold py-3 px-4 rounded-md">Ajouter
								la piste (Embed)</button>
						</div>
					</form>
				</div>

				<div class="bg-white p-4 sm:p-6 lg:p-8 rounded-lg shadow-md">
					<h3 class="text-xl font-semibold mb-4">Option B : Ajouter via
						fichier audio</h3>
					<form th:action="@{/admin/tracks/add-upload}" method="post"
						enctype="multipart/form-data" class="space-y-4">
						<div>
							<label for="uploadTitle" class="block text-sm font-medium">Titre
								du morceau</label> <input type="text" id="uploadTitle" name="title"
								required
								class="mt-1 block w-full border border-gray-300 rounded-md shadow-sm py-2 px-3 focus:outline-none focus:ring-2 focus:ring-indigo-500">
						</div>
						<div>
							<label for="audioFile" class="block text-sm font-medium">Fichier
								audio (MP3, WAV...)</label> <input type="file" id="audioFile"
								name="file" required accept="audio/*"
								class="mt-1 block w-full text-sm text-gray-500 file:mr-4 file:py-2 file:px-4 file:rounded-md file:border-0 file:text-sm file:font-semibold file:bg-indigo-50 file:text-indigo-700 hover:file:bg-indigo-100" />
						</div>
						<div>
							<button type="submit"
								class="w-full bg-green-600 hover:bg-green-700 text-white font-bold py-3 px-4 rounded-md">Ajouter
								la piste (Fichier)</button>
						</div>
					</form>
				</div>
			</div>

			<div class="bg-white rounded-lg shadow-md overflow-x-auto">
				<h3 class="text-xl font-semibold p-6">Toutes les pistes
					musicales</h3>
				<table class="min-w-full divide-y divide-gray-200">
					<thead class="bg-gray-50">
						<tr>
							<th
								class="px-6 py-3 text-left text-xs font-medium text-gray-500 uppercase">Titre</th>
							<th
								class="px-6 py-3 text-left text-xs font-medium text-gray-500 uppercase">Type</th>
							<th
								class="px-6 py-3 text-left text-xs font-medium text-gray-500 uppercase">Actions</th>
						</tr>
					</thead>
					<tbody class="bg-white divide-y divide-gray-200">
						<tr th:if="${#lists.isEmpty(tracks)}">
							<td colspan="3" class="px-6 py-4 text-center text-gray-500">Aucune
								piste musicale ajoutée.</td>
						</tr>
						<tr th:each="track : ${tracks}">
							<td class="px-6 py-4" th:text="${track.title}"></td>
							<td class="px-6 py-4"><span
								th:text="${track.trackType == T(com.docker.entity.TrackType).EMBED ? 'Embed' : 'Fichier'}"
								class="px-2 inline-flex text-xs leading-5 font-semibold rounded-full"
								th:classappend="${track.trackType == T(com.docker.entity.TrackType).EMBED ? 'bg-blue-100 text-blue-800' : 'bg-green-100 text-green-800'}"></span>
							</td>
							<td class="px-6 py-4">
								<form th:action="@{/admin/tracks/delete/{id}(id=${track.id})}"
									method="post" class="inline">
									<button type="submit"
										class="text-red-600 hover:text-red-900 bg-transparent border-none p-0 cursor-pointer"
										onclick="return confirm('Êtes-vous sûr de vouloir supprimer cette piste ?')">Supprimer</button>
								</form>
							</td>
						</tr>
					</tbody>
				</table>
			</div>
		</main>
	</div>
	<div th:replace="~{fragments/admin-layout :: admin-sidebar-mobile}"></div>

</body>
</html>
