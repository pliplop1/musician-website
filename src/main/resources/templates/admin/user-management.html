<!DOCTYPE html>
<html lang="fr" xmlns:th="http://www.thymeleaf.org">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Gestion des Utilisateurs - Administration</title>
<link rel="stylesheet" th:href="@{/css/style.css}">
<style>
  .modal {
    display: none; /* Caché par défaut */
    position: absolute; /* Positionné par rapport à la page */
    z-index: 20;
  }
</style>
</head>
<body class="bg-gray-100 text-gray-800">

	<!-- Header de l'administration -->
	<header class="bg-white shadow-md">
		<div
			class="container mx-auto px-6 py-4 flex justify-between items-center">
			<h1 class="text-2xl font-bold text-gray-800">Administration</h1>
			<div>
				<a th:href="@{/admin/dashboard}"
					class="px-4 text-gray-600 hover:text-indigo-600">Tableau de Bord</a>
				<a th:href="@{/}"
					class="px-4 text-gray-600 hover:text-indigo-600">Retour au site</a>
				<form th:action="@{/logout}" method="post" class="inline">
					<button type="submit"
						class="px-4 text-gray-600 hover:text-indigo-600">Déconnexion</button>
				</form>
			</div>
		</div>
	</header>

	<!-- Contenu principal -->
	<main class="container mx-auto px-6 py-8">

		<h2 class="text-3xl font-bold mb-6">Gestion des Utilisateurs</h2>
		
		<!-- Barre de recherche -->
		<div class="mb-6">
			<form th:action="@{/admin/users}" method="get" class="flex items-center gap-4">
				<input type="text" name="keyword" th:value="${keyword}" placeholder="Rechercher par nom ou email..."
				       class="flex-grow border border-gray-300 rounded-md shadow-sm py-2 px-3 focus:outline-none focus:ring-2 focus:ring-indigo-500">
				<button type="submit" class="bg-indigo-600 hover:bg-indigo-700 text-white font-bold py-2 px-4 rounded-md">Rechercher</button>
				<a th:href="@{/admin/users}" class="text-gray-600 hover:text-indigo-600">Réinitialiser</a>
			</form>
		</div>

		<!-- Message de succès -->
		<div th:if="${successMessage}"
			class="bg-green-100 border-l-4 border-green-500 text-green-700 p-4 rounded-md mb-8 shadow-sm">
			<p class="font-bold">Succès !</p>
			<span th:text="${successMessage}"></span>
		</div>
		
		<div class="bg-white rounded-lg shadow-md overflow-hidden">
			<table class="min-w-full divide-y divide-gray-200">
				<thead class="bg-gray-50">
					<tr>
						<th
							class="px-6 py-3 text-left text-xs font-medium text-gray-500 uppercase tracking-wider">ID</th>
						<th
							class="px-6 py-3 text-left text-xs font-medium text-gray-500 uppercase tracking-wider">
							<a th:href="@{/admin/users(sortField='username', sortDir=${reverseSortDir}, keyword=${keyword})}">
								Nom d'utilisateur
								<span th:if="${sortField == 'username'}" th:text="${sortDir == 'asc' ? '▲' : '▼'}"></span>
							</a>
						</th>
						<th
							class="px-6 py-3 text-left text-xs font-medium text-gray-500 uppercase tracking-wider">Email</th>
						<th
							class="px-6 py-3 text-left text-xs font-medium text-gray-500 uppercase tracking-wider">
							<a th:href="@{/admin/users(sortField='roles', sortDir=${reverseSortDir}, keyword=${keyword})}">
								Rôles
								<span th:if="${sortField == 'roles'}" th:text="${sortDir == 'asc' ? '▲' : '▼'}"></span>
							</a>
						</th>
						<th
							class="px-6 py-3 text-left text-xs font-medium text-gray-500 uppercase tracking-wider">Actions</th>
					</tr>
				</thead>
				<tbody class="bg-white divide-y divide-gray-200">
					<tr th:if="${#lists.isEmpty(users)}">
						<td colspan="5" class="px-6 py-4 text-center text-gray-500">Aucun
							utilisateur trouvé.</td>
					</tr>
					<tr th:each="user : ${users}">
						<td class="px-6 py-4 whitespace-nowrap" th:text="${user.id}"></td>
						<td class="px-6 py-4 whitespace-nowrap"
							th:text="${user.username}"></td>
						<td class="px-6 py-4 whitespace-nowrap" th:text="${user.email}"></td>
						<td class="px-6 py-4 whitespace-nowrap">
						    <span th:each="role, iterStat : ${user.roles}" th:text="${role.name.replace('ROLE_', '')} + (${!iterStat.last} ? ', ' : '')" class="px-2 inline-flex text-xs leading-5 font-semibold rounded-full"
						          th:classappend="${role.name == 'ROLE_ADMIN'} ? 'bg-red-100 text-red-800' : 'bg-green-100 text-green-800'">
						    </span>
						</td>
						<td class="px-6 py-4 whitespace-nowrap text-sm font-medium">
							<a th:href="@{/admin/users/edit/{id}(id=${user.id})}" class="text-indigo-600 hover:text-indigo-900 mr-4">Modifier</a>
							<a th:href="@{/admin/users/delete/{id}(id=${user.id})}" class="text-red-600 hover:text-red-900 delete-link">Supprimer</a>
						</td>
					</tr>
				</tbody>
			</table>
		</div>

	</main>
	
	<!-- Fenêtre Modale pour la confirmation de suppression -->
	<div id="deleteConfirmModal" class="modal" aria-labelledby="modal-title-delete" role="dialog" aria-modal="true">
	    <div class="bg-white rounded-lg text-left overflow-hidden shadow-xl transform transition-all sm:max-w-xs sm:w-full">
	      <div class="bg-white px-4 pt-5 pb-4 sm:p-6 sm:pb-4">
	        <div class="sm:flex sm:items-start">
	          <div class="mx-auto flex-shrink-0 flex items-center justify-center h-12 w-12 rounded-full bg-red-100 sm:mx-0 sm:h-10 sm:w-10">
				<svg class="h-6 w-6 text-red-600" xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke="currentColor" aria-hidden="true">
                  <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 9v2m0 4h.01m-6.938 4h13.856c1.54 0 2.502-1.667 1.732-3L13.732 4c-.77-1.333-2.694-1.333-3.464 0L3.34 16c-.77 1.333.192 3 1.732 3z" />
                </svg>
	          </div>
	          <div class="mt-3 text-center sm:mt-0 sm:ml-4 sm:text-left">
	            <h3 class="text-lg leading-6 font-medium text-gray-900" id="modal-title-delete">Confirmer</h3>
	            <div class="mt-2">
	              <p class="text-sm text-gray-500">Êtes-vous sûr ?</p>
	            </div>
	          </div>
	        </div>
	      </div>
	      <div class="bg-gray-50 px-4 py-3 sm:px-6 sm:flex sm:flex-row-reverse">
	        <a href="#" id="confirmDeleteBtn" class="w-full inline-flex justify-center rounded-md border border-transparent shadow-sm px-4 py-2 bg-red-600 text-base font-medium text-white hover:bg-red-700 sm:ml-3 sm:w-auto sm:text-sm">
	          Supprimer
	        </a>
	        <button type="button" id="cancelDeleteBtn" class="mt-3 w-full inline-flex justify-center rounded-md border border-gray-300 shadow-sm px-4 py-2 bg-white text-base font-medium text-gray-700 hover:bg-gray-50 sm:mt-0 sm:w-auto sm:text-sm">
	          Annuler
	        </button>
	      </div>
	    </div>
	</div>

	<script>
		document.addEventListener('DOMContentLoaded', function () {
			const deleteConfirmModal = document.getElementById('deleteConfirmModal');
			if (deleteConfirmModal) {
				const confirmDeleteBtn = document.getElementById('confirmDeleteBtn');
				const cancelDeleteBtn = document.getElementById('cancelDeleteBtn');
				
				let currentLink = null; // Pour garder une trace du lien cliqué

				document.body.addEventListener('click', function(event) {
					const deleteLink = event.target.closest('.delete-link');
					
					// Si on clique sur un lien de suppression
					if (deleteLink) {
						event.preventDefault();
						currentLink = deleteLink; // On mémorise le lien
						
						// Positionnement de la modale
						deleteConfirmModal.style.display = 'block';
						const modalHeight = deleteConfirmModal.offsetHeight;
						let topPosition = event.pageY - modalHeight - 15;
						if (topPosition < window.scrollY) {
							topPosition = window.scrollY + 15;
						}
						
						deleteConfirmModal.style.left = (event.pageX + 15) + 'px';
						deleteConfirmModal.style.top = topPosition + 'px';
					} 
					// Si on ne clique pas sur le bouton Annuler ou la modale elle-même
					else if (!event.target.closest('#deleteConfirmModal')) {
						deleteConfirmModal.style.display = 'none';
					}
				});

				// Si on clique sur "Annuler"
				cancelDeleteBtn.addEventListener('click', () => {
					deleteConfirmModal.style.display = 'none';
				});

				// Si on clique sur "Supprimer"
				confirmDeleteBtn.addEventListener('click', (event) => {
					event.preventDefault();
					if(currentLink) {
						window.location.href = currentLink.href;
					}
				});
			}
		});
	</script>

</body>
</html>
