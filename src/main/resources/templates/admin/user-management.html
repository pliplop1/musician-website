<!DOCTYPE html>
<html lang="fr" xmlns:th="http://www.thymeleaf.org">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Gestion des Utilisateurs - Administration</title>
<link rel="stylesheet" th:href="@{/css/style.css}">
</head>
<body class="bg-gray-100 text-gray-800">

	<header class="bg-white shadow-md">
		<div class="container mx-auto px-6 py-4 flex justify-between items-center">
			<h1 class="text-2xl font-bold text-gray-800">Administration</h1>
			<div>
				<a th:href="@{/admin/dashboard}" class="px-4 text-gray-600 hover:text-indigo-600">Retour au tableau de bord</a>
				<form th:action="@{/logout}" method="post" class="inline">
					<button type="submit" class="px-4 text-gray-600 hover:text-indigo-600">Déconnexion</button>
				</form>
			</div>
		</div>
	</header>

	<main class="container mx-auto px-6 py-8">
		<h2 class="text-3xl font-bold mb-6">Gestion des Utilisateurs</h2>
		
		<form th:action="@{/admin/users}" method="get" class="flex items-center gap-4 mb-6">
			<input type="search" name="keyword" th:value="${keyword}" placeholder="Rechercher par nom ou email..." class="w-full md:w-1/3 px-3 py-2 border border-gray-300 rounded-md shadow-sm focus:outline-none focus:ring-indigo-500 focus:border-indigo-500">
			<button type="submit" class="bg-indigo-600 hover:bg-indigo-700 text-white font-bold py-2 px-4 rounded-md">Rechercher</button>
		</form>
		
		<div th:if="${successMessage}" class="bg-green-100 border-l-4 border-green-500 text-green-700 p-4 rounded-md mb-8 shadow-sm">
			<p th:text="${successMessage}"></p>
		</div>
		
		<div class="bg-white rounded-lg shadow-md overflow-hidden">
			<table class="min-w-full divide-y divide-gray-200">
				<thead class="bg-gray-50">
					<tr>
						<th class="px-6 py-3 text-left text-xs font-medium text-gray-500 uppercase tracking-wider">ID</th>
						<th class="px-6 py-3 text-left text-xs font-medium text-gray-500 uppercase tracking-wider">Nom d'utilisateur</th>
						<th class="px-6 py-3 text-left text-xs font-medium text-gray-500 uppercase tracking-wider">Email</th>
						<th class="px-6 py-3 text-left text-xs font-medium text-gray-500 uppercase tracking-wider">Rôle</th>
						<th class="px-6 py-3 text-left text-xs font-medium text-gray-500 uppercase tracking-wider">Actions</th>
					</tr>
				</thead>
				<tbody class="bg-white divide-y divide-gray-200">
					<tr th:if="${userPage.empty}">
						<td colspan="5" class="px-6 py-4 text-center text-gray-500">Aucun utilisateur trouvé.</td>
					</tr>
					<tr th:each="user : ${userPage.content}">
						<td class="px-6 py-4" th:text="${user.id}"></td>
						<td class="px-6 py-4" th:text="${user.username}"></td>
						<td class="px-6 py-4" th:text="${user.email}"></td>
						<td class="px-6 py-4">
						    <span th:each="role : ${user.roles}" th:text="${role.name.replace('ROLE_', '')}" 
						          class="px-2 inline-flex text-xs leading-5 font-semibold rounded-full"
						          th:classappend="${role.name == 'ROLE_ADMIN'} ? 'bg-red-100 text-red-800' : 'bg-green-100 text-green-800'">
						    </span>
						</td>
						<td class="px-6 py-4 text-sm font-medium">
							<a th:href="@{/admin/users/edit/{id}(id=${user.id})}" class="text-indigo-600 hover:text-indigo-900 mr-4">Modifier</a>
							
							<form th:action="@{/admin/users/delete/{id}(id=${user.id})}" method="post" class="inline">
								<button type="submit" class="text-red-600 hover:text-red-900 bg-transparent border-none p-0 cursor-pointer"
										onclick="return confirm('Êtes-vous sûr de vouloir supprimer cet utilisateur ?')">Supprimer</button>
							</form>
						</td>
					</tr>
				</tbody>
			</table>
		</div>

		<nav th:if="${userPage.totalPages > 1}" class="mt-8 flex justify-center items-center space-x-2">
			<a th:if="${!userPage.first}" th:href="@{/admin/users(page=${userPage.number - 1}, size=${userPage.size}, sortField=${sortField}, sortDir=${sortDir}, keyword=${keyword})}"
			   class="px-4 py-2 border rounded-md bg-white text-gray-700 hover:bg-gray-100">
				&laquo; Précédent
			</a>
			<span th:if="${userPage.first}" class="px-4 py-2 border rounded-md bg-gray-100 text-gray-400 cursor-not-allowed">&laquo; Précédent</span>

			<th:block th:each="i : ${#numbers.sequence(0, userPage.totalPages - 1)}">
				<a th:if="${i != userPage.number}" th:href="@{/admin/users(page=${i}, size=${userPage.size}, sortField=${sortField}, sortDir=${sortDir}, keyword=${keyword})}"
				   class="px-4 py-2 border rounded-md bg-white text-gray-700 hover:bg-gray-100"
				   th:text="${i + 1}">
				</a>
				<span th:if="${i == userPage.number}"
				      class="px-4 py-2 border rounded-md bg-indigo-600 text-white"
				      th:text="${i + 1}">
				</span>
			</th:block>

			<a th:if="${!userPage.last}" th:href="@{/admin/users(page=${userPage.number + 1}, size=${userPage.size}, sortField=${sortField}, sortDir=${sortDir}, keyword=${keyword})}"
			   class="px-4 py-2 border rounded-md bg-white text-gray-700 hover:bg-gray-100">
				Suivant &raquo;
			</a>
			<span th:if="${userPage.last}" class="px-4 py-2 border rounded-md bg-gray-100 text-gray-400 cursor-not-allowed">Suivant &raquo;</span>
		</nav>

	</main>
	
</body>
</html>
