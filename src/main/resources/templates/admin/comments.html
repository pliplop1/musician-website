<!DOCTYPE html>
<html lang="fr" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="_csrf" th:content="${_csrf.token}"/>
    <meta name="_csrf_header" th:content="${_csrf.headerName}"/>
    <title>Modération des Commentaires - Admin</title>
    <link rel="stylesheet" th:href="@{/css/style.css}">
    <script th:src="@{/js/comment-actions.js}"></script>
    <script th:src="@{/js/admin-comments-search.js}" defer></script>
    <script>
        function toggleAll(source, formId) {
            const checkboxes = document.querySelectorAll(`#${formId} input[name="commentIds"]`);
            checkboxes.forEach(checkbox => checkbox.checked = source.checked);
        }

        function handleBulkAction(formId, actionType) {
            const form = document.getElementById(formId);
            const checkboxes = form.querySelectorAll('input[name="commentIds"]:checked');

            if (checkboxes.length === 0) {
                alert('Veuillez sélectionner au moins un commentaire');
                return false;
            }

            if (actionType === 'delete') {
                if (!confirm(`Êtes-vous sûr de vouloir supprimer ${checkboxes.length} commentaire(s) ?`)) {
                    return false;
                }
                form.action = '/admin/comments/bulk-delete';
            } else if (actionType === 'approve') {
                form.action = '/admin/comments/bulk-approve';
            }

            form.submit();
        }
    </script>
</head>
<body class="bg-gray-100 text-gray-800">

<div class="flex min-h-screen">
    <div th:replace="~{fragments/admin-layout :: mobile-menu-toggle}"></div>
    <div th:replace="~{fragments/admin-layout :: sidebar}"></div>

    <main class="flex-grow p-4 sm:p-6 lg:p-8">
        <h1 class="text-2xl sm:text-3xl font-bold mb-6">Modération des Commentaires</h1>

        <div th:if="${successMessage}" class="bg-green-500 text-white p-4 rounded-md mb-6">
            <p th:text="${successMessage}"></p>
        </div>

        <!-- Commentaires en attente de modération -->
        <section class="mb-12">
            <h2 class="text-2xl font-bold mb-6 flex items-center gap-2">
                <span class="bg-yellow-600 text-white rounded-full px-3 py-1 text-sm" th:text="${#lists.size(pendingComments)}">0</span>
                En attente de modération
            </h2>

            <div th:if="${#lists.isEmpty(pendingComments)}" class="bg-white rounded-lg shadow-md p-8 text-center">
                <p class="text-gray-600">✅ Aucun commentaire en attente de modération</p>
            </div>

            <div th:if="${!#lists.isEmpty(pendingComments)}">
                <form id="pendingForm" method="post">
                    <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}"/>
                    <!-- Actions groupées -->
                    <div class="bg-white rounded-lg shadow-md p-4 mb-4 flex flex-col sm:flex-row items-stretch sm:items-center gap-3 sm:gap-4">
                        <label class="flex items-center gap-2">
                            <input type="checkbox" onclick="toggleAll(this, 'pendingForm')" class="w-4 h-4 text-indigo-600 border-gray-300 rounded focus:ring-indigo-500">
                            <span class="text-sm font-medium">Tout sélectionner</span>
                        </label>
                        <div class="flex-1"></div>
                        <button type="button" onclick="handleBulkAction('pendingForm', 'approve')"
                                class="bg-green-600 hover:bg-green-700 text-white font-medium py-2 px-4 rounded-md text-sm transition-colors whitespace-nowrap">
                            ✓ Approuver la sélection
                        </button>
                        <button type="button" onclick="handleBulkAction('pendingForm', 'delete')"
                                class="bg-red-600 hover:bg-red-700 text-white font-medium py-2 px-4 rounded-md text-sm transition-colors whitespace-nowrap">
                            🗑 Supprimer la sélection
                        </button>
                    </div>

                    <div class="space-y-4">
                        <div th:each="comment : ${pendingComments}" class="bg-white rounded-lg shadow-md p-6 border-l-4 border-yellow-500">
                            <div class="flex items-start gap-4">
                                <input type="checkbox" name="commentIds" th:value="${comment.id}"
                                       class="mt-1 w-5 h-5 text-indigo-600 border-gray-300 rounded focus:ring-indigo-500">
                                <div class="flex-1">
                                    <div class="flex items-center gap-3 mb-2">
                                        <span class="font-semibold text-indigo-600" th:text="${comment.user.username}">Utilisateur</span>
                                        <span class="text-xs px-2 py-1 rounded-full bg-gray-100"
                                              th:text="${comment.type}"
                                              th:classappend="${comment.type == 'CONCERT' ? 'text-green-600' : (comment.type == 'ARTICLE' ? 'text-blue-600' : 'text-purple-600')}">
                                            TYPE
                                        </span>
                                        <span class="text-xs text-gray-500"
                                              th:text="${#temporals.format(comment.createdAt, 'dd/MM/yyyy HH:mm')}">
                                            Date
                                        </span>
                                    </div>
                                    <p class="text-gray-700 whitespace-pre-wrap mb-3" th:text="${comment.content}">Contenu du commentaire</p>

                                    <!-- Actions individuelles AJAX pour commentaires en attente -->
                                    <div class="flex gap-3 mt-3">
                                        <button type="button"
                                                class="approve-comment-btn bg-green-600 hover:bg-green-700 text-white font-medium py-1.5 px-4 rounded text-sm transition-colors"
                                                th:data-comment-id="${comment.id}">
                                            ✓ Approuver
                                        </button>
                                        <button type="button"
                                                class="delete-comment-btn bg-red-600 hover:bg-red-700 text-white font-medium py-1.5 px-4 rounded text-sm transition-colors"
                                                th:data-comment-id="${comment.id}">
                                            🗑 Supprimer
                                        </button>
                                    </div>
                                </div>
                            </div>
                        </div>
                    </div>
                </form>
            </div>
        </section>

        <!-- Tous les commentaires -->
        <section>
            <h2 class="text-2xl font-bold mb-6">Tous les commentaires</h2>

            <div th:if="${#lists.isEmpty(allComments)}" class="bg-white rounded-lg shadow-md p-8 text-center">
                <p class="text-gray-600">Aucun commentaire pour le moment</p>
            </div>

            <div th:if="${!#lists.isEmpty(allComments)}">
                <form id="allForm" method="post">
                    <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}"/>
                    <!-- Actions groupées -->
                    <div class="bg-white rounded-lg shadow-md p-4 mb-4 flex flex-col sm:flex-row items-stretch sm:items-center gap-3 sm:gap-4">
                        <label class="flex items-center gap-2">
                            <input type="checkbox" onclick="toggleAll(this, 'allForm')" class="w-4 h-4 text-indigo-600 border-gray-300 rounded focus:ring-indigo-500">
                            <span class="text-sm font-medium">Tout sélectionner</span>
                        </label>
                        <div class="flex-1"></div>
                        <button type="button" onclick="handleBulkAction('allForm', 'approve')"
                                class="bg-green-600 hover:bg-green-700 text-white font-medium py-2 px-4 rounded-md text-sm transition-colors whitespace-nowrap">
                            ✓ Approuver la sélection
                        </button>
                        <button type="button" onclick="handleBulkAction('allForm', 'delete')"
                                class="bg-red-600 hover:bg-red-700 text-white font-medium py-2 px-4 rounded-md text-sm transition-colors whitespace-nowrap">
                            🗑 Supprimer la sélection
                        </button>
                    </div>

                    <div class="space-y-4">
                        <div th:each="comment : ${allComments}" class="bg-white rounded-lg shadow-md p-6"
                             th:classappend="${comment.approved ? 'border-l-4 border-green-500' : 'border-l-4 border-gray-400'}">
                            <div class="flex items-start gap-4">
                                <input type="checkbox" name="commentIds" th:value="${comment.id}"
                                       class="mt-1 w-5 h-5 text-indigo-600 border-gray-300 rounded focus:ring-indigo-500">
                                <div class="flex-1">
                                    <div class="flex items-center gap-3 mb-2">
                                        <span class="font-semibold text-indigo-600" th:text="${comment.user.username}">Utilisateur</span>
                                        <span class="text-xs px-2 py-1 rounded-full bg-gray-100"
                                              th:text="${comment.type}"
                                              th:classappend="${comment.type == 'CONCERT' ? 'text-green-600' : (comment.type == 'ARTICLE' ? 'text-blue-600' : 'text-purple-600')}">
                                            TYPE
                                        </span>
                                        <span class="text-xs px-2 py-1 rounded-full"
                                              th:classappend="${comment.approved ? 'bg-green-100 text-green-700' : 'bg-yellow-100 text-yellow-700'}">
                                            <span th:if="${comment.approved}">✓ Approuvé</span>
                                            <span th:if="${!comment.approved}">⏳ En attente</span>
                                        </span>
                                        <span class="text-xs text-gray-500"
                                              th:text="${#temporals.format(comment.createdAt, 'dd/MM/yyyy HH:mm')}">
                                            Date
                                        </span>
                                    </div>
                                    <p class="text-gray-700 whitespace-pre-wrap mb-3" th:text="${comment.content}">Contenu du commentaire</p>

                                    <!-- Actions individuelles AJAX pour tous les commentaires -->
                                    <div class="flex gap-3 mt-3">
                                        <button type="button"
                                                class="approve-comment-btn bg-green-600 hover:bg-green-700 text-white font-medium py-1.5 px-4 rounded text-sm transition-colors"
                                                th:data-comment-id="${comment.id}"
                                                th:if="${!comment.approved}">
                                            ✓ Approuver
                                        </button>
                                        <button type="button"
                                                class="delete-comment-btn bg-red-600 hover:bg-red-700 text-white font-medium py-1.5 px-4 rounded text-sm transition-colors"
                                                th:data-comment-id="${comment.id}">
                                            🗑 Supprimer
                                        </button>
                                    </div>
                                </div>
                            </div>
                        </div>
                    </div>
                </form>
            </div>
        </section>
    </main>
</div>
<div th:replace="~{fragments/admin-layout :: admin-sidebar-mobile}"></div>

</body>
</html>
