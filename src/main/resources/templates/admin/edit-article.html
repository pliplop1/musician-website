<!DOCTYPE html>
<html lang="fr" xmlns:th="http://www.thymeleaf.org">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Modifier une Actualité</title>
<link rel="stylesheet" th:href="@{/css/style.css}">
</head>
<body class="bg-gray-100 text-gray-800">

	<header class="bg-white shadow-md">
		<div class="container mx-auto px-6 py-4">
			<h1 class="text-2xl font-bold text-gray-800">Modifier une Actualité</h1>
		</div>
	</header>

	<main class="container mx-auto px-6 py-12">
		<div class="max-w-2xl mx-auto">
			<div class="bg-white p-8 rounded-lg shadow-lg">
				<form th:action="@{/admin/articles/update/{id}(id=${article.id})}"
					th:object="${article}" method="post" class="space-y-6">
					<div>
						<label for="titre" class="block text-sm font-medium text-gray-700">Titre</label> 
						<input type="text" id="titre" th:field="*{titre}" required
							class="mt-1 block w-full border border-gray-300 rounded-md shadow-sm py-2 px-3 focus:outline-none focus:ring-2 focus:ring-indigo-500">
					</div>
					<div>
						<label for="contenu" class="block text-sm font-medium text-gray-700">Contenu</label>
						<textarea id="contenu" th:field="*{contenu}" rows="10" required
							class="mt-1 block w-full border border-gray-300 rounded-md shadow-sm py-2 px-3 focus:outline-none focus:ring-2 focus:ring-indigo-500"></textarea>
					</div>
					<div class="flex items-center space-x-4">
						<button type="submit" class="w-full bg-indigo-600 hover:bg-indigo-700 text-white font-bold py-3 px-4 rounded-md">
							Enregistrer les modifications
						</button>
						<a th:href="@{/admin/dashboard}" class="w-full text-center bg-gray-200 hover:bg-gray-300 text-gray-800 font-bold py-3 px-4 rounded-md">
							Annuler
						</a>
					</div>
				</form>
			</div>
		</div>
	</main>

</body>
</html>
