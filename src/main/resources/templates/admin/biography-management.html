<!DOCTYPE html>
<html lang="fr" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gestion de la Biographie</title>
    <link rel="stylesheet" th:href="@{/css/style.css}">
</head>
<body class="bg-gray-100 text-gray-800">

<div class="flex min-h-screen">
    <div th:replace="~{fragments/admin-layout :: mobile-menu-toggle}"></div>
    <div th:replace="~{fragments/admin-layout :: sidebar}"></div>

    <main class="flex-grow p-8">
        <h1 class="text-3xl font-bold mb-6">Gérer la Biographie</h1>

        <div th:if="${successMessage}"
			class="bg-green-100 border-l-4 border-green-500 text-green-700 p-4 rounded-md mb-8 shadow-sm">
			<p class="font-bold">Succès !</p>
			<span th:text="${successMessage}"></span>
		</div>

        <div class="bg-white p-8 rounded-lg shadow-md max-w-4xl">
            <form th:action="@{/admin/biography/update}" method="post" class="space-y-6">
                <div>
                    <label for="bio-content" class="block text-sm font-medium">Contenu de la Biographie</label>
                    <textarea id="bio-content" name="content" rows="15"
                              th:text="${biography.content}" required
                              class="mt-1 block w-full border border-gray-300 rounded-md shadow-sm py-2 px-3 focus:outline-none focus:ring-2 focus:ring-indigo-500"></textarea>
                </div>
                <div>
                    <button type="submit"
                            class="w-full bg-green-600 hover:bg-green-700 text-white font-bold py-3 px-4 rounded-md">
                        Enregistrer la biographie
                    </button>
                </div>
            </form>
        </div>
    </main>
</div>
<div th:replace="~{fragments/admin-layout :: admin-sidebar-mobile}"></div>

</body>
</html>
