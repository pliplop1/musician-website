<!DOCTYPE html>
<html lang="fr" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gestion de la Galerie</title>
    <meta name="_csrf" th:content="${_csrf.token}"/>
    <meta name="_csrf_header" th:content="${_csrf.headerName}"/>
    <link rel="stylesheet" th:href="@{/css/style.css}">
    <script src="https://cdn.jsdelivr.net/npm/sortablejs@latest/Sortable.min.js"></script>
    <script th:src="@{/js/admin-gallery-search.js}" defer></script>
    <script th:src="@{/js/photo-sortable.js}" defer></script>
    <style>
        .sortable-ghost {
            opacity: 0.4;
        }
        .sortable-chosen {
            cursor: move;
        }
        .photo-card:hover {
            cursor: grab;
        }
        .photo-card:active {
            cursor: grabbing;
        }
    </style>
</head>
<body class="bg-gray-100 text-gray-800">

<div class="flex min-h-screen">
    <div th:replace="~{fragments/admin-layout :: mobile-menu-toggle}"></div>
    <div th:replace="~{fragments/admin-layout :: sidebar}"></div>

    <main class="flex-grow p-4 sm:p-6 lg:p-8">
        <h1 class="text-2xl sm:text-3xl font-bold mb-6">Gérer la Galerie Photo</h1>

        <div th:if="${successMessage}"
			class="bg-green-100 border-l-4 border-green-500 text-green-700 p-4 rounded-md mb-8 shadow-sm">
			<p class="font-bold">Succès !</p>
			<span th:text="${successMessage}"></span>
		</div>
        <div th:if="${errorMessage}"
			class="bg-red-100 border-l-4 border-red-500 text-red-700 p-4 rounded-md mb-8 shadow-sm">
			<p class="font-bold">Erreur !</p>
			<span th:text="${errorMessage}"></span>
		</div>

        <div class="bg-white p-4 sm:p-6 rounded-lg shadow-md mb-8 max-w-2xl">
            <h3 class="text-xl font-semibold mb-4">Ajouter une nouvelle photo</h3>
            <form th:action="@{/admin/photos/upload}" method="post" enctype="multipart/form-data" class="space-y-4">
                <div>
                    <label for="file" class="block text-sm font-medium">Choisir un fichier image</label>
                    <input type="file" id="file" name="file" required accept="image/*"
                           class="mt-1 block w-full text-sm text-gray-500 file:mr-4 file:py-2 file:px-4 file:rounded-md file:border-0 file:text-sm file:font-semibold file:bg-indigo-50 file:text-indigo-700 hover:file:bg-indigo-100"/>
                </div>
                <div>
                    <label for="title" class="block text-sm font-medium">Titre</label>
                    <input type="text" id="title" name="title" placeholder="Ex: Concert Salle Pleyel" maxlength="255"
                           class="mt-1 block w-full rounded-md border-gray-300 shadow-sm focus:border-indigo-500 focus:ring-indigo-500 sm:text-sm p-2 border"/>
                </div>
                <div>
                    <label for="description" class="block text-sm font-medium">Description</label>
                    <textarea id="description" name="description" rows="2" placeholder="Description de la photo..." maxlength="2000"
                              class="mt-1 block w-full rounded-md border-gray-300 shadow-sm focus:border-indigo-500 focus:ring-indigo-500 sm:text-sm p-2 border"></textarea>
                </div>
                <div>
                    <label for="tags" class="block text-sm font-medium">Tags (séparés par des virgules)</label>
                    <input type="text" id="tags" name="tags" placeholder="Ex: concert, live, paris, 2025" maxlength="500"
                           class="mt-1 block w-full rounded-md border-gray-300 shadow-sm focus:border-indigo-500 focus:ring-indigo-500 sm:text-sm p-2 border"/>
                </div>
                <div>
                    <label for="category" class="block text-sm font-medium">Catégorie</label>
                    <select id="category" name="category"
                            class="mt-1 block w-full rounded-md border-gray-300 shadow-sm focus:border-indigo-500 focus:ring-indigo-500 sm:text-sm p-2 border">
                        <option value="">-- Choisir --</option>
                        <option value="Concert">Concert</option>
                        <option value="Studio">Studio</option>
                        <option value="Backstage">Backstage</option>
                        <option value="Promo">Promo</option>
                        <option value="Portrait">Portrait</option>
                    </select>
                </div>
                <div>
                    <button type="submit"
                            class="w-full bg-indigo-600 hover:bg-indigo-700 text-white font-bold py-3 px-4 rounded-md">
                        Envoyer la photo
                    </button>
                </div>
            </form>
        </div>

        <div class="bg-white rounded-lg shadow-md p-4 sm:p-6">
            <h3 class="text-xl font-semibold mb-4">Photos actuelles</h3>
            <div th:if="${#lists.isEmpty(photos)}" class="text-center text-gray-500">
                <p>Aucune photo dans la galerie pour le moment.</p>
            </div>
            <div class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-6">
                <div th:each="photo : ${photos}" class="bg-gray-50 rounded-lg shadow photo-card" th:data-photo-id="${photo.id}">
                    <img th:src="@{/uploaded-photos/{filename}(filename=${photo.filename})}"
                         th:alt="${photo.title != null ? photo.title : 'Photo de la galerie'}"
                         class="rounded-t-lg object-cover w-full h-48">
                    <div class="p-3">
                        <form th:action="@{/admin/photos/edit/{id}(id=${photo.id})}" method="post" class="space-y-2"
                              th:aria-label="'Modifier la photo ' + ${photo.title != null ? photo.title : '#' + photo.id}">
                            <label th:for="'edit-title-' + ${photo.id}" class="sr-only">Titre</label>
                            <input type="text" name="title" th:id="'edit-title-' + ${photo.id}" th:value="${photo.title}" placeholder="Titre" maxlength="255"
                                   class="block w-full text-sm rounded border-gray-300 p-1.5 border"/>
                            <label th:for="'edit-desc-' + ${photo.id}" class="sr-only">Description</label>
                            <textarea name="description" rows="1" th:id="'edit-desc-' + ${photo.id}" th:text="${photo.description}" placeholder="Description" maxlength="2000"
                                      class="block w-full text-sm rounded border-gray-300 p-1.5 border"></textarea>
                            <label th:for="'edit-tags-' + ${photo.id}" class="sr-only">Tags</label>
                            <input type="text" name="tags" th:id="'edit-tags-' + ${photo.id}" th:value="${photo.tags}" placeholder="Tags (concert, live...)" maxlength="500"
                                   class="block w-full text-sm rounded border-gray-300 p-1.5 border"/>
                            <label th:for="'edit-cat-' + ${photo.id}" class="sr-only">Catégorie</label>
                            <select name="category" th:id="'edit-cat-' + ${photo.id}"
                                    class="block w-full text-sm rounded border-gray-300 p-1.5 border">
                                <option value="">-- Catégorie --</option>
                                <option value="Concert" th:selected="${photo.category == 'Concert'}">Concert</option>
                                <option value="Studio" th:selected="${photo.category == 'Studio'}">Studio</option>
                                <option value="Backstage" th:selected="${photo.category == 'Backstage'}">Backstage</option>
                                <option value="Promo" th:selected="${photo.category == 'Promo'}">Promo</option>
                                <option value="Portrait" th:selected="${photo.category == 'Portrait'}">Portrait</option>
                            </select>
                            <div class="flex gap-2">
                                <button type="submit"
                                        class="flex-1 bg-indigo-600 hover:bg-indigo-700 text-white text-sm font-semibold py-1.5 px-3 rounded"
                                        th:aria-label="'Enregistrer les modifications de ' + ${photo.title != null ? photo.title : 'la photo #' + photo.id}">
                                    Enregistrer
                                </button>
                            </div>
                        </form>
                        <form th:action="@{/admin/photos/delete/{id}(id=${photo.id})}" method="post" class="mt-2">
                            <button type="submit"
                                    class="w-full bg-red-600 hover:bg-red-700 text-white text-sm font-semibold py-1.5 px-3 rounded"
                                    onclick="return confirm('Êtes-vous sûr de vouloir supprimer cette photo ?')"
                                    th:aria-label="'Supprimer ' + ${photo.title != null ? photo.title : 'la photo #' + photo.id}">
                                Supprimer
                            </button>
                        </form>
                    </div>
                </div>
            </div>
        </div>
    </main>
</div>
<div th:replace="~{fragments/admin-layout :: admin-sidebar-mobile}"></div>

</body>
</html>
