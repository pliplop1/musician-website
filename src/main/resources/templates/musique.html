<!DOCTYPE html>
<html lang="fr" xmlns:th="http://www.thymeleaf.org" xmlns:sec="http://www.thymeleaf.org/extras/spring-security">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Musique - MARC DUPONT</title>
    <link rel="stylesheet" th:href="@{/css/style.css}">
</head>
<body class="bg-gray-900 text-white">

<header th:replace="~{fragments/layout :: header}"></header>

<main class="container mx-auto px-6 py-12">
    <section id="music-content">
        <h2 class="text-4xl font-bold text-center mb-10">Musique</h2>
        <div id="tracks-container" class="max-w-4xl mx-auto space-y-8">
            <p id="loading-message" class="text-center text-gray-400">Chargement...</p>
        </div>
    </section>
</main>

<footer class="bg-gray-800 mt-20 py-8">
    <div class="container mx-auto px-6 text-center text-gray-400">
        <div class="flex justify-center space-x-6 mb-6">
            <a href="https://facebook.com/VOTRE_PAGE" target="_blank" class="hover:text-white transition-colors">Facebook</a>
            <a href="https://instagram.com/VOTRE_PROFIL" target="_blank" class="hover:text-white transition-colors">Instagram</a>
        </div>
        <p>© 2025 MARC DUPONT. Tous droits réservés.</p>
    </div>
</footer>

<script th:inline="javascript">
document.addEventListener('DOMContentLoaded', function() {
    fetch('/api/tracks')
        .then(response => {
            if (!response.ok) {
                throw new Error('La réponse du réseau n\'était pas ok');
            }
            return response.json();
        })
        .then(tracks => {
            const container = document.getElementById('tracks-container');
            container.innerHTML = ''; // Vider le message de chargement

            if (tracks.length === 0) {
                container.innerHTML = '<p class="text-center text-gray-400">Aucune musique disponible.</p>';
                return;
            }

            tracks.forEach(track => {
                const trackDiv = document.createElement('div');
                trackDiv.className = 'bg-gray-800 rounded-lg p-6 shadow-lg';
                
                let content = `<h3 class="text-2xl font-bold mb-4">${track.title}</h3>`;
                
                if (track.trackType === 'EMBED') {
                    content += `<div>${track.embedCode}</div>`;
                } else if (track.trackType === 'UPLOADED_FILE') {
                    // On construit l'URL vers notre nouvel endpoint de streaming
                    const streamUrl = `/api/tracks/stream/${track.id}`;
                    content += `<audio controls class="w-full" src="${streamUrl}"></audio>`;
                }
                
                trackDiv.innerHTML = content;
                container.appendChild(trackDiv);
            });
        })
        .catch(error => {
            console.error('Erreur lors de la récupération des pistes:', error);
            const container = document.getElementById('tracks-container');
            container.innerHTML = '<p class="text-center text-red-500">Impossible de charger la musique.</p>';
        });
});
</script>

</body>
</html>
