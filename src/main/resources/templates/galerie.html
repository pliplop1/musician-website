<!DOCTYPE html>
<html lang="fr" xmlns:th="http://www.thymeleaf.org" xmlns:sec="http://www.thymeleaf.org/extras/spring-security">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Galerie - MARC DUPONT</title>
    <link rel="stylesheet" th:href="@{/css/style.css}">
</head>
<body class="bg-gray-900 text-white">

<header th:replace="~{fragments/layout :: header}"></header>

<main class="container mx-auto px-6 py-12">
    <section id="gallery-content">
        <h2 class="text-4xl font-bold text-center mb-10">Galerie</h2>
        <div th:if="${#lists.isEmpty(photos)}" class="text-center text-gray-400">
            <p>Aucune photo dans la galerie pour le moment.</p>
        </div>
        <div class="grid grid-cols-1 sm:grid-cols-2 md:grid-cols-3 gap-4">
            <div th:each="photo : ${photos}">
                <img th:src="@{/uploaded-photos/{filename}(filename=${photo.filename})}" 
                     alt="Photo de la galerie" 
                     class="w-full h-64 object-cover rounded-lg shadow-lg hover:scale-105 transition-transform duration-300">
            </div>
        </div>
    </section>
</main>

<footer class="bg-gray-800 mt-20 py-8">
    <div class="container mx-auto px-6 text-center text-gray-400">
        <div class="flex justify-center space-x-6 mb-6" th:if="${!#lists.isEmpty(enabledSocialLinks)}">
            <a th:each="link : ${enabledSocialLinks}"
               th:href="${link.url}"
               target="_blank"
               class="hover:text-white transition-colors flex items-center gap-2"
               th:title="${link.name}">
                <i th:class="${link.icon} + ' text-xl'"></i>
                <span th:text="${link.name}"></span>
            </a>
        </div>
        <div th:if="${#lists.isEmpty(enabledSocialLinks)}" class="mb-6 text-sm">
            <p>Aucun réseau social configuré</p>
        </div>
        <p>© 2025 MARC DUPONT. Tous droits réservés.</p>
    </div>
</footer>

</body>
</html>
