<!DOCTYPE html>
<html lang="fr" xmlns:th="http://www.thymeleaf.org" xmlns:sec="http://www.thymeleaf.org/extras/spring-security">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="_csrf" th:content="${_csrf.token}"/>
    <meta name="_csrf_header" th:content="${_csrf.headerName}"/>
    <title>Galerie - Duo Black & White</title>
    <link rel="stylesheet" th:href="@{/css/style.css}">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        /* Styles pour la page galerie */
        .gallery-page {
            min-height: 100vh;
            background: linear-gradient(135deg, #1a1a2e 0%, #0f0f23 100%);
            padding: 6rem 2rem;
            position: relative;
            overflow: hidden;
        }

        .gallery-page::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: radial-gradient(circle at 80% 20%, rgba(168, 85, 247, 0.1) 0%, transparent 50%),
                        radial-gradient(circle at 20% 80%, rgba(236, 72, 153, 0.1) 0%, transparent 50%);
            pointer-events: none;
        }

        .gallery-container {
            max-width: 1400px;
            margin: 0 auto;
            position: relative;
            z-index: 1;
        }

        .page-title {
            text-align: center;
            font-size: 3.5rem;
            margin-bottom: 1rem;
            background: linear-gradient(135deg, #a855f7 0%, #ec4899 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            font-weight: 900;
        }

        .page-title i {
            margin-right: 1rem;
            color: #a855f7;
            -webkit-text-fill-color: #a855f7;
        }

        .page-subtitle {
            text-align: center;
            color: #9ca3af;
            font-size: 1.25rem;
            margin-bottom: 3rem;
        }

        /* Barre de recherche */
        .search-container {
            max-width: 600px;
            margin: 0 auto 3rem;
            position: relative;
        }

        .search-input {
            width: 100%;
            padding: 1rem 3rem 1rem 1.5rem;
            background: rgba(255, 255, 255, 0.05);
            border: 2px solid rgba(168, 85, 247, 0.3);
            border-radius: 50px;
            color: #fff;
            font-size: 1.1rem;
            transition: all 0.3s ease;
        }

        .search-input:focus {
            outline: none;
            border-color: #a855f7;
            background: rgba(255, 255, 255, 0.08);
            box-shadow: 0 0 20px rgba(168, 85, 247, 0.3);
        }

        .search-input::placeholder {
            color: #9ca3af;
        }

        .search-icon {
            position: absolute;
            right: 1.5rem;
            top: 50%;
            transform: translateY(-50%);
            color: #a855f7;
            font-size: 1.2rem;
            pointer-events: none;
        }

        /* Compteur de résultats */
        .results-count {
            text-align: center;
            color: #9ca3af;
            margin-bottom: 2rem;
            font-size: 1.1rem;
        }

        .results-count strong {
            color: #a855f7;
        }

        /* Grille de photos */
        .photos-grid {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 2rem;
            margin-bottom: 3rem;
        }

        @media (max-width: 1024px) {
            .photos-grid {
                grid-template-columns: repeat(2, 1fr);
            }
        }

        .photo-card {
            background: rgba(255, 255, 255, 0.03);
            backdrop-filter: blur(10px);
            border-radius: 15px;
            overflow: hidden;
            transition: all 0.4s ease;
            border: 1px solid rgba(255, 255, 255, 0.1);
            box-shadow: 0 4px 20px rgba(0, 0, 0, 0.3);
            cursor: pointer;
            animation: fadeInUp 0.6s ease-out;
        }

        .photo-card:hover {
            transform: translateY(-10px) scale(1.03);
            box-shadow: 0 12px 40px rgba(168, 85, 247, 0.3);
            border-color: rgba(168, 85, 247, 0.3);
        }

        .photo-thumbnail {
            position: relative;
            width: 100%;
            aspect-ratio: 16/9;
            overflow: hidden;
        }

        .photo-thumbnail img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            transition: transform 0.3s ease;
        }

        .photo-card:hover .photo-thumbnail img {
            transform: scale(1.1);
        }

        .zoom-overlay {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            font-size: 3rem;
            color: #a855f7;
            opacity: 0;
            transition: all 0.3s ease;
            pointer-events: none;
            text-shadow: 0 0 20px rgba(0, 0, 0, 0.5);
            z-index: 2;
        }

        .photo-card:hover .zoom-overlay {
            opacity: 1;
            transform: translate(-50%, -50%) scale(1.2);
        }

        .photo-card-footer {
            padding: 1.5rem;
            display: flex;
            flex-direction: column;
            gap: 0.75rem;
        }

        .photo-card-footer h3 {
            font-size: 1.1rem;
            margin: 0;
            color: #fff;
            font-weight: 600;
            line-height: 1.4;
        }

        .photo-meta {
            display: flex;
            justify-content: space-between;
            align-items: center;
            gap: 0.75rem;
        }

        .photo-category-badge {
            display: inline-flex;
            align-items: center;
            gap: 0.5rem;
            padding: 0.4rem 0.8rem;
            background: rgba(168, 85, 247, 0.15);
            border: 1px solid rgba(168, 85, 247, 0.3);
            border-radius: 15px;
            color: #c084fc;
            font-size: 0.8rem;
            width: fit-content;
        }

        /* Badge de compteur de vues */
        .view-count-badge {
            display: inline-flex;
            align-items: center;
            gap: 0.4rem;
            padding: 0.4rem 0.8rem;
            background: rgba(59, 130, 246, 0.15);
            border: 1px solid rgba(59, 130, 246, 0.3);
            border-radius: 15px;
            color: #60a5fa;
            font-size: 0.85rem;
            font-weight: 600;
            transition: all 0.3s ease;
        }

        .view-count-badge:hover {
            background: rgba(59, 130, 246, 0.25);
            transform: scale(1.05);
        }

        .like-button {
            display: inline-flex;
            align-items: center;
            gap: 0.4rem;
            padding: 0.4rem 0.8rem;
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 15px;
            color: #9ca3af;
            font-size: 0.85rem;
            cursor: pointer;
            transition: all 0.3s ease;
            font-weight: 600;
        }

        .like-button:hover {
            background: rgba(239, 68, 68, 0.15);
            border-color: rgba(239, 68, 68, 0.3);
            color: #ef4444;
            transform: scale(1.05);
        }

        .like-button.liked {
            background: rgba(239, 68, 68, 0.2);
            border-color: rgba(239, 68, 68, 0.4);
            color: #ef4444;
        }

        .like-button.liked i {
            animation: heartBeat 0.6s ease-in-out;
        }

        @keyframes heartBeat {
            0%, 100% { transform: scale(1); }
            25% { transform: scale(1.3); }
            50% { transform: scale(1.1); }
            75% { transform: scale(1.25); }
        }

        /* Modal */
        .photo-modal {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: rgba(0, 0, 0, 0.95);
            z-index: 9999;
            align-items: center;
            justify-content: center;
            padding: 2rem;
            animation: fadeIn 0.3s ease;
        }

        .photo-modal.active {
            display: flex;
        }

        @keyframes fadeIn {
            from { opacity: 0; }
            to { opacity: 1; }
        }

        .modal-content {
            width: 100%;
            max-width: 1200px;
            position: relative;
            animation: slideUp 0.3s ease;
        }

        @keyframes slideUp {
            from {
                opacity: 0;
                transform: translateY(30px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .modal-close {
            position: absolute;
            top: -3rem;
            right: 0;
            background: rgba(168, 85, 247, 0.2);
            border: 2px solid #a855f7;
            color: #fff;
            font-size: 1.5rem;
            width: 3rem;
            height: 3rem;
            border-radius: 50%;
            cursor: pointer;
            transition: all 0.3s ease;
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 10001;
        }

        .modal-close:hover {
            background: #a855f7;
            transform: rotate(90deg);
        }

        .modal-image-wrapper {
            position: relative;
            width: 100%;
            background: #000;
            border-radius: 10px;
            overflow: hidden;
        }

        .modal-image-wrapper img {
            width: 100%;
            height: auto;
            display: block;
            max-height: 80vh;
            object-fit: contain;
        }

        .modal-title {
            margin-top: 1.5rem;
            text-align: center;
        }

        .modal-title h2 {
            color: #fff;
            font-size: 1.5rem;
            margin: 0;
        }

        /* Message vide */
        .no-results {
            text-align: center;
            padding: 4rem 2rem;
            color: #9ca3af;
        }

        .no-results i {
            font-size: 4rem;
            margin-bottom: 1rem;
            color: #a855f7;
        }

        /* Loading */
        .loading {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 4rem 2rem;
            color: #9ca3af;
        }

        .spinner {
            width: 50px;
            height: 50px;
            border: 4px solid rgba(168, 85, 247, 0.2);
            border-top-color: #a855f7;
            border-radius: 50%;
            animation: spin 1s linear infinite;
            margin-bottom: 1rem;
        }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }

        @keyframes fadeInUp {
            from {
                opacity: 0;
                transform: translateY(30px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        /* Bouton Charger Plus */
        .load-more-container {
            text-align: center;
            margin: 3rem 0;
        }

        .btn-load-more {
            display: inline-flex;
            align-items: center;
            gap: 1rem;
            padding: 1.25rem 3rem;
            background: linear-gradient(135deg, #a855f7 0%, #ec4899 100%);
            color: #fff;
            border: none;
            border-radius: 50px;
            font-size: 1.25rem;
            font-weight: 700;
            cursor: pointer;
            transition: all 0.4s ease;
            box-shadow: 0 8px 30px rgba(168, 85, 247, 0.4);
            text-transform: uppercase;
            letter-spacing: 1px;
            position: relative;
            overflow: hidden;
        }

        .btn-load-more::before {
            content: '';
            position: absolute;
            top: 0;
            left: -100%;
            width: 100%;
            height: 100%;
            background: linear-gradient(90deg, transparent, rgba(255, 255, 255, 0.3), transparent);
            transition: left 0.5s;
        }

        .btn-load-more:hover::before {
            left: 100%;
        }

        .btn-load-more:hover {
            transform: translateY(-5px) scale(1.05);
            box-shadow: 0 12px 40px rgba(168, 85, 247, 0.6);
            background: linear-gradient(135deg, #9333ea 0%, #db2777 100%);
        }

        .btn-load-more i {
            font-size: 1.5rem;
            transition: transform 0.3s ease;
        }

        .btn-load-more:hover i {
            transform: translateY(3px);
        }

        .btn-load-more:disabled {
            opacity: 0.5;
            cursor: not-allowed;
            transform: none;
        }

        /* Responsive */
        @media (max-width: 768px) {
            .gallery-page {
                padding: 4rem 1rem;
            }

            .page-title {
                font-size: 2.5rem;
            }

            .page-subtitle {
                font-size: 1rem;
            }

            .photos-grid {
                grid-template-columns: 1fr;
                gap: 1.5rem;
            }

            .search-input {
                font-size: 1rem;
                padding: 0.875rem 2.5rem 0.875rem 1.25rem;
            }

            .btn-load-more {
                font-size: 1rem;
                padding: 1rem 2rem;
            }
        }
    </style>
</head>
<body>

<header th:replace="~{fragments/layout :: header}"></header>

<main class="gallery-page">
    <div class="gallery-container">
        <h1 class="page-title">
            <i class="fas fa-images"></i> Toute notre Galerie
        </h1>
        <p class="page-subtitle">Découvrez l'intégralité de nos photos</p>

        <!-- Barre de recherche -->
        <div class="search-container">
            <input
                type="text"
                id="searchInput"
                class="search-input"
                placeholder="Rechercher une photo...">
            <i class="fas fa-search search-icon"></i>
        </div>

        <!-- Compteur de résultats -->
        <div class="results-count" id="resultsCount"></div>

        <!-- Loading -->
        <div class="loading" id="loadingMessage">
            <div class="spinner"></div>
            <p>Chargement de la galerie...</p>
        </div>

        <!-- Grille de photos -->
        <div class="photos-grid" id="photosGrid" style="display: none;"></div>

        <!-- Message aucun résultat -->
        <div class="no-results" id="noResults" style="display: none;">
            <i class="fas fa-search"></i>
            <h3>Aucune photo trouvée</h3>
            <p>Essayez avec d'autres mots-clés</p>
        </div>

        <!-- Bouton Charger Plus -->
        <div class="load-more-container" id="loadMoreContainer" style="display: none;">
            <button class="btn-load-more" id="btnLoadMore">
                <i class="fas fa-plus-circle"></i>
                <span>Charger plus de photos</span>
                <i class="fas fa-arrow-down"></i>
            </button>
        </div>
    </div>

    <!-- Modal lightbox -->
    <div class="photo-modal" id="photoModal">
        <div class="modal-content">
            <button class="modal-close" id="modalClose">
                <i class="fas fa-times"></i>
            </button>
            <div class="modal-image-wrapper" id="modalImageWrapper">
                <!-- L'image sera injectée ici -->
            </div>
            <div class="modal-title">
                <h2 id="modalTitle"></h2>
            </div>
        </div>
    </div>
</main>

<footer class="bg-gray-800 mt-20 py-8">
    <div class="container mx-auto px-6 text-center text-gray-400">
        <div class="flex justify-center space-x-6 mb-6" th:if="${!#lists.isEmpty(enabledSocialLinks)}">
            <a th:each="link : ${enabledSocialLinks}"
               th:href="${link.url}"
               target="_blank"
               class="hover:text-white transition-colors flex items-center gap-2"
               th:title="${link.name}">
                <i th:class="${link.icon} + ' text-xl'"></i>
                <span th:text="${link.name}"></span>
            </a>
        </div>
        <div th:if="${#lists.isEmpty(enabledSocialLinks)}" class="mb-6 text-sm">
            <p>Aucun réseau social configuré</p>
        </div>
        <p>© 2025 Duo Black & White. Tous droits réservés.</p>
    </div>
</footer>

<script>
let allPhotos = [];
let filteredPhotos = [];
let currentPage = 1;
const photosPerPage = 9;
let isAuthenticated = false;
let likedPhotos = new Set();

// Afficher les photos avec pagination
function displayPhotos(photos) {
    const grid = document.getElementById('photosGrid');
    const noResults = document.getElementById('noResults');
    const resultsCount = document.getElementById('resultsCount');
    const loadMoreContainer = document.getElementById('loadMoreContainer');

    if (photos.length === 0) {
        grid.style.display = 'none';
        noResults.style.display = 'block';
        loadMoreContainer.style.display = 'none';
        resultsCount.textContent = '';
        return;
    }

    noResults.style.display = 'none';
    grid.style.display = 'grid';

    // Calculer la pagination
    const totalPages = Math.ceil(photos.length / photosPerPage);
    const startIndex = (currentPage - 1) * photosPerPage;
    const endIndex = startIndex + photosPerPage;
    const photosToShow = photos.slice(startIndex, endIndex);

    // Mettre à jour le compteur
    resultsCount.innerHTML = `Page <strong>${currentPage}</strong> sur <strong>${totalPages}</strong> - <strong>${photos.length}</strong> photo${photos.length > 1 ? 's' : ''} au total`;

    grid.innerHTML = photosToShow.map(photo => `
        <div class="photo-card" data-photo-id="${photo.id}">
            <div class="photo-thumbnail">
                <img src="${photo.url}" alt="${photo.caption || 'Photo de galerie'}">
                <div class="zoom-overlay">
                    <i class="fas fa-search-plus"></i>
                </div>
            </div>
            <div class="photo-card-footer">
                <h3>${photo.caption || 'Photo #' + photo.id}</h3>
                <div class="photo-meta">
                    <span class="photo-category-badge">
                        <i class="fas fa-image"></i>
                        ${photo.category || 'Galerie'}
                    </span>
                    <div style="display: flex; gap: 0.5rem; align-items: center;">
                        <span class="view-count-badge" data-view-photo-id="${photo.id}" title="${photo.viewCount || 0} vues">
                            <i class="fas fa-eye"></i>
                            <span>${photo.viewCount || 0}</span>
                        </span>
                        <button
                            class="like-button ${likedPhotos.has(photo.id) ? 'liked' : ''}"
                            data-like-photo-id="${photo.id}"
                            title="${likedPhotos.has(photo.id) ? 'Retirer le like' : 'Aimer cette photo'}">
                            <i class="${likedPhotos.has(photo.id) ? 'fas' : 'far'} fa-heart"></i>
                            <span>${photo.likeCount || 0}</span>
                        </button>
                    </div>
                </div>
            </div>
        </div>
    `).join('');

    // Ajouter les événements de clic
    document.querySelectorAll('.photo-card').forEach(card => {
        card.addEventListener('click', function() {
            const photoId = parseInt(this.dataset.photoId);
            const photo = allPhotos.find(p => p.id === photoId);
            if (photo) {
                openPhotoModal(photo);
            }
        });
    });

    // Ajouter les événements de clic pour les boutons like
    document.querySelectorAll('.like-button').forEach(button => {
        button.addEventListener('click', function(e) {
            e.stopPropagation();
            const photoId = parseInt(this.dataset.likePhotoId);
            toggleLike(photoId, this);
        });
    });

    // Afficher/masquer le bouton de pagination
    updatePaginationButton(totalPages);

    // Scroll vers le haut
    window.scrollTo({ top: 0, behavior: 'smooth' });
}

// Mettre à jour le bouton de pagination
function updatePaginationButton(totalPages) {
    const loadMoreContainer = document.getElementById('loadMoreContainer');
    const btnLoadMore = document.getElementById('btnLoadMore');

    if (totalPages <= 1) {
        loadMoreContainer.style.display = 'none';
        return;
    }

    loadMoreContainer.style.display = 'block';

    if (currentPage < totalPages) {
        btnLoadMore.innerHTML = `
            <i class="fas fa-chevron-right"></i>
            <span>Page suivante (${currentPage + 1}/${totalPages})</span>
            <i class="fas fa-arrow-right"></i>
        `;
        btnLoadMore.disabled = false;
    } else {
        btnLoadMore.innerHTML = `
            <i class="fas fa-redo"></i>
            <span>Retour à la page 1</span>
            <i class="fas fa-arrow-left"></i>
        `;
        btnLoadMore.disabled = false;
    }
}

// Charger la page suivante
function loadNextPage() {
    const totalPages = Math.ceil(filteredPhotos.length / photosPerPage);

    if (currentPage < totalPages) {
        currentPage++;
    } else {
        currentPage = 1;
    }

    displayPhotos(filteredPhotos);
}

// Ouvrir le modal
function openPhotoModal(photo) {
    const modal = document.getElementById('photoModal');
    const modalTitle = document.getElementById('modalTitle');
    const modalImageWrapper = document.getElementById('modalImageWrapper');

    // Incrémenter le compteur de vues
    incrementViewCount(photo.id);

    modalTitle.textContent = photo.caption || 'Photo #' + photo.id;
    modalImageWrapper.innerHTML = `<img src="${photo.url}" alt="${photo.caption || 'Photo de galerie'}">`;

    modal.classList.add('active');
    document.body.style.overflow = 'hidden';
}

// Incrémenter le compteur de vues d'une photo
async function incrementViewCount(photoId) {
    try {
        const response = await fetch(`/api/photos/${photoId}/view`, {
            method: 'POST'
        });

        if (response.ok) {
            const data = await response.json();
            console.log(`📸 Vue enregistrée pour la photo ${photoId}: ${data.viewCount} vues`);

            // Mettre à jour le compteur local dans allPhotos
            const photo = allPhotos.find(p => p.id === photoId);
            if (photo) {
                photo.viewCount = data.viewCount;
            }

            // Mettre à jour le badge affiché sur la page
            const viewBadge = document.querySelector(`[data-view-photo-id="${photoId}"]`);
            if (viewBadge) {
                const countSpan = viewBadge.querySelector('span');
                if (countSpan) {
                    countSpan.textContent = data.viewCount;
                }
                viewBadge.title = `${data.viewCount} vues`;
            }
        }
    } catch (error) {
        console.error('Erreur lors de l\'incrémentation des vues:', error);
    }
}

// Fermer le modal
function closePhotoModal() {
    const modal = document.getElementById('photoModal');
    const modalImageWrapper = document.getElementById('modalImageWrapper');

    modal.classList.remove('active');
    modalImageWrapper.innerHTML = '';
    document.body.style.overflow = '';
}

// Recherche
function searchPhotos(query) {
    const searchTerm = query.toLowerCase().trim();

    if (searchTerm === '') {
        filteredPhotos = allPhotos;
    } else {
        filteredPhotos = allPhotos.filter(photo => {
            const caption = (photo.caption || '').toLowerCase();
            const category = (photo.category || '').toLowerCase();
            return caption.includes(searchTerm) || category.includes(searchTerm);
        });
    }

    currentPage = 1;
    displayPhotos(filteredPhotos);
}

// Obtenir le token CSRF
function getCsrfToken() {
    const token = document.querySelector('meta[name="_csrf"]')?.content;
    const header = document.querySelector('meta[name="_csrf_header"]')?.content;
    return { token, header };
}

// Toggle like
async function toggleLike(photoId, button) {
    if (!isAuthenticated) {
        alert('Vous devez être connecté pour liker une photo');
        window.location.href = '/login';
        return;
    }

    const csrf = getCsrfToken();
    const isLiked = likedPhotos.has(photoId);

    try {
        const response = await fetch(`/api/photos/${photoId}/like`, {
            method: isLiked ? 'DELETE' : 'POST',
            headers: {
                [csrf.header]: csrf.token
            }
        });

        if (!response.ok) {
            if (response.status === 401) {
                isAuthenticated = false;
                alert('Session expirée, veuillez vous reconnecter');
                window.location.href = '/login';
                return;
            }
            throw new Error('Erreur lors du like');
        }

        // Mettre à jour l'état local
        if (isLiked) {
            likedPhotos.delete(photoId);
        } else {
            likedPhotos.add(photoId);
        }

        // Récupérer le nombre de likes mis à jour
        const photoResponse = await fetch(`/api/public/photos/${photoId}`);
        if (photoResponse.ok) {
            const photoData = await photoResponse.json();
            const photo = allPhotos.find(p => p.id === photoId);
            if (photo) {
                photo.likeCount = photoData.likeCount;
            }

            // Mettre à jour l'affichage du bouton
            const icon = button.querySelector('i');
            const count = button.querySelector('span');

            if (likedPhotos.has(photoId)) {
                button.classList.add('liked');
                icon.className = 'fas fa-heart';
            } else {
                button.classList.remove('liked');
                icon.className = 'far fa-heart';
            }
            count.textContent = photoData.likeCount || 0;
        }
    } catch (error) {
        console.error('Erreur lors du like:', error);
        alert('Une erreur est survenue');
    }
}

// Vérifier l'authentification
async function checkAuth() {
    try {
        const response = await fetch('/api/user/current');
        isAuthenticated = response.ok && (await response.json());
    } catch (error) {
        console.error('Erreur vérification auth:', error);
        isAuthenticated = false;
    }
}

// Charger les statuts de like
async function loadLikeStatuses() {
    if (!isAuthenticated) return;

    for (const photo of allPhotos) {
        try {
            const response = await fetch(`/api/photos/${photo.id}/like-status`);
            if (response.ok) {
                const data = await response.json();
                if (data.liked) {
                    likedPhotos.add(photo.id);
                }
            }
        } catch (error) {
            console.error('Erreur chargement status like:', error);
        }
    }
}

// Charger les photos
document.addEventListener('DOMContentLoaded', function() {
    const loadingMessage = document.getElementById('loadingMessage');
    const searchInput = document.getElementById('searchInput');
    const modalClose = document.getElementById('modalClose');
    const modal = document.getElementById('photoModal');
    const btnLoadMore = document.getElementById('btnLoadMore');

    // Événement de recherche
    searchInput.addEventListener('input', function() {
        searchPhotos(this.value);
    });

    // Événement du bouton Charger Plus
    btnLoadMore.addEventListener('click', loadNextPage);

    // Fermer le modal
    modalClose.addEventListener('click', closePhotoModal);
    modal.addEventListener('click', function(e) {
        if (e.target === modal) {
            closePhotoModal();
        }
    });

    // Échapper pour fermer le modal
    document.addEventListener('keydown', function(e) {
        if (e.key === 'Escape' && modal.classList.contains('active')) {
            closePhotoModal();
        }
    });

    // Charger les photos depuis l'API
    fetch('/api/public/photos')
        .then(response => {
            if (!response.ok) {
                throw new Error('Erreur lors du chargement de la galerie');
            }
            return response.json();
        })
        .then(async photos => {
            allPhotos = photos;
            filteredPhotos = photos;
            loadingMessage.style.display = 'none';

            // Vérifier l'authentification et charger les likes
            await checkAuth();
            await loadLikeStatuses();

            displayPhotos(photos);
        })
        .catch(error => {
            console.error('Erreur:', error);
            loadingMessage.innerHTML = `
                <i class="fas fa-exclamation-triangle" style="color: #a855f7; font-size: 3rem; margin-bottom: 1rem;"></i>
                <p style="color: #c084fc;">Impossible de charger la galerie</p>
            `;
        });
});
</script>
