<!DOCTYPE html>
<html lang="fr" xmlns:th="http://www.thymeleaf.org" xmlns:sec="http://www.thymeleaf.org/extras/spring-security">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="_csrf" th:content="${_csrf.token}"/>
    <meta name="_csrf_header" th:content="${_csrf.headerName}"/>
    <th:block th:replace="~{fragments/head :: head(
        'Galerie - Duo Black & White',
        'Toute notre galerie photo: souvenirs de concerts et moments partagés.',
        null,
        null
    )}"></th:block>

    <link rel="preload" as="style" th:href="@{/css/style.css(v=${#dates.createNow().time})}" onload="this.onload=null;this.rel='stylesheet'">
    <noscript><link rel="stylesheet" th:href="@{/css/style.css(v=${#dates.createNow().time})}"></noscript>
    <!-- Font Awesome: chargement asynchrone pour ne pas bloquer le rendu -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" media="print" onload="this.media='all'" />
    <noscript><link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" /></noscript>
    <link rel="stylesheet" th:href="@{/css/gallery-page.css}">

    <!-- Schema.org Structured Data -->
    <th:block th:replace="~{fragments/schema-org :: organization}"></th:block>
    <th:block th:replace="~{fragments/schema-org :: webpage('Galerie - Duo Black &amp; White', 'Toute notre galerie photo: souvenirs de concerts et moments partagés.', 'https://duoblackandwhite.com/galerie')}"></th:block>
</head>
<body>

<header th:replace="~{fragments/layout :: header}"></header>

<main class="gallery-page">
    <div class="gallery-container">
        <h1 class="page-title">
            <i class="fas fa-images" aria-hidden="true"></i> Toute notre Galerie
        </h1>
        <p class="page-subtitle">Découvrez l'intégralité de nos photos</p>

        <!-- Barre de recherche -->
        <div class="search-container">
            <input
                type="text"
                id="searchInput"
                class="search-input"
                placeholder="Rechercher une photo..."
                aria-label="Rechercher une photo">
            <i class="fas fa-search search-icon" aria-hidden="true"></i>
        </div>

        <!-- Compteur de résultats -->
        <div class="results-count" id="resultsCount"></div>

        <!-- Loading -->
        <div class="loading" id="loadingMessage">
            <div class="spinner"></div>
            <p>Chargement de la galerie...</p>
        </div>

        <!-- Grille de photos -->
        <div class="photos-grid" id="photosGrid" style="display: none;"></div>

        <!-- Message aucun résultat -->
        <div class="no-results" id="noResults" style="display: none;">
            <i class="fas fa-search"></i>
            <h3>Aucune photo trouvée</h3>
            <p>Essayez avec d'autres mots-clés</p>
        </div>

        <!-- Bouton Charger Plus -->
        <div class="load-more-container" id="loadMoreContainer" style="display: none;">
            <button class="btn-load-more" id="btnLoadMore" aria-label="Charger plus de photos">
                <i class="fas fa-plus-circle" aria-hidden="true"></i>
                <span>Charger plus de photos</span>
                <i class="fas fa-arrow-down" aria-hidden="true"></i>
            </button>
        </div>
    </div>

    <!-- Modal lightbox -->
    <div class="photo-modal" id="photoModal" role="dialog" aria-modal="true" aria-labelledby="modalTitle">
        <div class="modal-content">
            <button class="modal-close" id="modalClose" aria-label="Fermer la photo">
                <i class="fas fa-times" aria-hidden="true"></i>
            </button>
            <div class="modal-image-wrapper" id="modalImageWrapper">
                <!-- L'image sera injectée ici -->
            </div>
            <div class="modal-title">
                <h2 id="modalTitle"></h2>
            </div>
        </div>
    </div>
</main>

<footer th:replace="~{fragments/layout :: footer}"></footer>

<script>
// Logger conditionnel (dev uniquement)
const isDev = window.location.hostname === 'localhost' || window.location.hostname === '127.0.0.1';
const logger = {
    log: (...args) => isDev && console.log(...args),
    error: (...args) => isDev && console.error(...args),
    warn: (...args) => isDev && console.warn(...args)
};

let allPhotos = [];
let filteredPhotos = [];
let currentPage = 1;
const photosPerPage = 9;
let isAuthenticated = false;
let likedPhotos = new Set();
let photoModalFocusTrap = null;

// Afficher les photos avec pagination
function displayPhotos(photos) {
    const grid = document.getElementById('photosGrid');
    const noResults = document.getElementById('noResults');
    const resultsCount = document.getElementById('resultsCount');
    const loadMoreContainer = document.getElementById('loadMoreContainer');

    if (photos.length === 0) {
        grid.style.display = 'none';
        noResults.style.display = 'block';
        loadMoreContainer.style.display = 'none';
        resultsCount.textContent = '';
        return;
    }

    noResults.style.display = 'none';
    grid.style.display = 'grid';

    // Calculer la pagination
    const totalPages = Math.ceil(photos.length / photosPerPage);
    const startIndex = (currentPage - 1) * photosPerPage;
    const endIndex = startIndex + photosPerPage;
    const photosToShow = photos.slice(startIndex, endIndex);

    // Mettre à jour le compteur
    resultsCount.innerHTML = `Page <strong>${currentPage}</strong> sur <strong>${totalPages}</strong> - <strong>${photos.length}</strong> photo${photos.length > 1 ? 's' : ''} au total`;

    grid.innerHTML = photosToShow.map(photo => `
        <div class="photo-card" data-photo-id="${photo.id}">
            <div class="photo-thumbnail">
                <img src="${photo.url}" alt="${photo.caption || 'Photo de galerie'}" loading="lazy" decoding="async">
                <div class="zoom-overlay">
                    <i class="fas fa-search-plus"></i>
                </div>
            </div>
            <div class="photo-card-footer">
                <h3>${photo.caption || 'Photo #' + photo.id}</h3>
                <div class="photo-meta">
                    <span class="photo-category-badge">
                        <i class="fas fa-images"></i>
                        Photos
                    </span>
                    <div style="display: flex; gap: 0.5rem; align-items: center;">
                        <span class="view-count-badge" data-view-photo-id="${photo.id}" title="${photo.viewCount || 0} vues">
                            <i class="fas fa-eye"></i>
                            <span>${photo.viewCount || 0}</span>
                        </span>
                        <button
                            class="like-button ${likedPhotos.has(photo.id) ? 'liked' : ''}"
                            data-like-photo-id="${photo.id}"
                            title="${likedPhotos.has(photo.id) ? 'Retirer le like' : 'Aimer cette photo'}">
                            <i class="${likedPhotos.has(photo.id) ? 'fas' : 'far'} fa-heart"></i>
                            <span>${photo.likeCount || 0}</span>
                        </button>
                    </div>
                </div>
            </div>
        </div>
    `).join('');

    // Ajouter les événements de clic
    document.querySelectorAll('.photo-card').forEach(card => {
        card.addEventListener('click', function() {
            const photoId = parseInt(this.dataset.photoId);
            const photo = allPhotos.find(p => p.id === photoId);
            if (photo) {
                openPhotoModal(photo);
            }
        });
    });

    // Ajouter les événements de clic pour les boutons like
    document.querySelectorAll('.like-button').forEach(button => {
        button.addEventListener('click', function(e) {
            e.stopPropagation();
            const photoId = parseInt(this.dataset.likePhotoId);
            toggleLike(photoId, this);
        });
    });

    // Afficher/masquer le bouton de pagination
    updatePaginationButton(totalPages);

    // Scroll vers le haut
    window.scrollTo({ top: 0, behavior: 'smooth' });
}

// Mettre à jour le bouton de pagination
function updatePaginationButton(totalPages) {
    const loadMoreContainer = document.getElementById('loadMoreContainer');
    const btnLoadMore = document.getElementById('btnLoadMore');

    if (totalPages <= 1) {
        loadMoreContainer.style.display = 'none';
        return;
    }

    loadMoreContainer.style.display = 'block';

    if (currentPage < totalPages) {
        btnLoadMore.innerHTML = `
            <i class="fas fa-chevron-right"></i>
            <span>Page suivante (${currentPage + 1}/${totalPages})</span>
            <i class="fas fa-arrow-right"></i>
        `;
        btnLoadMore.disabled = false;
    } else {
        btnLoadMore.innerHTML = `
            <i class="fas fa-redo"></i>
            <span>Retour à la page 1</span>
            <i class="fas fa-arrow-left"></i>
        `;
        btnLoadMore.disabled = false;
    }
}

// Charger la page suivante
function loadNextPage() {
    const totalPages = Math.ceil(filteredPhotos.length / photosPerPage);

    if (currentPage < totalPages) {
        currentPage++;
    } else {
        currentPage = 1;
    }

    displayPhotos(filteredPhotos);
}

// Ouvrir le modal
function openPhotoModal(photo) {
    const modal = document.getElementById('photoModal');
    const modalTitle = document.getElementById('modalTitle');
    const modalImageWrapper = document.getElementById('modalImageWrapper');

    // Incrémenter le compteur de vues
    incrementViewCount(photo.id);

    modalTitle.textContent = photo.caption || 'Photo #' + photo.id;
    modalImageWrapper.innerHTML = `<img src="${photo.url}" alt="${photo.caption || 'Photo de galerie'}" loading="lazy" decoding="async">`;

    modal.classList.add('active');
    document.body.style.overflow = 'hidden';

    // Activer le focus trap (RGAA 12.7)
    if (window.createFocusTrap) {
        photoModalFocusTrap = window.createFocusTrap(modal);
        photoModalFocusTrap.activate();
    }
}

// Incrémenter le compteur de vues d'une photo
async function incrementViewCount(photoId) {
    try {
        const response = await fetch(`/api/photos/${photoId}/view`, {
            method: 'POST'
        });

        if (response.ok) {
            const data = await response.json();
            logger.log(`📸 Vue enregistrée pour la photo ${photoId}: ${data.viewCount} vues`);

            // Mettre à jour le compteur local dans allPhotos
            const photo = allPhotos.find(p => p.id === photoId);
            if (photo) {
                photo.viewCount = data.viewCount;
            }

            // Mettre à jour le badge affiché sur la page
            const viewBadge = document.querySelector(`[data-view-photo-id="${photoId}"]`);
            if (viewBadge) {
                const countSpan = viewBadge.querySelector('span');
                if (countSpan) {
                    countSpan.textContent = data.viewCount;
                }
                viewBadge.title = `${data.viewCount} vues`;
            }
        }
    } catch (error) {
        logger.error('Erreur lors de l\'incrémentation des vues:', error);
    }
}

// Fermer le modal
function closePhotoModal() {
    const modal = document.getElementById('photoModal');
    const modalImageWrapper = document.getElementById('modalImageWrapper');

    // Désactiver le focus trap
    if (photoModalFocusTrap) {
        photoModalFocusTrap.deactivate();
        photoModalFocusTrap = null;
    }

    modal.classList.remove('active');
    modalImageWrapper.innerHTML = '';
    document.body.style.overflow = '';
}

// Recherche
function searchPhotos(query) {
    const searchTerm = query.toLowerCase().trim();

    if (searchTerm === '') {
        filteredPhotos = allPhotos;
    } else {
        filteredPhotos = allPhotos.filter(photo => {
            const caption = (photo.caption || '').toLowerCase();
            const category = (photo.category || '').toLowerCase();
            return caption.includes(searchTerm) || category.includes(searchTerm);
        });
    }

    currentPage = 1;
    displayPhotos(filteredPhotos);
}

// Obtenir le token CSRF
function getCsrfToken() {
    const token = document.querySelector('meta[name="_csrf"]')?.content;
    const header = document.querySelector('meta[name="_csrf_header"]')?.content;
    return { token, header };
}

// Toggle like
async function toggleLike(photoId, button) {
    if (!isAuthenticated) {
        alert('Vous devez être connecté pour liker une photo');
        window.location.href = '/login';
        return;
    }

    const csrf = getCsrfToken();
    const isLiked = likedPhotos.has(photoId);

    try {
        const response = await fetch(`/api/photos/${photoId}/like`, {
            method: isLiked ? 'DELETE' : 'POST',
            headers: {
                [csrf.header]: csrf.token
            }
        });

        if (!response.ok) {
            if (response.status === 401) {
                isAuthenticated = false;
                alert('Session expirée, veuillez vous reconnecter');
                window.location.href = '/login';
                return;
            }
            throw new Error('Erreur lors du like');
        }

        // Mettre à jour l'état local
        if (isLiked) {
            likedPhotos.delete(photoId);
        } else {
            likedPhotos.add(photoId);
        }

        // Récupérer le nombre de likes mis à jour
        const photoResponse = await fetch(`/api/public/photos/${photoId}`);
        if (photoResponse.ok) {
            const photoData = await photoResponse.json();
            const photo = allPhotos.find(p => p.id === photoId);
            if (photo) {
                photo.likeCount = photoData.likeCount;
            }

            // Mettre à jour l'affichage du bouton
            const icon = button.querySelector('i');
            const count = button.querySelector('span');

            if (likedPhotos.has(photoId)) {
                button.classList.add('liked');
                icon.className = 'fas fa-heart';
            } else {
                button.classList.remove('liked');
                icon.className = 'far fa-heart';
            }
            count.textContent = photoData.likeCount || 0;
        }
    } catch (error) {
        logger.error('Erreur lors du like:', error);
        alert('Une erreur est survenue');
    }
}

// Vérifier l'authentification
async function checkAuth() {
    try {
        const response = await fetch('/api/user/current');
        isAuthenticated = response.ok && (await response.json());
    } catch (error) {
        logger.error('Erreur vérification auth:', error);
        isAuthenticated = false;
    }
}

// Charger les statuts de like (bulk - une seule requête pour toutes les photos)
async function loadLikeStatuses() {
    if (!isAuthenticated || allPhotos.length === 0) return;

    try {
        // Créer la liste des IDs séparés par des virgules
        const photoIds = allPhotos.map(photo => photo.id).join(',');

        // Une seule requête pour tous les statuts
        const response = await fetch(`/api/photos/like-status/bulk?ids=${photoIds}`);

        if (response.ok) {
            const statuses = await response.json();

            // Mettre à jour le Set des photos likées
            for (const [photoId, isLiked] of Object.entries(statuses)) {
                if (isLiked) {
                    likedPhotos.add(parseInt(photoId));
                }
            }
        }
    } catch (error) {
        logger.error('Erreur chargement statuts like (bulk):', error);
    }
}

// Charger les photos
document.addEventListener('DOMContentLoaded', function() {
    const loadingMessage = document.getElementById('loadingMessage');
    const searchInput = document.getElementById('searchInput');
    const modalClose = document.getElementById('modalClose');
    const modal = document.getElementById('photoModal');
    const btnLoadMore = document.getElementById('btnLoadMore');

    // Événement de recherche
    searchInput.addEventListener('input', function() {
        searchPhotos(this.value);
    });

    // Événement du bouton Charger Plus
    btnLoadMore.addEventListener('click', loadNextPage);

    // Fermer le modal
    modalClose.addEventListener('click', closePhotoModal);
    modal.addEventListener('click', function(e) {
        if (e.target === modal) {
            closePhotoModal();
        }
    });

    // Échapper pour fermer le modal
    document.addEventListener('keydown', function(e) {
        if (e.key === 'Escape' && modal.classList.contains('active')) {
            closePhotoModal();
        }
    });

    // Charger les photos depuis l'API
    fetch('/api/public/photos')
        .then(response => {
            if (!response.ok) {
                throw new Error('Erreur lors du chargement de la galerie');
            }
            return response.json();
        })
        .then(async photos => {
            allPhotos = photos;
            filteredPhotos = photos;
            loadingMessage.style.display = 'none';

            // Vérifier l'authentification et charger les likes
            await checkAuth();
            await loadLikeStatuses();

            displayPhotos(photos);
        })
        .catch(error => {
            logger.error('Erreur:', error);
            loadingMessage.innerHTML = `
                <i class="fas fa-exclamation-triangle" style="color: #a855f7; font-size: 3rem; margin-bottom: 1rem;"></i>
                <p style="color: #c084fc;">Impossible de charger la galerie</p>
            `;
        });
});
</script>

</body>
</html>
