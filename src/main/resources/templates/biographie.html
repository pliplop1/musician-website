<!DOCTYPE html>
<html lang="fr" xmlns:th="http://www.thymeleaf.org" xmlns:sec="http://www.thymeleaf.org/extras/spring-security">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <th:block th:replace="~{fragments/head :: head(
        'Biographie - Duo Black & White',
        'Biographie officielle du Duo Black & White.',
        null,
        null
    )}"></th:block>
    <link rel="preload" as="style" th:href="@{/css/style.css(v=${#dates.createNow().time})}" onload="this.onload=null;this.rel='stylesheet'">
    <noscript><link rel="stylesheet" th:href="@{/css/style.css(v=${#dates.createNow().time})}"></noscript>
</head>
<body class="bg-gray-900 text-white">

<header th:replace="~{fragments/layout :: header}"></header>

<main class="container mx-auto px-4 sm:px-6 py-8 sm:py-10 md:py-12">
    <section id="biographie-content">
        <h2 class="text-2xl sm:text-3xl md:text-4xl font-bold text-center mb-6 sm:mb-8 md:mb-10 px-2">Biographie</h2>
        <div class="max-w-4xl mx-auto bg-gray-800 rounded-lg p-4 sm:p-6 md:p-8 shadow-lg">
            <p class="text-sm sm:text-base text-gray-300 whitespace-pre-wrap leading-relaxed" th:text="${biography.content}"></p>
        </div>
    </section>
</main>

<footer th:replace="~{fragments/layout :: footer}"></footer>

</body>
</html>
