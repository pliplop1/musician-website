<!DOCTYPE html>
<html lang="fr" xmlns:th="http://www.thymeleaf.org" xmlns:sec="http://www.thymeleaf.org/extras/spring-security">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="_csrf" th:content="${_csrf.token}"/>
    <meta name="_csrf_header" th:content="${_csrf.headerName}"/>
    <title>Vidéos - Duo Black & White</title>
    <link rel="stylesheet" th:href="@{/css/style.css}">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        /* Styles pour la page vidéos */
        .videos-page {
            min-height: 100vh;
            background: linear-gradient(135deg, #0f0f23 0%, #1a1a2e 100%);
            padding: 6rem 2rem;
            position: relative;
            overflow: hidden;
        }

        .videos-page::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: radial-gradient(circle at 20% 50%, rgba(239, 68, 68, 0.1) 0%, transparent 50%),
                        radial-gradient(circle at 80% 80%, rgba(59, 130, 246, 0.1) 0%, transparent 50%);
            pointer-events: none;
        }

        .videos-container {
            max-width: 1400px;
            margin: 0 auto;
            position: relative;
            z-index: 1;
        }

        .page-title {
            text-align: center;
            font-size: 3.5rem;
            margin-bottom: 1rem;
            background: linear-gradient(135deg, #ef4444 0%, #dc2626 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            font-weight: 900;
        }

        .page-title i {
            margin-right: 1rem;
            color: #ef4444;
            -webkit-text-fill-color: #ef4444;
        }

        .page-subtitle {
            text-align: center;
            color: #9ca3af;
            font-size: 1.25rem;
            margin-bottom: 3rem;
        }

        /* Barre de recherche */
        .search-container {
            max-width: 600px;
            margin: 0 auto 3rem;
            position: relative;
        }

        .search-input {
            width: 100%;
            padding: 1rem 3rem 1rem 1.5rem;
            background: rgba(255, 255, 255, 0.05);
            border: 2px solid rgba(239, 68, 68, 0.3);
            border-radius: 50px;
            color: #fff;
            font-size: 1.1rem;
            transition: all 0.3s ease;
        }

        .search-input:focus {
            outline: none;
            border-color: #ef4444;
            background: rgba(255, 255, 255, 0.08);
            box-shadow: 0 0 20px rgba(239, 68, 68, 0.3);
        }

        .search-input::placeholder {
            color: #9ca3af;
        }

        .search-icon {
            position: absolute;
            right: 1.5rem;
            top: 50%;
            transform: translateY(-50%);
            color: #ef4444;
            font-size: 1.2rem;
            pointer-events: none;
        }

        /* Compteur de résultats */
        .results-count {
            text-align: center;
            color: #9ca3af;
            margin-bottom: 2rem;
            font-size: 1.1rem;
        }

        .results-count strong {
            color: #ef4444;
        }

        /* Grille de vidéos */
        .videos-grid {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 2rem;
            margin-bottom: 3rem;
        }

        @media (max-width: 1024px) {
            .videos-grid {
                grid-template-columns: repeat(2, 1fr);
            }
        }

        .video-card {
            background: rgba(255, 255, 255, 0.03);
            backdrop-filter: blur(10px);
            border-radius: 15px;
            overflow: hidden;
            transition: all 0.4s ease;
            border: 1px solid rgba(255, 255, 255, 0.1);
            box-shadow: 0 4px 20px rgba(0, 0, 0, 0.3);
            cursor: pointer;
            animation: fadeInUp 0.6s ease-out;
        }

        .video-card:hover {
            transform: translateY(-10px) scale(1.03);
            box-shadow: 0 12px 40px rgba(239, 68, 68, 0.3);
            border-color: rgba(239, 68, 68, 0.3);
        }

        .video-thumbnail {
            position: relative;
            width: 100%;
            aspect-ratio: 16/9;
            overflow: hidden;
            background: #000;
        }

        .video-thumbnail img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            transition: transform 0.5s ease;
        }

        .video-card:hover .video-thumbnail img {
            transform: scale(1.15);
        }

        .play-overlay {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            font-size: 4rem;
            color: #ef4444;
            opacity: 0.8;
            transition: all 0.3s ease;
            pointer-events: none;
            text-shadow: 0 0 20px rgba(0, 0, 0, 0.5);
        }

        .video-card:hover .play-overlay {
            opacity: 1;
            transform: translate(-50%, -50%) scale(1.2);
        }

        .video-card-footer {
            padding: 1.5rem;
            display: flex;
            flex-direction: column;
            gap: 0.75rem;
        }

        .video-card-footer h3 {
            font-size: 1.1rem;
            margin: 0;
            color: #fff;
            font-weight: 600;
            line-height: 1.4;
        }

        .video-type-badge {
            display: inline-flex;
            align-items: center;
            gap: 0.5rem;
            padding: 0.4rem 0.8rem;
            background: rgba(239, 68, 68, 0.15);
            border: 1px solid rgba(239, 68, 68, 0.3);
            border-radius: 15px;
            color: #f87171;
            font-size: 0.8rem;
            width: fit-content;
        }

        /* Modal */
        .video-modal {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: rgba(0, 0, 0, 0.95);
            z-index: 9999;
            align-items: center;
            justify-content: center;
            padding: 2rem;
            animation: fadeIn 0.3s ease;
        }

        .video-modal.active {
            display: flex;
        }

        @keyframes fadeIn {
            from { opacity: 0; }
            to { opacity: 1; }
        }

        .modal-content {
            width: 100%;
            max-width: 1200px;
            position: relative;
            animation: slideUp 0.3s ease;
        }

        @keyframes slideUp {
            from {
                opacity: 0;
                transform: translateY(30px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .modal-close {
            position: absolute;
            top: -3rem;
            right: 0;
            background: rgba(239, 68, 68, 0.2);
            border: 2px solid #ef4444;
            color: #fff;
            font-size: 1.5rem;
            width: 3rem;
            height: 3rem;
            border-radius: 50%;
            cursor: pointer;
            transition: all 0.3s ease;
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 10001;
        }

        .modal-close:hover {
            background: #ef4444;
            transform: rotate(90deg);
        }

        .modal-video-wrapper {
            position: relative;
            width: 100%;
            background: #000;
            border-radius: 10px;
            overflow: hidden;
        }

        .modal-video-wrapper .embed-container {
            position: relative;
            padding-bottom: 56.25%;
            height: 0;
            overflow: hidden;
        }

        .modal-video-wrapper .embed-container iframe {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            border: none;
        }

        .modal-video-wrapper video {
            width: 100%;
            display: block;
        }

        .modal-title {
            margin-top: 1.5rem;
            text-align: center;
        }

        .modal-title h2 {
            color: #fff;
            font-size: 1.5rem;
            margin: 0;
        }

        /* Message vide */
        .no-results {
            text-align: center;
            padding: 4rem 2rem;
            color: #9ca3af;
        }

        .no-results i {
            font-size: 4rem;
            margin-bottom: 1rem;
            color: #ef4444;
        }

        /* Loading */
        .loading {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 4rem 2rem;
            color: #9ca3af;
        }

        .spinner {
            width: 50px;
            height: 50px;
            border: 4px solid rgba(239, 68, 68, 0.2);
            border-top-color: #ef4444;
            border-radius: 50%;
            animation: spin 1s linear infinite;
            margin-bottom: 1rem;
        }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }

        @keyframes fadeInUp {
            from {
                opacity: 0;
                transform: translateY(30px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        /* Bouton Charger Plus */
        .load-more-container {
            text-align: center;
            margin: 3rem 0;
        }

        .btn-load-more {
            display: inline-flex;
            align-items: center;
            gap: 1rem;
            padding: 1.25rem 3rem;
            background: linear-gradient(135deg, #ef4444 0%, #dc2626 100%);
            color: #fff;
            border: none;
            border-radius: 50px;
            font-size: 1.25rem;
            font-weight: 700;
            cursor: pointer;
            transition: all 0.4s ease;
            box-shadow: 0 8px 30px rgba(239, 68, 68, 0.4);
            text-transform: uppercase;
            letter-spacing: 1px;
            position: relative;
            overflow: hidden;
        }

        .btn-load-more::before {
            content: '';
            position: absolute;
            top: 0;
            left: -100%;
            width: 100%;
            height: 100%;
            background: linear-gradient(90deg, transparent, rgba(255, 255, 255, 0.3), transparent);
            transition: left 0.5s;
        }

        .btn-load-more:hover::before {
            left: 100%;
        }

        .btn-load-more:hover {
            transform: translateY(-5px) scale(1.05);
            box-shadow: 0 12px 40px rgba(239, 68, 68, 0.6);
            background: linear-gradient(135deg, #dc2626 0%, #b91c1c 100%);
        }

        .btn-load-more i {
            font-size: 1.5rem;
            transition: transform 0.3s ease;
        }

        .btn-load-more:hover i {
            transform: translateY(3px);
        }

        .btn-load-more:disabled {
            opacity: 0.5;
            cursor: not-allowed;
            transform: none;
        }

        /* Responsive */
        @media (max-width: 768px) {
            .videos-page {
                padding: 4rem 1rem;
            }

            .page-title {
                font-size: 2.5rem;
            }

            .page-subtitle {
                font-size: 1rem;
            }

            .videos-grid {
                grid-template-columns: 1fr;
                gap: 1.5rem;
            }

            .search-input {
                font-size: 1rem;
                padding: 0.875rem 2.5rem 0.875rem 1.25rem;
            }

            .btn-load-more {
                font-size: 1rem;
                padding: 1rem 2rem;
            }
        }
    </style>
</head>
<body>

<header th:replace="~{fragments/layout :: header}"></header>

<main class="videos-page">
    <div class="videos-container">
        <h1 class="page-title">
            <i class="fas fa-film"></i> Toutes nos Vidéos
        </h1>
        <p class="page-subtitle">Découvrez l'intégralité de nos performances</p>

        <!-- Barre de recherche -->
        <div class="search-container">
            <input
                type="text"
                id="searchInput"
                class="search-input"
                placeholder="Rechercher une vidéo...">
            <i class="fas fa-search search-icon"></i>
        </div>

        <!-- Compteur de résultats -->
        <div class="results-count" id="resultsCount"></div>

        <!-- Loading -->
        <div class="loading" id="loadingMessage">
            <div class="spinner"></div>
            <p>Chargement des vidéos...</p>
        </div>

        <!-- Grille de vidéos -->
        <div class="videos-grid" id="videosGrid" style="display: none;"></div>

        <!-- Message aucun résultat -->
        <div class="no-results" id="noResults" style="display: none;">
            <i class="fas fa-search"></i>
            <h3>Aucune vidéo trouvée</h3>
            <p>Essayez avec d'autres mots-clés</p>
        </div>

        <!-- Bouton Charger Plus -->
        <div class="load-more-container" id="loadMoreContainer" style="display: none;">
            <button class="btn-load-more" id="btnLoadMore">
                <i class="fas fa-plus-circle"></i>
                <span>Charger plus de vidéos</span>
                <i class="fas fa-arrow-down"></i>
            </button>
        </div>
    </div>

    <!-- Modal vidéo -->
    <div class="video-modal" id="videoModal">
        <div class="modal-content">
            <button class="modal-close" id="modalClose">
                <i class="fas fa-times"></i>
            </button>
            <div class="modal-video-wrapper" id="modalVideoWrapper">
                <!-- Le contenu vidéo sera injecté ici -->
            </div>
            <div class="modal-title">
                <h2 id="modalTitle"></h2>
            </div>
        </div>
    </div>
</main>

<footer class="bg-gray-800 mt-20 py-8">
    <div class="container mx-auto px-6 text-center text-gray-400">
        <div class="flex justify-center space-x-6 mb-6" th:if="${!#lists.isEmpty(enabledSocialLinks)}">
            <a th:each="link : ${enabledSocialLinks}"
               th:href="${link.url}"
               target="_blank"
               class="hover:text-white transition-colors flex items-center gap-2"
               th:title="${link.name}">
                <i th:class="${link.icon} + ' text-xl'"></i>
                <span th:text="${link.name}"></span>
            </a>
        </div>
        <div th:if="${#lists.isEmpty(enabledSocialLinks)}" class="mb-6 text-sm">
            <p>Aucun réseau social configuré</p>
        </div>
        <p>© 2025 Duo Black & White. Tous droits réservés.</p>
    </div>
</footer>

<script>
let allVideos = [];
let filteredVideos = [];
let currentPage = 1;
const videosPerPage = 9;

// Extraire l'ID YouTube depuis l'URL embed
function getYouTubeId(embedCode) {
    if (!embedCode) return null;
    const match = embedCode.match(/youtube\.com\/embed\/([a-zA-Z0-9_-]+)/);
    return match ? match[1] : null;
}

// Générer l'URL de la miniature YouTube
function getThumbnailUrl(video) {
    if (video.videoType === 'EMBED' && video.embedCode) {
        const videoId = getYouTubeId(video.embedCode);
        if (videoId) {
            return `https://img.youtube.com/vi/${videoId}/maxresdefault.jpg`;
        }
    }
    return '/images/video-placeholder.jpg';
}

// Afficher les vidéos avec pagination
function displayVideos(videos) {
    const grid = document.getElementById('videosGrid');
    const noResults = document.getElementById('noResults');
    const resultsCount = document.getElementById('resultsCount');
    const loadMoreContainer = document.getElementById('loadMoreContainer');

    if (videos.length === 0) {
        grid.style.display = 'none';
        noResults.style.display = 'block';
        loadMoreContainer.style.display = 'none';
        resultsCount.textContent = '';
        return;
    }

    noResults.style.display = 'none';
    grid.style.display = 'grid';

    // Calculer la pagination
    const totalPages = Math.ceil(videos.length / videosPerPage);
    const startIndex = (currentPage - 1) * videosPerPage;
    const endIndex = startIndex + videosPerPage;
    const videosToShow = videos.slice(startIndex, endIndex);

    // Mettre à jour le compteur
    resultsCount.innerHTML = `Page <strong>${currentPage}</strong> sur <strong>${totalPages}</strong> - <strong>${videos.length}</strong> vidéo${videos.length > 1 ? 's' : ''} au total`;

    grid.innerHTML = videosToShow.map(video => `
        <div class="video-card" data-video-id="${video.id}">
            <div class="video-thumbnail">
                <img src="${getThumbnailUrl(video)}" alt="${video.title}">
                <div class="play-overlay">
                    <i class="fas fa-play-circle"></i>
                </div>
            </div>
            <div class="video-card-footer">
                <h3>${video.title}</h3>
                <span class="video-type-badge">
                    <i class="fas fa-video"></i>
                    ${video.videoType === 'EMBED' ? 'YouTube' : 'Vidéo locale'}
                </span>
            </div>
        </div>
    `).join('');

    // Ajouter les événements de clic
    document.querySelectorAll('.video-card').forEach(card => {
        card.addEventListener('click', function() {
            const videoId = parseInt(this.dataset.videoId);
            const video = allVideos.find(v => v.id === videoId);
            if (video) {
                openVideoModal(video);
            }
        });
    });

    // Afficher/masquer le bouton de pagination
    updatePaginationButton(totalPages);

    // Scroll vers le haut
    window.scrollTo({ top: 0, behavior: 'smooth' });
}

// Mettre à jour le bouton de pagination
function updatePaginationButton(totalPages) {
    const loadMoreContainer = document.getElementById('loadMoreContainer');
    const btnLoadMore = document.getElementById('btnLoadMore');

    if (totalPages <= 1) {
        loadMoreContainer.style.display = 'none';
        return;
    }

    loadMoreContainer.style.display = 'block';

    // Mettre à jour le texte et l'état du bouton
    if (currentPage < totalPages) {
        btnLoadMore.innerHTML = `
            <i class="fas fa-chevron-right"></i>
            <span>Page suivante (${currentPage + 1}/${totalPages})</span>
            <i class="fas fa-arrow-right"></i>
        `;
        btnLoadMore.disabled = false;
    } else {
        btnLoadMore.innerHTML = `
            <i class="fas fa-redo"></i>
            <span>Retour à la page 1</span>
            <i class="fas fa-arrow-left"></i>
        `;
        btnLoadMore.disabled = false;
    }
}

// Charger la page suivante
function loadNextPage() {
    const totalPages = Math.ceil(filteredVideos.length / videosPerPage);

    if (currentPage < totalPages) {
        currentPage++;
    } else {
        currentPage = 1; // Retour au début
    }

    displayVideos(filteredVideos);
}

// Ouvrir le modal vidéo
function openVideoModal(video) {
    const modal = document.getElementById('videoModal');
    const modalTitle = document.getElementById('modalTitle');
    const modalVideoWrapper = document.getElementById('modalVideoWrapper');

    modalTitle.textContent = video.title;

    // Construire le contenu vidéo
    let videoContent = '';
    if (video.videoType === 'EMBED' && video.embedCode) {
        videoContent = `<div class="embed-container">${video.embedCode}</div>`;
    } else if (video.videoType === 'UPLOADED_FILE' && video.videoUrl) {
        videoContent = `
            <video controls autoplay>
                <source src="${video.videoUrl}" type="video/mp4">
                Votre navigateur ne supporte pas la lecture de vidéos.
            </video>
        `;
    }

    modalVideoWrapper.innerHTML = videoContent;
    modal.classList.add('active');
    document.body.style.overflow = 'hidden';
}

// Fermer le modal
function closeVideoModal() {
    const modal = document.getElementById('videoModal');
    const modalVideoWrapper = document.getElementById('modalVideoWrapper');

    modal.classList.remove('active');
    modalVideoWrapper.innerHTML = '';
    document.body.style.overflow = '';
}

// Recherche
function searchVideos(query) {
    const searchTerm = query.toLowerCase().trim();

    if (searchTerm === '') {
        filteredVideos = allVideos;
    } else {
        filteredVideos = allVideos.filter(video =>
            video.title.toLowerCase().includes(searchTerm)
        );
    }

    // Réinitialiser à la page 1 lors d'une recherche
    currentPage = 1;
    displayVideos(filteredVideos);
}

// Charger les vidéos
document.addEventListener('DOMContentLoaded', function() {
    const loadingMessage = document.getElementById('loadingMessage');
    const searchInput = document.getElementById('searchInput');
    const modalClose = document.getElementById('modalClose');
    const modal = document.getElementById('videoModal');
    const btnLoadMore = document.getElementById('btnLoadMore');

    // Événement de recherche
    searchInput.addEventListener('input', function() {
        searchVideos(this.value);
    });

    // Événement du bouton Charger Plus / Page suivante
    btnLoadMore.addEventListener('click', loadNextPage);

    // Fermer le modal
    modalClose.addEventListener('click', closeVideoModal);
    modal.addEventListener('click', function(e) {
        if (e.target === modal) {
            closeVideoModal();
        }
    });

    // Échapper pour fermer le modal
    document.addEventListener('keydown', function(e) {
        if (e.key === 'Escape' && modal.classList.contains('active')) {
            closeVideoModal();
        }
    });

    // Charger les vidéos depuis l'API
    fetch('/api/public/videos')
        .then(response => {
            if (!response.ok) {
                throw new Error('Erreur lors du chargement des vidéos');
            }
            return response.json();
        })
        .then(videos => {
            allVideos = videos;
            filteredVideos = videos;
            loadingMessage.style.display = 'none';
            displayVideos(videos);
        })
        .catch(error => {
            console.error('Erreur:', error);
            loadingMessage.innerHTML = `
                <i class="fas fa-exclamation-triangle" style="color: #ef4444; font-size: 3rem; margin-bottom: 1rem;"></i>
                <p style="color: #f87171;">Impossible de charger les vidéos</p>
            `;
        });
});
</script>

</body>
</html>
