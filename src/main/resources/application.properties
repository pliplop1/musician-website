# Configuration de la base de données pour MariaDB
spring.datasource.url=jdbc:mariadb://localhost:3306/musician_db
spring.datasource.username=root
spring.datasource.password=root
spring.datasource.driver-class-name=org.mariadb.jdbc.Driver

# Configuration JPA (Java Persistence API)
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MariaDBDialect

server.port=8106

# Rend les erreurs 404 gérables par le ControllerAdvice
spring.mvc.throw-exception-if-no-handler-found=true

# Active le profil de développement par défaut
spring.profiles.active=dev

# -- Configuration pour l'admin initial --
# En production, surchargez cette valeur avec une variable d'environnement
admin.initial-password=${ADMIN_INITIAL_PASSWORD:DefaultAdminPass123!}

# -- Configuration pour l'envoi de fichiers volumineux --
# Taille maximale d'un fichier unique (ici, 20 Mégaoctets)
spring.servlet.multipart.max-file-size=20MB
# Taille maximale totale de la requête (doit être au moins égale à max-file-size)
spring.servlet.multipart.max-request-size=20MB

# -- Configuration Email --

# 🧪 MODE SIMULATION (ACTIF PAR DÉFAUT)
# Les emails ne sont PAS envoyés, mais affichés dans les logs
# Pour tester sans configurer SMTP
email.simulation.mode=true

# 📧 Pour activer l'envoi réel d'emails :
# 1. Changez email.simulation.mode=false
# 2. Configurez un des services ci-dessous

