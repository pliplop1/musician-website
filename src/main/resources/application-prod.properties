# =============================================================
# Configuration PRODUCTION - Duo Black & White
# =============================================================
#
# Pour activer ce profil :
# - Via variable d'environnement : SPRING_PROFILES_ACTIVE=prod
# - Via argument JVM : -Dspring.profiles.active=prod
# - Via ligne de commande : java -jar app.jar --spring.profiles.active=prod
#
# IMPORTANT : Ce fichier contient des placeholders pour les valeurs sensibles.
# En production, utilisez des variables d'environnement ou un gestionnaire de secrets.
# =============================================================

# =============================================================
# SERVEUR
# =============================================================
server.port=${SERVER_PORT:8080}
server.error.include-message=never
server.error.include-binding-errors=never
server.error.include-stacktrace=never
server.error.include-exception=false

# Compression HTTP
server.compression.enabled=true
server.compression.mime-types=text/html,text/xml,text/plain,text/css,text/javascript,application/javascript,application/json
server.compression.min-response-size=1024

# =============================================================
# BASE DE DONNÉES
# =============================================================
spring.datasource.url=${DATABASE_URL:jdbc:mariadb://localhost:3306/musician_db}
spring.datasource.username=${DATABASE_USERNAME:musician_user}
spring.datasource.password=${DATABASE_PASSWORD}
spring.datasource.driver-class-name=org.mariadb.jdbc.Driver

# Pool de connexions HikariCP (optimisé pour production)
spring.datasource.hikari.maximum-pool-size=10
spring.datasource.hikari.minimum-idle=5
spring.datasource.hikari.connection-timeout=20000
spring.datasource.hikari.idle-timeout=300000
spring.datasource.hikari.max-lifetime=1200000

# =============================================================
# JPA / HIBERNATE
# =============================================================
# IMPORTANT : En production, ne PAS utiliser 'create' ou 'create-drop'
# Utilisez 'validate' ou 'none' et gérez les migrations avec Flyway/Liquibase
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=false
spring.jpa.properties.hibernate.use_sql_comments=false
spring.jpa.open-in-view=false

# Optimisations Hibernate
spring.jpa.properties.hibernate.jdbc.batch_size=20
spring.jpa.properties.hibernate.order_inserts=true
spring.jpa.properties.hibernate.order_updates=true
spring.jpa.properties.hibernate.jdbc.batch_versioned_data=true

# =============================================================
# SÉCURITÉ
# =============================================================
# Désactiver les endpoints Actuator non sécurisés
management.endpoints.enabled-by-default=false
management.endpoint.health.enabled=true
management.endpoint.health.show-details=never

# =============================================================
# EMAIL
# =============================================================
spring.mail.host=${MAIL_HOST:smtp.gmail.com}
spring.mail.port=${MAIL_PORT:587}
spring.mail.username=${MAIL_USERNAME}
spring.mail.password=${MAIL_PASSWORD}
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true
spring.mail.properties.mail.smtp.starttls.required=true
spring.mail.properties.mail.smtp.ssl.trust=${MAIL_HOST:smtp.gmail.com}

# Configuration des emails
musician.email.from=${MAIL_FROM:noreply@duoblackandwhite.com}
musician.email.admin=${ADMIN_EMAIL:dumoulin.marilyne@gmail.com}

# =============================================================
# FICHIERS UPLOADÉS
# =============================================================
spring.servlet.multipart.max-file-size=10MB
spring.servlet.multipart.max-request-size=20MB

# Chemin de stockage des fichiers (à définir en fonction du serveur)
musician.upload.photos-dir=${UPLOAD_PHOTOS_DIR:/var/musician-website/uploads/photos}
musician.upload.music-dir=${UPLOAD_MUSIC_DIR:/var/musician-website/uploads/music}
musician.upload.videos-dir=${UPLOAD_VIDEOS_DIR:/var/musician-website/uploads/videos}

# =============================================================
# LOGGING
# =============================================================
# Niveau de log global en production
logging.level.root=WARN
logging.level.com.docker=INFO
logging.level.org.springframework.web=WARN
logging.level.org.springframework.security=WARN
logging.level.org.hibernate=WARN

# Fichier de logs
logging.file.name=${LOG_FILE:/var/log/musician-website/application.log}
logging.file.max-size=10MB
logging.file.max-history=30
logging.pattern.console=%d{yyyy-MM-dd HH:mm:ss} - %msg%n
logging.pattern.file=%d{yyyy-MM-dd HH:mm:ss} [%thread] %-5level %logger{36} - %msg%n

# =============================================================
# THYMELEAF
# =============================================================
spring.thymeleaf.cache=true
spring.thymeleaf.enabled=true
spring.thymeleaf.encoding=UTF-8
spring.thymeleaf.mode=HTML

# Cookies de session sécurisés
server.servlet.session.cookie.secure=true
server.servlet.session.cookie.same-site=lax

# =============================================================
# CACHE
# =============================================================
spring.web.resources.cache.cachecontrol.max-age=31536000
spring.web.resources.cache.cachecontrol.cache-public=true

# Activer le hashing de contenu pour les ressources statiques
spring.web.resources.chain.strategy.content.enabled=true
spring.web.resources.chain.strategy.content.paths=/**

# =============================================================
# SWAGGER / OpenAPI (Désactiver en production si non nécessaire)
# =============================================================
# Pour désactiver Swagger en production, décommentez :
# springdoc.api-docs.enabled=false
# springdoc.swagger-ui.enabled=false

springdoc.api-docs.enabled=true
springdoc.swagger-ui.enabled=true
springdoc.swagger-ui.path=/swagger-ui.html
springdoc.api-docs.path=/v3/api-docs

# =============================================================
# FLYWAY (Migrations BDD)
# =============================================================
spring.flyway.enabled=true
spring.flyway.baseline-on-migrate=true
spring.flyway.locations=classpath:db/migration

# =============================================================
# CORS (À ajuster selon vos besoins)
# =============================================================
# En production, limitez CORS aux domaines autorisés
musician.cors.allowed-origins=${CORS_ALLOWED_ORIGINS:https://duoblackandwhite.com,https://www.duoblackandwhite.com}

# =============================================================
# APPLICATION
# =============================================================
spring.application.name=Duo Black & White - Website
musician.app.version=1.0.0

# Désactiver les données de démonstration en production
# Note: spring.profiles.active ne doit PAS être ici (déjà défini via variable d'environnement)
