# ===============================================
# Configuration de test avec H2 in-memory
# ===============================================

# Base de données H2 in-memory
spring.datasource.url=jdbc:h2:mem:testdb;MODE=MariaDB;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE
spring.datasource.driverClassName=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=

# JPA/Hibernate
spring.jpa.database-platform=org.hibernate.dialect.H2Dialect
spring.jpa.hibernate.ddl-auto=create-drop
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=true

# Désactiver les initializers de données pour les tests
spring.sql.init.mode=never

# Email (mock pour les tests)
spring.mail.host=localhost
spring.mail.port=25
spring.mail.username=test@example.com
spring.mail.password=test
spring.mail.properties.mail.smtp.auth=false
spring.mail.properties.mail.smtp.starttls.enable=false

# Logging
logging.level.root=WARN
logging.level.com.docker=INFO
logging.level.org.springframework.security=DEBUG
logging.level.org.hibernate.SQL=DEBUG

# Server
server.port=0

# Désactiver Actuator endpoints pour les tests
management.endpoints.enabled-by-default=false

# Désactiver Flyway en test pour éviter les conflits avec H2/create-drop
spring.flyway.enabled=false
