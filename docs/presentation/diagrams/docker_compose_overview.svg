<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="700">
  <rect width="1200" height="700" fill="#ffffff"/>
  <text x="600" y="50" font-family="Arial" font-size="28" text-anchor="middle">Docker Compose — Services (from docker-compose.yml)</text>

  <!-- database -->
  <rect x="80" y="120" width="300" height="220" rx="8" ry="8" fill="#F0FFF4" stroke="#38A169"/>
  <text x="230" y="150" font-size="18" font-family="Arial" text-anchor="middle">database (mariadb:10.11)</text>
  <text x="230" y="180" font-size="14" font-family="Arial" text-anchor="middle">port 3306 → ${DB_PORT:-3306}</text>
  <text x="230" y="200" font-size="14" font-family="Arial" text-anchor="middle">vol: db-data:/var/lib/mysql</text>
  <text x="230" y="220" font-size="14" font-family="Arial" text-anchor="middle">healthcheck: healthcheck.sh</text>

  <!-- app -->
  <rect x="450" y="120" width="300" height="260" rx="8" ry="8" fill="#EBF8FF" stroke="#3182CE"/>
  <text x="600" y="150" font-size="18" font-family="Arial" text-anchor="middle">app (Spring Boot)</text>
  <text x="600" y="175" font-size="14" font-family="Arial" text-anchor="middle">build: Dockerfile</text>
  <text x="600" y="195" font-size="14" font-family="Arial" text-anchor="middle">port 8080 → ${APP_PORT:-8080}</text>
  <text x="600" y="215" font-size="14" font-family="Arial" text-anchor="middle">vol: uploads, logs</text>
  <text x="600" y="235" font-size="14" font-family="Arial" text-anchor="middle">depends_on: database (healthy)</text>
  <text x="600" y="255" font-size="14" font-family="Arial" text-anchor="middle">healthcheck: /actuator/health</text>

  <!-- adminer -->
  <rect x="820" y="120" width="300" height="200" rx="8" ry="8" fill="#FFF5F5" stroke="#E53E3E"/>
  <text x="970" y="150" font-size="18" font-family="Arial" text-anchor="middle">adminer:4.8.1</text>
  <text x="970" y="175" font-size="14" font-family="Arial" text-anchor="middle">port 8081 → 8080</text>
  <text x="970" y="195" font-size="14" font-family="Arial" text-anchor="middle">ADMINER_DEFAULT_SERVER=database</text>

  <!-- network -->
  <rect x="200" y="430" width="800" height="80" rx="8" ry="8" fill="#F7FAFC" stroke="#CBD5E0"/>
  <text x="600" y="480" font-size="16" font-family="Arial" text-anchor="middle">network: musician-network (bridge)</text>

  <!-- arrows -->
  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#555"/>
    </marker>
  </defs>
  <line x1="380" y1="230" x2="450" y2="230" stroke="#555" stroke-width="2" marker-end="url(#arrow)"/>
  <line x1="750" y1="230" x2="820" y2="230" stroke="#555" stroke-width="2" marker-end="url(#arrow)"/>
</svg>

