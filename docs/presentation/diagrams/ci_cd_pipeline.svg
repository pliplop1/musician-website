  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#555"/>
    </marker>
  </defs>

  <rect x="60" y="120" width="200" height="80" rx="8" ry="8" fill="#F7FAFC" stroke="#3182CE"/>
  <text x="160" y="155" font-size="14" font-family="Arial" text-anchor="middle">Lint + Tests</text>
  <text x="160" y="175" font-size="12" font-family="Arial" text-anchor="middle">Java + Vue + E2E</text>

  <rect x="320" y="120" width="220" height="80" rx="8" ry="8" fill="#EBF8FF" stroke="#2B6CB0"/>
  <text x="430" y="155" font-size="14" font-family="Arial" text-anchor="middle">Build &amp; Push</text>
  <text x="430" y="175" font-size="12" font-family="Arial" text-anchor="middle">Image GHCR</text>

  <rect x="600" y="120" width="220" height="80" rx="8" ry="8" fill="#F0FFF4" stroke="#2F855A"/>
  <text x="710" y="155" font-size="14" font-family="Arial" text-anchor="middle">Deploy (SSH)</text>
  <text x="710" y="175" font-size="12" font-family="Arial" text-anchor="middle">compose up -d</text>

  <rect x="880" y="120" width="260" height="80" rx="8" ry="8" fill="#FFF5F5" stroke="#C53030"/>
  <text x="1010" y="155" font-size="14" font-family="Arial" text-anchor="middle">Post-deploy</text>
  <text x="1010" y="175" font-size="12" font-family="Arial" text-anchor="middle">Healthcheck + prune</text>

  <line x1="260" y1="160" x2="320" y2="160" stroke="#555" stroke-width="2" marker-end="url(#arrow)"/>
  <line x1="540" y1="160" x2="600" y2="160" stroke="#555" stroke-width="2" marker-end="url(#arrow)"/>
  <line x1="820" y1="160" x2="880" y2="160" stroke="#555" stroke-width="2" marker-end="url(#arrow)"/>

  <text x="600" y="240" font-size="12" font-family="Arial" text-anchor="middle">Secrets requis: DEPLOY_HOST, DEPLOY_USER, SSH_PRIVATE_KEY, ENABLE_DOCKER_PUSH</text>
